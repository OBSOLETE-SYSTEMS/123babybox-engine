om edge; top 60% is clean cloth.",action:"Static. Two numbered lines stacked in the clear upper area, generous line spacing, one short italic clarifier under each so it reads like a person talking, not a listicle.",txt:"1. She drops things on purpose — again, and again, and again\nnot testing you. testing gravity.\n\n2. Lids, cups and boxes are suddenly more interesting than the toy inside\nthe container IS the toy right now."},{sec:"Slide 3 — signs 3 + 4",type:"Overhead detail still, tight, upper half clear",frame:"One small-but-not-too-small block isolated on the cloth in the lower right, a wooden ring resting beside it. Rest of frame empty.",action:"Static. Same layout grid as Slide 2 — identical margins, identical type sizes. The repetition is what makes the set feel like a reference sheet rather than five separate graphics.",txt:"3. She picks things up with her thumb and one finger, not a whole fist\nthat little pincer grip is the skill this stage runs on.\n\n4. She bangs two things together just to hear what happens\ncause and effect, discovered on your kitchen floor."},{sec:"Slide 4 — sign 5 + what to hand her",type:"Overhead mid still with adult hands entering frame",frame:"Adult hands (no face, no baby) lowering one soft block into the open basket. Five blocks fanned to the right. Warm, ordinary, unstyled.",action:"Static, but the one frame with human motion implied — it breaks up four object-only slides and reads as the doing slide. Sign 5 sits top-left; the 'what to hand her' block sits bottom-right on a soft cream panel so it reads as the takeaway; the safety line runs as a small footer bar along the very bottom, always visible, never scary.",txt:"5. She holds one thing in each hand — and has no intention of letting either go\n\nWHAT TO HAND HER:\na basket + 5 big soft blocks. genuinely, that's it.\ndevelopment doesn't have to be expensive 💛\n\nFOOTER: nothing that fits through an empty toilet paper tube — and ALWAYS supervise 🤍"},{sec:"Slide 5 — the permission slide",type:"Overhead still, near-empty, softest frame of the set",frame:"Almost bare cream cloth. One single soft block resting off-centre. Nothing else. The quietest image in the carousel, on purpose.",action:"Static. Copy centred, larger leading, warmest tone of the five slides. This is the slide people screenshot for a friend, so it has to stand alone out of context — it carries the reassurance and the save prompt without any product, offer, or link.",txt:"seeing three or more? she's there.\nseeing none of them yet? nothing is wrong.\n\nthis one shows up anywhere from about 8 to 12 months.\nlater is not behind.\n\nsave this for the week it starts 🤍"}],edit:{hook:"The cover slide is the entire hook — it has to be legible as a thumbnail in a scrolling feed at about 40% size. Headline in the chunky rounded display face at roughly 64-72px on the 1080x1350 canvas, ink on cream, never text-over-a-busy-photo. Put the recommended hook line ('if your baby has started dropping things on purpose…') in the FIRST LINE OF THE CAPTION rather than on the cover — the cover carries the promise, the caption carries the recognition moment that makes her stop.",pace:"Reader-paced, not editor-paced — this is a document, not a video. One idea per slide, maximum two numbered signs per slide, and never more than about 45 words of body copy on any single slide. If a slide needs a squint, it fails. Keep identical margins and type sizes across slides 2-4 so a thumb-swipe feels like turning pages of one sheet rather than clicking through five separate posts.",captions:"Type is the product here. Headlines in the rounded display face at 700 weight; body in Inter at 34-40px minimum on the 1080x1350 canvas (anything under ~30px is unreadable on a phone held at arm's length). Ink #292420 on cream #FBF5E9, with the milestone teal #1FA2C4 used ONLY for the slide numbers so the eye can count progress. Italic clarifier lines one weight lighter and one step smaller. Safety footer on slide 4 in ink-soft, small but never grey-on-grey — legibility on a safety line is non-negotiable. Add real alt text to every slide.",audio:"Silent-first. This is a static IG carousel — the job is reading, and most people will meet it with sound off. Do NOT attach a trending audio track to the Instagram version; a comedy or novelty sound actively works against a reference post someone is meant to trust and re-open. If a track is added for the Reels-tab crosspost, use a soft warm instrumental in the calm-domestic lane at low volume, chosen from the in-app library at the time of posting — no named song required and none should be invented. The TikTok photo-carousel cut is the one place where a current, gentle trending sound is worth pulling live from the Discover feed on the day it goes up.",overlays:"Every text element in this brief IS the overlay — build it in Canva or Figma at 1080x1350, not in-app. Standing template elements: the milestone teal slide-number chip top-right on slides 2-4, a small 'save this 🔖' pill on slides 1 and 5, and a 5-dot progress row along the bottom edge of every slide so a reader knows how much is left. No logo lockup larger than a thumbnail — a small wordmark bottom-right on slide 1 and slide 5 only. No sticker chaos, no arrows, no drop shadows.",length:"5 slides. Hard stop. The instinct will be to add a sixth 'and here's the box' slide — don't; this piece earns its save by asking for nothing. A box-tied version of this same stage is its own separate brief.",aspect:"4:5 portrait, 1080x1350, all five slides identical dimensions (a mismatched slide crops mid-swipe and breaks the set). Export PNG at maximum quality — JPEG artifacting around type is what makes a home-built carousel look home-built. Build a 1:1 1080x1080 alternate of slides 1 and 5 for the Facebook cut, and a 9:16 1080x1920 rebuild for the TikTok photo carousel."},channels:[{k:"ig",who:"Millennial Mom 💜 — core subscriber",cut:"LEAD CUT. The full five-slide 4:5 carousel exactly as built, posted to feed with the recognition-first caption. This is the audience that saves and DMs, and everything above is designed for her: polished type, readable at arm's length, slide 5 built to stand alone as a screenshot. Pin a first comment that just says 'what stage is yours in right now? 👇' — the answers become next month's slide topics for free. Add all five images to a Story sequence 24 hours later with a 'this is saved in the grid if you need it later' sticker, and file the post to a Highlight called STAGES so it keeps working for months. Watch saves and shares, not views."},{k:"fb",who:"Gifting Grandma 👵 — the gift-buyer",cut:"Post slide 1 and slide 5 only as a 1:1 two-image post, with a longer, slower, warmer caption written to a grandmother rather than a mother — it opens by naming her ('if you're the one watching the baby two afternoons a week, you've probably seen this already') and explains the in-and-out stage in full paragraphs instead of a checklist, because this audience reads rather than skims. Keep the basket-and-five-blocks line prominent: it's a genuinely useful, inexpensive thing she can pick up and bring over, which is exactly how this audience likes to help. Keep the supervise line word-for-word. No shopping ask. The comment thread here will fill with 'mine did this at seven months!' stories — reply to every one of them; that thread is the post's real reach engine on Facebook."},{k:"tt",who:"Gen-Z Mom ⚡ — discovery",cut:"Rebuild as a 9:16 TikTok photo carousel, not a repost of the 4:5 files. Strip the design polish: bigger, blunter text, less white space, hook on frame one in the largest type that fits — 'your baby keeps dropping things on purpose. here's what that actually means.' Cut to 4 frames by merging signs 3 and 4, because this feed does not reward a fifth swipe. Keep the permission frame ('later is not behind') as the closer — it's the most stitchable, most duet-able line in the set and it's what makes this a save on TikTok rather than a scroll-past. Pull a gentle trending sound from Discover on the day of posting; put the age band ('8-12 months') in the on-screen text and the first line of the caption for search. Raw beats polished here."}],test:{hyp:"A text-led carousel with no baby, no talent and no product ask will out-save the account's video posts by a wide margin — because a save is a different behavior than a view, and this brand has never given parents something built to be kept. If saves-per-reach on this post beats the account's trailing four-week video average, the no-baby reference format is a weekly slot, not an experiment.",metric:"Saves ÷ accounts reached (primary), with shares ÷ accounts reached as the secondary read — shares are the group-chat forward, which is the actual growth mechanic here. Log both against the trailing 4-week video average. Views are explicitly not the scoreboard for this one."},amplify:"Gate on the save rate, not the view count. If saves-per-reach clears the account's trailing four-week average within 72 hours, put $200 behind it over five days as an engagement-objective IG carousel ad to women 25-40 in the US, interest-layered on baby milestones / Montessori / first-time parenting, with existing followers excluded so it buys discovery rather than re-reach. Then do the one thing that makes this money compound: build a custom audience of everyone who saved or shared the post and hold it as the retargeting pool for a later box-forward brief — a parent who bookmarked a stage checklist has told you exactly which stage her baby is in, without a single question being asked. If saves come in flat, spend nothing and change the topic, not the format — one weak subject line doesn't indict the carousel.",drove:["The saveable checklist is quietly the best-performing for…","The save is now the metric worth chasing"],why:"Carousel engagement hit 0.72% this year, up nearly 31%, with checklist formats named as the single strongest driver of saves — and this is the one format the team can produce every week with nobody booked, no baby wrangled, and a two-hour build."},

  {id:"MAP-0720-4",pillar:"MAP",dna:"no-baby-explainer",plat:"Facebook + IG",anchor:true,noBaby:true,ladder:true,panelTags:["nobaby","gift","first-time","quick","expert","milestone"],concept:"The ten-second toy check, done on toys already in the house: tug it, look for the age band, see whether the listing says who tested it. Three calm hands-only beats, filmed at a coffee table — a skill a parent or grandparent keeps forever, not a fear she carries. Lands on relief, and quietly connects to something bigger: every item in the box already got this same check.",hooks:["Before you hand it over — three things you can check on any toy in about ten seconds.","The toy safety check nobody teaches you, and it takes less time than opening the box.","I do this with every new toy that comes in the house. It's ten seconds and it's saved me twice."],rec:0,caption:"Three things you can check on any toy in about ten seconds 👐\n\n1️⃣ Give it a tug. Eyes, noses, pom-poms, little magnets — if it comes off with a firm pull from you, it can come off in a mouth.\n2️⃣ Look for the age band. Not a marketing age (\"fun for all ages!\") — an actual 0+ / 6m+ / 3+ on the box or the tag.\n3️⃣ See if it says who tested it. A safety standard, a testing mark, a real brand name behind it. If a listing can't tell you, that's information too.\n\nNone of this is about doing it wrong. Most of us were never handed this list — we just got handed a baby 💛 It takes ten seconds and then it's yours forever.\n\nALWAYS supervise play, and when something feels off, trust that. You know your baby.\n\nSave this one for the next birthday haul 📌\n\n#babysafety #newmomtips #toysafety #firsttimemom #montessoribaby #grandmalife",lead:{ch:"Facebook",who:"Gifting Grandma 👵 — she's the one buying off a marketplace listing with no idea what's been vetted"},shoot:{setup:"One location: a coffee table or the end of a dining table, pulled near a window. Natural side light, mid-morning — soft, no overheads, no ring light (this should look like a real living room, not a studio). Surface = plain wood or a solid neutral blanket; kill any busy rug or laundry pile in frame. Props: 5-6 toys ALREADY in the house across the age range — one plush with sewn-on features, one plush or doll with glued/attached bits, one wooden rattle or stacker with a clear 0+/6m+ stamp, one small-parts toy clearly marked 3+, and one no-name marketplace item with no visible labeling. Also grab the actual box or hangtag for two of them. Phone on a small tripod or propped on a stack of books, LOCKED OFF, shooting straight down at about 60-70cm — nothing handheld, nothing moving. Shoot vertical 9:16; if you can, run a second pass framed a touch wider so there's room to crop to 4:5 and 1:1 later.",cast:"NO BABY. NO on-camera face. NO booked talent. One pair of adult hands — anyone on the team, no makeup or manicure needed, just clean hands and no loud jewelry or watch that clacks on the table. Long sleeves in a plain solid color read best against wood. This is fully producible on a Tuesday by one person alone.",tips:"Shoot the three checks in order but film each one THREE times — a slow version, a normal version, and one extra-tight on just the hands. You'll want the options when you're timing to text. Get twice as much B-roll as you think you need: hands setting toys down, hands turning a box over, a finger tracing an age label. That filler is what saves the edit. Do the tug on a toy where nothing actually comes off — the beat is the CHECK, not a failure; never show a part detaching and never show a toy near a mouth. Test the sound too: a firm tug on a well-made seam has a satisfying little nothing-happens quality, so record clean room tone even if you end up scoring it. Whole thing is a 45-minute shoot including setup, and the same setup gives you next week's carousel for free if you shoot a few flat-lay stills before you strike it."},shots:[{sec:"0:00–0:03",type:"Overhead static, tight",frame:"Bare wood surface. Two hands slide a plush toy into frame and set it down center.",action:"Toy lands. Hands rest beside it for a beat, then settle. No motion beyond that — the stillness is the hook.",txt:"Three things you can check on any toy — about ten seconds."},{sec:"0:03–0:11",type:"Overhead static, very tight on hands",frame:"Same plush. One hand steadies the body, the other pinches an eye / nose / pom-pom.",action:"A firm, deliberate tug. Hold it. Nothing moves. Hands release, then repeat once on a second attached piece — a bow, a tag, a little magnet.",txt:"1. Tug it. Eyes, noses, magnets — if it comes off for you, it comes off in a mouth."},{sec:"0:11–0:20",type:"Overhead static, tight on packaging",frame:"Hands turn a toy box over; a wooden stacker with a stamped age mark sits beside it.",action:"A finger lands on the age band and taps it once. Hands then slide the unlabeled marketplace toy in beside it — no tap, just a small pause.",txt:"2. Find the real age band. 0+ · 6m+ · 3+ — not \"fun for all ages.\""},{sec:"0:20–0:29",type:"Overhead static, tight on hangtag",frame:"A hangtag or box panel, turned so the small print faces camera.",action:"Finger traces along to a testing mark / safety standard / brand name. Then hands set the toy down gently, palms open beside it.",txt:"3. See who tested it. If the listing can't tell you — that's information too."},{sec:"0:29–0:36",type:"Overhead static, pull back to full table",frame:"All the toys back in frame, arranged loosely. Hands come in and simply rest at the edge of the table.",action:"One hand gives a small final pat to the nearest toy, then both hands lift out of frame. Hold on the still table for a full second.",txt:"Nobody hands you this list. Ten seconds, and it's yours for good."},{sec:"0:36–0:41",type:"Overhead static, end card over the table",frame:"Same table, toys settled, empty hands out of frame.",action:"Text card fades up over the held shot. No zoom, no whoosh.",txt:"Tug it · check the age · see who tested it 💛 Save this for the next birthday haul."}],edit:{hook:"Open on the tug already in progress — the hand pinching and pulling — then cut back to the toy landing on the table. First frame is hands doing something, never a title card alone. Text hits at 0:00 and holds three full seconds, because on Facebook a lot of this plays with the sound off and the first line has to carry the whole promise.",pace:"Slow and calm on purpose. Roughly one cut every 6-9 seconds — this is a reference, not a fast edit, and rushing it would make the subject feel urgent, which is exactly the wrong register. Let each check breathe for a beat after the action finishes so the eye can land. One optional speed-ramp: nothing. Resist it.",captions:"Burned-in, large, high contrast, bottom third but lifted clear of platform UI. Plain sans, no jitter/bounce/karaoke effects. Number the three checks 1 / 2 / 3 in a consistent position top-left so it reads as a list even if someone scrubs. Auto-captions ON as well for the spoken VO version.",audio:"Two lanes. FB + IG: soft warm original VO in the brand's mom-to-mom register — unhurried, half-smiling, no urgency in the read — over a low, gentle instrumental bed at about 15% so the VO stays legible on a phone speaker. Do NOT use a dramatic or ominous track; the music is doing reassurance work here. TikTok: swap the VO for a trending-audio-forward cut in the calm-explainer lane, or the dread-setup-then-plain-answer structure that's live right now (build a small worry, resolve it flat and kindly) — pick from what's actually trending the day it's cut, and if nothing suitable is live that week, run the original VO rather than force a sound.",overlays:"Minimal. A small numbered chip (1/2/3) top-left that persists per section, plus the check line in the lower third. One tiny hand-drawn circle or arrow to point at the age band and the testing mark — a single frame of highlight, then gone. No red, no warning icons, no alert triangles, no strike-throughs. Brand cream + indigo, sunshine yellow only on the end card. Nothing about this should look like a hazard notice.",length:"38-45s for Facebook and Instagram. 22-28s for the TikTok cut (drop the pull-back beat, tighten each check to about 6s).",aspect:"9:16 primary for Reels/TikTok. Export a 4:5 for the Facebook feed and Instagram grid, and pull three stills from the same shoot for a 1:1 carousel version — the flat-lay setup gives you all four ratios from one 45-minute shoot."},channels:[{k:"fb",who:"Gifting Grandma 👵",cut:"LEAD CUT. She is the one shopping a marketplace listing for a birthday, and she's the person with the least idea which listings have been vetted — so this is where it earns the most. Run the full 45s with the warm VO, and let it be slower than feels comfortable. Caption goes long here: write the three checks out as plain numbered text in the post body so it works entirely without playing the video, and open with a line that gives her permission — something like 'nobody handed us this list either.' Add one sentence acknowledging she's often buying for a baby she doesn't see every day, so the age band matters more, not less. No product mention in the body at all; close with a single soft line about how every item that goes in the box gets checked the same way. Post mid-morning weekday when she's actually scrolling. Pin it to the top of the page — this is evergreen and it will keep working in November."},{k:"ig",who:"Millennial Mom 💜",cut:"Polished Reel at 38s, then IMMEDIATELY repurpose the same shoot as a 5-slide saveable carousel — cover 'the 10-second toy check', one slide per check, one slide that says 'screenshot this before the next birthday haul.' The carousel is arguably the more valuable asset here; saves are the whole point on this channel and a checklist carousel is the single strongest save-driver format on the platform right now. Tighter grade, cleaner type, brand palette locked. Caption is shorter and punchier than Facebook's, with the three checks as a scannable list. Add it to a Story with a 'save this' sticker and a poll — 'did anyone ever teach you this? yes / absolutely not' — then keep the whole thing in a permanent Highlight called Safe Play so it compounds."},{k:"tt",who:"Gen-Z Mom ⚡",cut:"Raw, fast, hook-forward, 25s. Start mid-tug with no setup at all and the text 'nobody teaches you this one' on frame one. Handheld-feel is fine here even though it's shot locked off — add a tiny bit of grain and skip the polish. Cut each check to about 6 seconds and drop the pull-back beat entirely; end on the three-word summary card. Text-overlay-led, trend-native audio in the calm-explainer or dread-then-relief lane, chosen the day it's cut. Lean hard into the comments — 'what's the one you'd add' is a genuine question here and this audience will answer it, which is a free part two. Zero product mention on this cut; discovery first."}],test:{hyp:"A no-baby, hands-only reference video will out-save and out-share the brand's baby-fronted content on Facebook — because the gift-buyer's instinct is to keep a useful checklist and forward it to her daughter, not to double-tap a cute clip. If true, the casting bottleneck isn't just a production constraint, it's been costing reach on the channel that matters most for gifting.",metric:"Saves + shares per 1,000 views on the FB and IG cuts, measured against the trailing 4-week average for baby-fronted posts on the same channels. Watch shares specifically — a forward is a grandmother sending this to a mom, which is the exact handoff the brand wants. Secondary: IG carousel save rate vs. the Reel, to learn which format the checklist really belongs in."},amplify:"Hold paid for 72 hours and let it prove itself organically first. Trigger: if the Facebook cut clears roughly 2x the page's trailing 4-week average on shares, put $250 behind it as an engagement-then-video-views campaign targeted to women 50-70 with grandparent and baby-gift interest signals, in the metros where subscriber density is already highest. Cap at $250 for the first week — this is a trust-building asset, not a conversion asset, so judge it on cost-per-share and 75%-completion rate, not clicks. If IG saves also over-index, spend a separate $100 promoting the carousel version to a lookalike of existing subscribers, since a saved reference post is a cheap way to stay in the feed of someone who hasn't decided yet. Do not put a discount or a purchase CTA on any of it; the whole value of this piece is that it asks for nothing.",drove:["A doll set got pulled this week for parts a baby could pu…","New national data: mothers trust AI companies less than a…","The infant-formula botulism investigation is still open —…"],why:"The safety story circulating in parent feeds right now isn't about recalls, it's about listings — and this is the one week the brand can turn that into a calm, useful skill instead of a scare, with no baby, no talent, and no product claim."},

  {id:"YGT-0720-1",pillar:"YGT",dna:"ugc-testimonial",plat:"IG + TikTok",anchor:false,noBaby:true,ladder:false,panelTags:["nobaby","value","quick","first-time"],concept:"An open call for \"small wins nobody claps for\" — the 22-minute nap, the cleared counter, the toy back in the basket — cut into a warm B-roll montage using a quiet, no-frills gratitude-callout style, not tied to any single trending audio or format. Week one is shot entirely in-house from brand B-roll so it can go live immediately; the caption opens the submission door so week two's version is built from real parents' clips. No baby, no talent booking, no face required from anyone.",hooks:["Nobody claps when the nap hits 22 minutes. We're clapping.","Things that deserve a hallelujah, according to us: 22 minutes of sleep.","Small wins nobody claps for — send us yours and we'll clap."],rec:0,caption:"Nobody claps when the nap is 22 minutes. Nobody claps when the counter is finally clear, or when the toy makes it back into the basket, or when everyone gets a bath on the same night. 👏\n\nSo we're clapping.\n\nDrop your smallest win of the week in the comments — the one that felt like something and that nobody else noticed. We're putting them together into next week's version of this, so if you want your clip in it, send us a video (hands, counters, baskets, laundry piles — no faces needed unless you want them in). 💜\n\nTwo small things: we only ever use a clip you've sent us on purpose, and if your little one is anywhere in frame, keep a hand on them while you film — ALWAYS supervise, even for five seconds of B-roll.\n\nYou are doing so much more than you're giving yourself credit for. 🤍",lead:{ch:"Instagram",who:"Millennial Mom 💜 — the core subscriber, the one who saves it and then sends it to her group chat"},shoot:{setup:"Home interior, one real lived-in home (a team member's or a local parent's — not a set). Shoot mid-morning or late afternoon on the side of the room the window is on, so everything is soft daylight from one direction — no overhead kitchen lights, they go orange and flat. Phone handheld at chest height, close and low, 3–5 inches from what you're shooting so the hand fills the frame. Props are all things that already exist in the house: a monitor screen showing a timer, a basket of toys, a folded burp cloth, a cold half-drunk coffee, a kitchen counter mid-clear, one wooden or high-contrast toy from a box going back into a basket, a phone screen with a sleep timer or note. Nothing styled, nothing tidied first — the wrinkle in the sheet is the whole point.",cast:"NO baby on camera. NO photogenic mom on camera. NO founder. One pair of adult hands is the entire cast — any adult on the team, any skin tone, no face, no booking, no release beyond the person holding the phone. This is a shoot one person can complete alone in under an hour. If a baby happens to be in the house, they stay out of frame entirely; do not build any beat around them.",tips:"Shoot in one continuous sweep through the house rather than setting up shot by shot — walk kitchen → living room → nursery doorway → laundry and grab each beat as you pass it, then walk it again backwards for a second angle. Get 12–14 beats even though only 6 make the cut; the montage lives or dies on having options, and the ones that land are almost never the ones you planned. Every clip: start recording two seconds before the action and hold two seconds after — you need the handles for the beat-matched cuts. Shoot each hand-action twice, once slow and once at normal speed, so the editor can pick what sits on the audio. Do NOT clean anything before filming. The real version of the counter, the real pile of laundry, the real 40% coffee — polish reads as a different family than the one watching. Finally, shoot one vertical 'submission' end card plate with empty space in the lower third so the same footage can carry different CTAs across the three channels without a reshoot."},shots:[{sec:"0:00–0:02",type:"Extreme close-up, static",frame:"A baby monitor screen or phone timer, slightly off-centre, thumb resting at the edge of the frame",action:"The timer ticks over. A thumb hovers, doesn't tap. Hold completely still — this is the only static shot in the piece and it buys attention for everything after.",txt:"22 minutes"},{sec:"0:02–0:05",type:"Close-up, slow push in",frame:"Adult hands lifting the last cup off a kitchen counter, crumbs and one dish towel still visible",action:"Hands sweep the last item away, then pause flat on the empty counter for a beat. The pause is the win.",txt:"the counter was clear for four minutes"},{sec:"0:05–0:08",type:"Overhead close-up",frame:"A wooden toy going back into a woven basket, other toys already inside",action:"One hand drops the toy in, the other lifts the basket slightly and sets it down — the small, satisfying finality of a thing put away.",txt:"everything went back in the basket"},{sec:"0:08–0:11",type:"Close-up, handheld drift",frame:"A mug of cold coffee on a side table, hand wrapping around it",action:"Hand picks it up, tilts it to check, sets it back down without drinking. Cut on the set-down.",txt:"I drank half of it while it was still warm"},{sec:"0:11–0:14",type:"Medium close-up",frame:"A folded stack of tiny clothes on a bed, one hand pressing the top of the pile flat",action:"Hand smooths the stack, then rests there for a second. Slowest beat in the piece — let it breathe before the turn.",txt:"the laundry is folded. it is not put away. that still counts."},{sec:"0:14–0:18",type:"Close-up, static, end card",frame:"Empty lower third over the basket or the cleared counter, soft light",action:"Hold on the last real image while the text lands. No graphic wipe, no logo sting — the text arrives on top of the room the viewer has been in the whole time.",txt:"what's your small win this week? tell us — we're clapping 👏"}],edit:{hook:"Open on the 22-minute timer with the first line of text already on screen at frame one — no build, no logo, no black. The number does the hooking; a viewer with a baby understands '22 minutes' instantly and a viewer without one keeps watching to find out why it matters.",pace:"Slow for a montage on purpose — roughly 3 seconds per beat, cut on the completed hand-action rather than on the beat of the audio. The format's whole emotional trick is that each item gets a moment of respect before the next one arrives. Resist the urge to speed-ramp; a fast cut turns 'we see you' into a listicle.",captions:"Burned-in text, lowercase, one line at a time, centred low but clear of the platform UI. Warm off-white on a very soft shadow so it survives a bright kitchen. Text arrives about 4 frames after each cut, never with it. Auto-captions ON as a second layer only if there's spoken audio — there isn't in the base cut, so keep the burned-in text as the only word on screen.",audio:"IG lead cut: a warm, slow, mom-relatable audio bed (soft piano or gentle vocal, mid-tempo) — check the app's trending-audio panel the day of posting and use whatever's genuinely warm and in rotation that day; don't lock the edit to one named track in advance. TikTok cut: match whatever's trend-native and slow-building in the parenting-discovery lane that day, or lead with the on-screen text card carrying the hook if nothing fits that mood. Facebook cut: drop trend audio entirely — a soft instrumental bed under the same picture, because the FB audience often watches on mute and trend audio reads as noise there. Never let the audio dictate the cut points; the hand-actions do.",overlays:"Text only — no stickers, no confetti, no counters, no logo bug until the final frame. The one permitted graphic is a small hand-clap emoji beside the end-card line. Anything more decorative undercuts the plainness that makes the piece feel true.",length:"16–18 seconds for IG and TikTok. Facebook version can run to 22 seconds with two extra beats and a slower end card.",aspect:"9:16 vertical, 1080×1920, with all text kept inside the middle 70% so the IG Reels UI and the TikTok caption block never cover a word. Export a 1:1 crop of three beats for the Story submission ask."},channels:[{k:"ig",who:"Millennial Mom 💜 — core subscriber",cut:"LEAD CUT. The polished 16-second version, six beats, a warm trending audio bed confirmed live same-day, burned-in lowercase text. Caption as written, with the submission ask in the third paragraph so it reads as an invitation rather than a campaign. Post to Reels, then immediately push a 1:1 three-beat Story with a question sticker reading 'your small win this week?' — the Story is where the clips actually come in, the Reel is where the reach comes from. Pin the two best comment replies. Watch saves and shares over views: a save here means she's coming back to it, a share means it went to the group chat, and the group chat is the whole point."},{k:"tt",who:"Gen-Z Mom ⚡ — discovery",cut:"Raw and hook-forward. Reorder so the laundry line — 'the laundry is folded. it is not put away. that still counts.' — moves to the front as the opening card, because it's the funniest and the most screenshot-able, and TikTok needs the personality inside the first second. Keep it to 14 seconds and five beats, cut a half-beat tighter, and let the footage look handheld rather than smoothed. Add a spoken original-audio line only if the trend audio has cooled. Caption is short: 'small wins nobody claps for 👏 drop yours' plus #firsttimemom #newmom #momsoftiktok. Reply to the best comment with a video reply using the same B-roll — that's the cheapest second post of the week and it usually outruns the original."},{k:"fb",who:"Gifting Grandma 👵 — gift-buyer",cut:"Slower, warmer, longer. 22 seconds, two extra beats (a hand smoothing a crib sheet, a hand closing a nursery door), soft instrumental instead of trend audio because this audience watches on mute and trend sounds read as noise. Rewrite the caption longer and in full sentences with no lowercase styling — something like: 'There are a hundred small things a new parent does every day that nobody notices. The nap that only lasted twenty minutes. The counter that finally got cleared. The load of laundry that got folded even if it never got put away. If there is a new mom or dad in your life, they did about forty of these today and told nobody. Tell us about someone who is quietly doing a great job — we would love to clap for them.' That reframe turns the same footage from a mom-solidarity post into a permission slip for a grandparent to say something kind, which is exactly the emotional doorway that eventually leads to a gift."}],test:{hyp:"A warm, no-product open call inside a B-roll montage will produce usable community footage without any incentive attached — meaning the brand can build a standing UGC supply line on goodwill alone, not on giveaways or promos. If it works, week two's version of this post costs nothing to shoot and is fronted entirely by real customers.",metric:"Count qualifying clip submissions (usable footage, sender explicitly offered it) within 72 hours of posting, alongside IG saves and shares. Read 12+ usable clips as a green light to make this a monthly recurring slot; 4–11 as a signal to keep the format but move the ask into a dedicated Story sequence; under 4 as a sign the ask needs to be a direct DM invite to existing engaged followers rather than an open call."},amplify:"Hold all spend until organic proves it. Gate: if the IG Reel clears roughly 300 saves or a 2:1 shares-to-comments ratio in the first 48 hours, put $200 behind it on IG Reels over five days targeting women 25–40 in the US with parenting and baby-development interests, and exclude current subscribers so the spend buys new people rather than re-reaching the list. Run a second $75 on the TikTok cut to a broad US 22–35 audience purely to test whether the raw reorder holds a colder audience. Do not boost the Facebook cut on day one — hold it, and if the grandparent-framed caption outperforms organically on comments, put $125 behind it in the first week of August when gift consideration starts warming. Total exposure if every gate opens: $400. If the saves gate doesn't clear, spend nothing and keep the footage — it's a reusable B-roll library either way.",drove:["The 'Everything Hallelujah' gratitude list is still in ro…"],why:"Small wins nobody claps for is an easy-to-slot-into, evergreen container — not tied to one trending audio or format — and early parenthood is almost entirely made of exactly this kind of invisible effort, so the fit is honest rather than borrowed. It costs nothing to cast, requires zero babies, and the open call turns a one-off post into a standing supply of community footage."},

  {id:"YGT-0720-2",pillar:"YGT",dna:"parent-hack",plat:"IG + TikTok",anchor:false,noBaby:true,ladder:false,panelTags:["first-time","nobaby","quick","value"],concept:"The goodbye routine that actually helps at drop-off — short goodbye, never sneak out, one consistent handoff ritual — shot this week with adult hands and text so it is live before the first day, not after it.",hooks:["If the first daycare drop-off is somewhere on your calendar, here's the goodbye that actually helps. 💛","Nobody warns you that the goodbye is the hard part — not the daycare.","Separation anxiety isn't a red flag. It's a sign you're their favorite person."],rec:2,caption:"Separation anxiety isn't a sign anything's wrong. It usually shows up around 8 months, peaks somewhere near 18 months, and most little ones settle into a new routine within about two to four weeks. It's not a problem to fix — it's your baby knowing exactly who you are. 💛\n\nIf a first drop-off is coming, the three things that seem to help most:\n\n1. Keep the goodbye short. A long, drawn-out goodbye feels longer to them, not safer.\n2. Never sneak out. As tempting as it is, the goodbye is the part that teaches \"she always comes back.\"\n3. Pick ONE little ritual and do it every single time — same words, same order. Two taps on the doorframe, a kiss on the hand, a wave through the window. Whatever's yours.\n\nThe nice part: you can practice it at home this week. Same three steps at bedroom doors, at the front door, at grandma's. By the actual first day, it's already familiar to both of you.\n\nOne quick safety note: most daycares ask that comfort objects stay in the bag rather than the crib until after the first birthday, in line with standard safe-sleep guidance — they'll usually let you know exactly where the lovey lives during naptime.\n\nYou're going to be okay. Both of you. 🧡\n\nSave this for the week before. #separationanxiety #daycaredropoff #firsttimemom #babymilestones #gentleparenting",lead:{ch:"Instagram",who:"Millennial Mom 💜"},shoot:{setup:"One morning, one location: a kitchen counter plus the nearest interior doorframe. Shoot 8-10am so you get real soft window light — no ring light, no overheads (they go orange on a phone). Phone locked on a small tripod or propped on a stack of books, 9:16 vertical, shooting slightly DOWN at the counter for the bag beats and straight-on at chest height for the doorframe beats. Props are all things a parent already owns: a small toddler backpack, a lovey or small stuffed animal, a labeled water bottle, a folded change of clothes, a pair of tiny shoes. Wipe the counter and clear the background — one clean surface reads more premium than any filter. Keep the palette warm and plain (cream, wood, one soft color); no branded packaging in frame so this stays useful-not-salesy.",cast:"NO BABY NEEDED. NO on-camera face needed. This is adult hands only — any team member with steady hands and a plain sleeve. That's the whole point of this one: it can be produced on a Tuesday with no casting call, no wrangling, no photogenic-mom booking. If a real toddler happens to be around, still shoot the hands-only version FIRST so you have a guaranteed cut in the can.",tips:"Shoot the doorframe ritual (taps → kiss on hand → wave) at least four times so you have clean matched takes — it's the one beat that has to look effortless and it never does on take one. Get 5-8 extra seconds of pure 'nothing' B-roll: hands zipping the bag slowly, the lovey going into the front pocket, an empty doorway with light on the floor. That surplus is what lets you re-cut this into an August version without reshooting. Shoot everything twice — once tight, once a little wider — so the TikTok cut can breathe differently from the IG cut. Last thing: film ONE silent 6-second wide of the empty doorway at the end. It's the shot you'll want for the mid-August re-post and you will not want to go back for it."},shots:[{sec:"0:00-0:03",type:"Overhead close-up, locked off",frame:"Kitchen counter, morning window light. A tiny backpack, a lovey, a folded change of clothes. Adult hands enter frame and start slowly zipping the bag.",action:"Hands zip the bag closed in one unhurried motion, then rest for a beat. No cut — let the first three seconds be calm on purpose, so the text does the stopping.",txt:"separation anxiety isn't a red flag. it's a sign you're their favorite person."},{sec:"0:03-0:08",type:"Slow push-in, handheld (gentle)",frame:"Same counter, tighter. Hands smooth out the folded clothes and set them beside the bag.",action:"A small, tidy, ordinary gesture — this beat is a text beat, so the hands just need to be quietly busy underneath it.",txt:"it usually starts around 8 months and peaks near 18. most little ones settle into a new routine in about 2-4 weeks."},{sec:"0:08-0:14",type:"Straight-on medium, chest height",frame:"Interior doorframe, soft light spilling from the room behind. Just a hand and forearm at the edge of frame.",action:"The ritual, beat one: two soft taps on the doorframe. Hold the hand there half a second longer than feels natural — that's what makes it read as a ritual instead of a gesture.",txt:"1. keep it short. a long goodbye feels longer to them, not safer."},{sec:"0:14-0:20",type:"Close-up, locked off",frame:"Back at the counter. The lovey, the front pocket of the backpack.",action:"Hands tuck the lovey into the front pocket, pat it once, and zip. Warm, deliberate, unhurried.",txt:"2. never sneak out. as tempting as it is — the goodbye is what teaches them \"she always comes back.\""},{sec:"0:20-0:26",type:"Straight-on medium, slightly wider than shot 3",frame:"The same doorframe, now with the backpack hooked over a shoulder at the edge of frame.",action:"The full ritual runs once, clean and quick: two taps, a kiss pressed to the palm, a wave. Then the hand drops out of frame. This is the take you shot four times — use the smoothest one.",txt:"3. pick ONE ritual and do it every single time. same words, same order, every day."},{sec:"0:26-0:31",type:"Static wide, no movement",frame:"The empty doorway. Morning light on the floor. Bag hanging on the hook.",action:"Nothing happens. Hold on the empty frame for a full five seconds and let the last line sit. The stillness is the reassurance.",txt:"practice it at home this week — at bedroom doors, at grandma's. by the first day, it's already familiar. 💛"}],edit:{hook:"Open cold on the hands zipping the bag with the reassurance line already on screen at 0:00 — no logo, no intro, no 'let's talk about.' The reframe IS the hook: a parent bracing for a shaming take gets relief in the first second and stays for the three steps.",pace:"Deliberately slow for the category — six beats over ~31 seconds, roughly 4-6 seconds each, with the final beat held completely still. Everything in this feed is fast and anxious; calm is the differentiator. Cut on the completion of each hand gesture, never mid-motion. No zooms, no whip transitions, no speed ramps.",captions:"Burned-in text, lowercase, one idea per card, centered in the upper third so nothing sits under the platform UI. Chunky rounded friendly type (Baloo 2 / Fredoka energy), cream card behind the text at ~85% opacity so it stays legible over the window light. Numerals 1/2/3 in the sunshine yellow accent so the three steps are scannable on a muted autoplay. Keep native auto-captions ON as well for accessibility.",audio:"IG: warm, low-key trending mom-relatable audio in the soft-piano/gentle-acoustic lane — no lyrics competing with the text cards, ducked to roughly 25% so it sits under rather than over. TikTok: same visual, different register — swap to a calm original VO of the three steps read plainly by a team member (no performance, just a normal voice), because the TikTok discovery audience rewards a real voice on reassurance content and it makes the piece stand alone on mute-off. DO NOT name a specific song at brief stage — pull whatever is genuinely trending in the parenting/reassurance lane the day of the edit and confirm it's live before publishing.",overlays:"Nothing but the six text cards plus a small persistent bottom-corner tag reading \"save this for the week before\" from 0:20 to the end — that line is the save prompt and the save is the metric. No stickers, no arrows, no countdown timers, no fear-toned emoji. One 💛 at the end and that's it.",length:"28-32s for IG Reels. Trim the TikTok cut to 22-26s by shortening beat two and the final hold.",aspect:"9:16 vertical, 1080x1920. Keep all text inside the middle 80% safe area so nothing crops on the FB feed re-crop."},channels:[{k:"ig",who:"Millennial Mom 💜",cut:"LEAD CUT — this is the one the whole piece is built for. Full 28-32s Reel, all six beats, warm trending audio under the text, plus a matching 5-slide static carousel posted separately the following week with the identical three steps so she has a version she can screenshot at 2am. Caption runs long and reassuring with the save prompt in the first line. Pin it to the grid in the second week of August when daycare search interest actually peaks — this cut is made now specifically so it can be re-surfaced then, not scrambled together after the first drop-off."},{k:"fb",who:"Gifting Grandma 👵",cut:"Slower, warmer, and pointed at the person doing the pickup and drop-off rather than the person dreading it. Same footage, but re-cut to 40-45s: hold each beat two seconds longer, drop the third text card's 'every single time' urgency, and add one closing card — 'if you're the one doing drop-off this fall, the ritual works for you too.' Caption is the longest of the three, written grandmother-to-mother, opening with 'the first weeks are harder on the grown-ups than anyone admits.' No trending audio here; use a soft instrumental bed. This is also the natural place to say nothing about the box at all — it earns goodwill in the exact audience that buys gift subscriptions in Q4."},{k:"tt",who:"Gen-Z Mom ⚡",cut:"Raw and hook-forward. Trim to 22-26s, lead with hook variant 1 ('nobody warns you that the goodbye is the hard part — not the daycare') as spoken text over the very first frame, and run the calm original VO instead of music. Keep the shakier handheld takes — polish reads as an ad here. Add the keyword phrase 'daycare drop off separation anxiety' in the on-screen text within the first 3 seconds for search surfacing, and again in the caption. Ask one question in the caption to farm comments: 'what's your goodbye ritual? stealing ideas for someone's first week.' Reply to comments with a second and third tip — that's a free follow-up post's worth of reach."}],test:{hyp:"Reassurance content planted three to four weeks AHEAD of a search wave outperforms the same content posted into the wave, because it accumulates saves quietly while the feed is uncrowded and then re-surfaces to a warm audience. If true, the engine should be seeding every calendar moment on a 3-4 week lead instead of a same-week one.",metric:"Save rate (saves ÷ reach) at day 7 vs. the account's rolling 30-day average — target 2x, since a save is the honest signal for this format. Secondary: total reach on the mid-August re-post vs. this week's original, plus share-to-DM count, which is the 'sending this to my sister' behavior this piece is actually built for."},amplify:"Hold all budget at launch — post organic only and let it accumulate saves for 10-14 days. GATE: if save rate clears 2x the account's 30-day average by day 10, put $200 behind the Instagram Reel starting the second week of August (not before), targeting parents of 6-24 month olds in the three largest metros plus a lookalike of existing subscribers, optimized for engagement rather than link clicks — there's no offer in this piece and a conversion objective would waste it. Run a $50 parallel test on the Facebook 40-45s cut to a 45-65 gift-buyer audience; if cost-per-save comes in under the IG cut, that's a real finding about where reassurance content actually pays and it should redirect next month's spend. If the organic save gate isn't cleared, spend nothing and keep the footage — the piece still re-posts free in August.",drove:["August's calendar is three weeks out — the content that l…","Back-to-daycare content crests in about three weeks"],why:"It's the highest-leverage deposit on the calendar: the daycare-goodbye conversation crests in about three weeks, this is the version that films this Tuesday with adult hands and zero casting, and reassurance is the thing parents actually save and forward."},

  {id:"YGT-0720-3",pillar:"YGT",dna:"no-baby-explainer",plat:"IG + FB",anchor:false,noBaby:true,ladder:false,panelTags:["reassure","first-time","nobaby"],concept:"One quiet post that names Black Maternal Mental Health Week (July 19–25), states the disparity plainly, points to the Shades of Blue Project — the organization that founded the week — and sells absolutely nothing. No product, no CTA, no link to anything the brand makes money from, no paid behind it. Nobody appears on camera: no baby, no mom, not even a pair of hands. Five typographic cards over still, unbranded room light. The restraint is the entire creative idea — this is the post that says what the brand is without ever mentioning the brand.",hooks:["This week is Black Maternal Mental Health Week — July 19–25.","Roughly 4 in 10 Black moms experience a maternal mental health condition. Up to half never get support for it.","\"Be strong for everyone else.\" A lot of moms got handed that sentence early, and never got handed anything else."],rec:0,caption:"July 19–25 is Black Maternal Mental Health Week. 💜\n\nRoughly 4 in 10 Black mothers experience a maternal mental health condition — about double the rate for mothers overall — and up to half of them never get support for it. That gap usually isn't about not wanting help. It's about being raised to be the strong one, for everybody, all the time, including on the days there's nothing left.\n\nSo, gently: being tired isn't a character flaw. Needing help isn't letting anyone down. And \"I'm not okay right now\" is a full sentence — you don't have to explain it, soften it, or earn the right to say it out loud.\n\nThe Shades of Blue Project founded this week and has been doing this work for years, connecting Black moms with support from people who actually understand what they're carrying. Their site is shadesofblueproject.org.\n\nThat's the whole post. Nothing to buy, nothing to click. Just — we see you, and there's a door there if you want it. 💜",lead:{ch:"Instagram",who:"Millennial Mom 💜"},shoot:{setup:"One quiet room in somebody's actual home, shot mid-morning. Find a north-facing window and work with what it gives you — natural light only, no ring light, nothing lit to look like content. Phone locked off on a small tripod or propped on a stack of books, never handheld, never moving. The five plates you need: (1) a plain wall with a slant of morning light across it, nothing else in frame; (2) a window with a sheer curtain lifting slightly in the air; (3) a mug on a counter with steam still coming off it, untouched; (4) an empty rocking chair, or the corner of an unmade bed with light falling on it; (5) that first wall again, shot last, so the light has visibly moved. Deliberately absent from every single frame: people, hands, a baby, the box, any product, any packaging, any logo, anything branded. If it can be identified as belonging to this company, it does not go in the shot.",cast:"NOBODY. No baby, no mom, no talent, no hands, no voiceover. This is the most casting-free brief on the board — one person, one phone, about twenty minutes, no scheduling, no wrangling, no booking anyone. That's partly a scale win and mostly a judgment call: casting a face for a post about Black mothers is not a decision to make casually inside one week, and a generic stand-in would read worse than an empty room. Light and words carry the whole thing.",tips:"Shoot the plates FIRST, before anyone writes a word — six to eight slow ten-second locked-off takes, so the edit has real choices instead of one usable frame per beat. Grab at least three options per plate. Shoot everything inside the same hour so the light matches across cuts; light that jumps between shots is the single thing that will make this look assembled rather than observed. Let the motion be accidental — a curtain drifting, steam rising, dust in a beam. Nothing should look directed. Do NOT grade toward the brand palette; warm and unbranded is the goal, and a branded-looking grade is the tell. Build the text as real design in a separate pass — on a piece with no performance in it, kerning and line breaks are doing more work than the footage is. Then read the whole thing out loud before it goes anywhere: if any line sounds like it's about the brand, cut the line. Last and most important — have someone outside the marketing team read it before it posts, ideally a Black mother on the team or in the community. If the answer comes back \"this doesn't feel right,\" don't post it. Silence is a completely acceptable outcome this week. A bad version is not."},shots:[{sec:"0:00–0:04",type:"Locked-off wide, static",frame:"Plain wall, a slant of morning light across it. Nothing else in the frame. The only movement is the light itself.",action:"Hold. Do not cut early — the stillness is what signals this isn't a normal post before a single word is read.",txt:"This week is Black Maternal Mental Health Week. July 19–25."},{sec:"0:04–0:09",type:"Locked-off medium, static",frame:"A window with a sheer curtain, lifting slightly in the air. Backlit, slightly overexposed at the edges.",action:"Hold on the curtain drifting. Cut on a moment where it's settling, not lifting.",txt:"Roughly 4 in 10 Black moms experience a maternal mental health condition. About double the rate for moms overall."},{sec:"0:09–0:13",type:"Static close-up",frame:"A mug on a counter, steam still rising off it. Untouched. Nobody reaching for it.",action:"Hold. Let the steam do the only moving. No push-in, no rack focus.",txt:"Up to half of them never get support for it."},{sec:"0:13–0:18",type:"Locked-off, static",frame:"An empty rocking chair in the corner of a room — or the corner of an unmade bed with morning light on it. Lived-in, not styled.",action:"Hold completely still. This is the beat that needs the most air; give it the full five seconds even if it feels long in the edit.",txt:"Not because they don't want it. Because \"be strong for everyone\" got taught early, and it stuck."},{sec:"0:18–0:22",type:"Locked-off wide, static — matches shot 1",frame:"The same wall from the opening, shot at the end of the session. The light has moved a few inches. Same room, later.",action:"Hold. The visual rhyme with the first shot closes the piece without needing a transition.",txt:"Being tired isn't a character flaw. \"I'm not okay right now\" is a full sentence."},{sec:"0:22–0:27",type:"End card, no footage",frame:"Clean cream background. Ink text, left-aligned. The account handle small in the bottom-left corner, no logo lockup, no color blocks.",action:"Static hold to the end. Set the organization's name and URL at the same type size as every other card — not smaller, not bigger.",txt:"The Shades of Blue Project founded this week. shadesofblueproject.org"}],edit:{hook:"The first frame is words, not motion — the name of the week lands inside the first second, before anyone has decided what kind of post this is. No logo, no face, no product in frame at any point, including the end card. If a stranger screenshots any single frame and sends it to a friend, it should read as a resource, not as an ad.",pace:"Slow on purpose — every beat holds four to five seconds, roughly half the speed of a normal Reel. The pacing IS the tone. If this cuts at normal speed it reads like an ad and the whole thing collapses. Straight cuts or a soft dissolve, nothing else: no zooms, no push-ins, no whip transitions, no speed ramps.",captions:"Set the text by hand in the edit — there's no voiceover, so auto-captions have nothing to do here and will look wrong if forced on. Left-aligned, generous line spacing, one thought per card, never more than two lines on screen. Ink on a soft scrim so it stays readable over the bright window plates. Same type size throughout — no emphasized words, no highlight colors, no bouncing or kinetic text, no words appearing one at a time.",audio:"No trending audio and no named song — a trend sound would undo this post entirely, and a recognizable meme audio under these words would be actively bad. Either a very quiet ambient bed recorded on set (room tone, a bird outside the window, the fridge) or a slow, unadorned solo instrumental at low volume. If nothing feels right, post it silent — silence is a legitimate choice here and both IG and FB handle silent video fine. The sound should never be the thing anyone notices.",overlays:"Text cards only. No stickers, no arrows, no countdown, no 'link in bio' animation, no brand color blocks, no pillar chips, no watermark. The final frame carries the organization's name and URL and nothing else.",length:"22–27 seconds. Don't stretch it. If the edit is running long, cut a middle beat rather than speeding anything up — losing a beat costs less than losing the pace.",aspect:"9:16 for the Reel and the TikTok cut. Also export a 4:5 still set — the same five text cards, same type, same design — for the IG carousel companion and the Facebook feed image. The still version is the one that gets screenshotted and forwarded, so treat it as a real deliverable and not an afterthought."},channels:[{k:"fb",who:"Gifting Grandma 👵",cut:"Static 4:5 image post, not the video — this audience reads, and a still holds in-feed for them where a silent Reel gets scrolled. Use the opening card as the image and let a longer, plainer caption do the work. Write this version so a grandmother reading it thinks of her own daughter or daughter-in-law rather than herself, and give her one thing to do that isn't a share button: \"if there's a new mom in your life who's been saying she's fine a little too quickly, this is a good week to call her.\" Put the URL in the caption body as plain text, not only as a link preview — this audience copies links far more than it taps them. This is the cut that actually gets forwarded."},{k:"ig",who:"Millennial Mom 💜",cut:"THIS IS THE LEAD CUT. Reel first, using the full 22–27s video, plus the same five cards published as a 4:5 carousel so it's saveable and screenshot-clean — the carousel is the version that gets sent into a group chat at 11pm, which is the real distribution here. Share the Reel to Stories with a plain text sticker linking to shadesofblueproject.org and absolutely nothing else on the frame — no poll, no question box, no 'DM me.' Do not add this to a Highlight sitting next to product Highlights; if it lives anywhere permanent, it lives on its own."},{k:"tt",who:"Gen-Z Mom ⚡",cut:"Optional and lightest-touch of the three — this is an IG+FB post first. If it runs on TikTok: same plates, cut rougher. Leave a half-second of extra head and tail on each shot, and set the words in TikTok's own native text tool rather than importing the designed cards, because this audience reads polish as insincerity and imported graphics as a brand asset. Lead with the flattest possible line — 'this week is Black Maternal Mental Health Week' — and put the organization's name in the on-screen text, not only in the caption, since captions get collapsed. Run it silent or on a bare instrumental. No trend audio, no hooky edit, no 'wait for it.' Pin a comment with the URL."}],test:null,amplify:"No paid behind this one — deliberately, and that's the recommendation, not an oversight. Putting brand dollars behind brand visibility during somebody else's awareness week is the exact move that turns amplification into marketing. Zero spend, zero targeting. One practical thing to actually go do, though: tell whoever runs the ad account to exclude this post from engagement-based custom audiences. Otherwise the standard setup quietly scoops everyone who watched a maternal mental health post into a product retargeting pool, and that's the version of this that would genuinely embarrass the brand three weeks from now. Worth checking before the post goes live, not after.",drove:["Black Maternal Mental Health Week starts the day this con…","Black Maternal Mental Health Week starts the day this wee…"],why:"VERIFICATION NOTE — this changed the copy, so it's first. The dates are confirmed: the Shades of Blue Project's own site lists Black Maternal Mental Health Week as July 19–25, 2026, so naming the dates on screen is safe. The theme string is NOT confirmed. Their site returned two different theme lines on two different pages this week, and the phrasing this brief was originally planned around (\"Building an Accountable Village…\") did not appear on either one. So no theme is quoted anywhere in this post, and the word \"village\" is carried in the brand's own words rather than presented as an official line. Naming the week and pointing to the organization is fully defensible. Putting an official-sounding theme in quotation marks that turns out to be last year's — or nobody's — would be the single worst way to participate in a week like this. If someone can confirm the current theme directly with the organization before this goes out, it can be added; until then it stays out. The national hotline number was also left off for the same reason: it could not be verified this session, and a wrong number on a mental health post is unforgivable. Only the organization's name and URL are asserted.\n\nWHY POST AT ALL. The oldest line this brand has is that nobody's there to hold your hand through parenthood, but we will. A week built on precisely that promise opens on the Monday this content week opens. Sitting it out quietly is defensible. Posting a pastel graphic that says nothing is not — that's the version people screenshot to make fun of. The version that earns the right to exist names the week, states the disparity plainly, points at the people actually doing the work, and asks for nothing at all.\n\nCASTING. Nobody is in this — not a baby, not a mom, not a pair of hands. Partly that makes it the cleanest no-baby brief on the board: one person, a phone, twenty minutes, no booking anyone. Mostly it's that choosing a face for a post about Black mothers isn't a decision to make casually inside a single week, and a generic stand-in would land worse than an empty room does. Light and words carry it, and they carry it better.\n\nON THE RECOMMENDED HOOK. Hook 3 is the strongest scroll-stopper of the three, and it is not the recommendation. On a week this brand doesn't own, the plain announcement is the right register — this is amplification, not a performance of feeling. Hook 3 borrows the emotion; hook 1 hands over the microphone.\n\nNO TEST, ON PURPOSE. Every experiment worth running on this post would mean optimizing a resource post for brand outcomes, and the founder should see the engine decline that rather than dress it up. No product, no CTA, no link to anything the brand sells, no paid. If it performs, good. That isn't why it exists, and the restraint is the only reason it's credible."},

  {id:"BOJ-0720-1",pillar:"BOJ",dna:"unbox-with-payoff",plat:"IG + TikTok",anchor:false,noBaby:false,ladder:true,panelTags:["milestone","quick","value","first-time"],concept:"An unboxing sequenced by the clock instead of the packing list. Each item is introduced as the exact moment of a stuck-inside day it was built for — 9am fresh energy, 11am wind-down, 1pm needs-to-move, 3pm sink water, and then the one that stayed in the box until 4pm. The reveal isn't the product, it's the shape of a day the parent is already living this week. Ends on the age-band logic said out loud, gently: this is what an 8-9 month day needs, and next month it needs something else.",hooks:["It's too hot to go outside today, so we are not leaving this room. Here's the box, sorted by the clock instead of the packing list.","I stopped opening the box all at once. Now every toy has a time of day it belongs to — and 4pm gets the good one.","Nobody tells you the hardest part of a heat wave is 4pm. This is what we saved for it."],rec:0,caption:"Another too-hot-to-go-outside day ☀️ so we opened the 8–9 month box by the clock instead of all at once.\n\n9am — she's freshest, so this is when the stacking cups come out. That's when she's got the patience for the hard one.\n11am — winding toward nap, so quiet hands only. Soft book, low light.\n1pm — she wakes up needing to MOVE. Push toy, clear rug.\n3pm — the stretch nobody warns you about. Two inches of water in the sink, towel on the floor. (ALWAYS supervise around water — never step away, not even for a second 💛)\n4pm — this is the one we kept in the box all day. New object, tired baby, and suddenly you've got twenty more minutes.\n\nEvery month her days change shape, so the box does too. That's the whole idea 🧡\n\nSave this one for the next stuck-inside day. Which hour is your hardest? 👇",lead:{ch:"Instagram",who:"Millennial Mom 💜 (core subscriber)"},shoot:{setup:"One room, one day, natural light. Shoot on a clean living-room rug or kitchen floor with the unopened box in frame — a real home, lightly tidied, not styled. Phone on a low tripod or propped on a stack of books at baby-eye height for the floor beats; add one overhead (phone flat on a shelf edge or held above) for the box-open and the sink beat. Props: the full 8–9 month box unopened, a folded bath towel, a shallow sink or basin with 2 inches of water, a lamp for the 11am low-light beat, and a wall clock or phone clock you can re-set between beats (this is your continuity trick — one clock, five times). Keep a lint roller and a damp cloth on hand; the floor is on camera the whole video.",cast:"Parent hands + one baby in the 8–9 month band. The baby is only genuinely needed for the 1pm and 4pm beats — everything else is hands, objects, and the clock. If the baby has a bad morning, shoot all five object beats solo and drop the baby into 4pm only; the video still works. No founder on camera, no second adult required.",tips:"Shoot the object beats FIRST while the room is clean and the light is even — baby last, when you know exactly what you need from her. Reset the clock between every beat and shoot the clock as its own 1-second insert so you can always cut to it if a transition doesn't land. Get double coverage of the 4pm reveal: one from above (hands lifting it out) and one at floor level (her face finding it) — that second angle is the whole payoff and you only get it once before it stops being new to her. Overshoot the sink beat by a lot; water play is unpredictable and the good three seconds are usually in the middle. Keep every item in the box until its hour arrives — if it's sitting out in an earlier shot, the reveal is dead."},shots:[{sec:"0:00–0:03",type:"Overhead static",frame:"Unopened box on the rug, hands sliding it into frame, sliver of a bright window at the edge",action:"Hands push the box into center. No opening yet. Hold one beat too long on purpose.",txt:"Too hot to go outside. The whole day is happening in this room."},{sec:"0:03–0:09",type:"Overhead → floor-level cut",frame:"Clock reading 9:00, then hands lifting the stacking cups out of the box",action:"One-second clock insert, cut to hands pulling the first item free and setting it on the rug.",txt:"9am — she's freshest right now. So this is the one that asks the most of her."},{sec:"0:09–0:15",type:"Low-light static, lamp only",frame:"Clock reading 11:00, then hands opening the soft book on a lap, blanket edge in frame",action:"Lights lower. Hands turn one page slowly. Everything in this beat moves at half speed.",txt:"11am — sliding toward nap. Quiet hands only."},{sec:"0:15–0:21",type:"Floor-level tracking, baby's first appearance",frame:"Clear rug, push toy, baby up on hands and knees moving toward it",action:"Baby wakes into the shot and goes for the push toy. Let it be real — wobbles included.",txt:"1pm — she wakes up needing to MOVE. Clear the rug, let her chase it."},{sec:"0:21–0:28",type:"Overhead, sink",frame:"Two inches of water, one floating cup, baby's hands slapping the surface, towel visible on the floor below",action:"Hands lower a cup into the water. Splashing. Parent's arm stays in frame the entire time.",txt:"3pm — the stretch nobody warns you about. Two inches of water. ALWAYS supervise 💛"},{sec:"0:28–0:36",type:"Dual angle — overhead then floor-level on baby's face",frame:"Clock reading 4:00, hands lifting the last item out of the box, then her face finding it",action:"The box is opened for the last time. New object arrives. Cut to her reaction, hold it, then end card.",txt:"4pm. You're out of ideas, she's out of patience. So this one stayed in the box all day. → This is the 8–9 month box. Next month her days look different, so it does too."}],edit:{hook:"Open on the unopened box with the too-hot-out line — do NOT open it in the first three seconds. The withheld box is the retention device; the viewer stays because they can see there's something in it that hasn't been shown.",pace:"Slows and speeds with the day: brisk cuts on 9am, breathe on 11am, fastest cut of the video on 1pm, loose on 3pm, then a deliberate hold on the 4pm reveal. The pacing should feel like a day, not a montage.",captions:"Burned-in, bottom third, high-contrast white with a soft dark scrim so it survives over the sink water. Keep every line under seven words per card — the clock times do the structural work, the captions just carry the why.",audio:"Warm, low-key trending mom-relatable audio in the domestic-summer register — something that can sit under text without demanding attention. On the 4pm beat, duck the music and let two seconds of real room sound through (the splash, her noise) before the end card; the drop in production value is what makes it read as true. TikTok cut swaps to a faster, hook-forward trending sound in the parenting-discovery lane. Do not pick anything with a hard beat drop — the video's structure is a day, not a reveal.",overlays:"Time stamps as a fixed element in the same corner every beat — 9AM, 11AM, 1PM, 3PM, 4PM — so the viewer can feel the clock advancing without reading it. One small age-band chip in the lower corner from 0:28 (\"8–9 months\") so the age logic is visible before it's spoken. No logos until the end card.",length:"34–38s on IG, 22–26s on TikTok (cut the 11am beat and shorten the sink).",aspect:"9:16 vertical, single master. Shoot with headroom above the box so a 4:5 IG feed crop and a 1:1 Facebook crop can both be pulled from the same footage without losing the clock stamp."},channels:[{k:"ig",who:"Millennial Mom 💜 — core subscriber",cut:"THE LEAD CUT. Full 34–38s, all five hours, polished color and clean burned-in captions. Built to be saved, not just watched — pin a first comment that lists the five hours as plain text so it can be screenshotted and sent to a group chat without replaying the video. Caption runs long and lands on the age-band line. Watch saves and sends over views here; this is the one that gets reopened at 4pm on a different day."},{k:"tt",who:"Gen-Z Mom ⚡ — discovery",cut:"22–26s, raw and hook-forward. Drop the 11am wind-down beat entirely and shorten the sink to two seconds. Open cold on the 4pm clock and the closed box — \"this one stayed in the box until 4pm and here's why\" — then rewind to 9am and run the day fast. Text-overlay-led, faster cuts, trend-native sound, no color grade. The reveal lands twice: once as the cold open, once for real at the end."},{k:"fb",who:"Gifting Grandma 👵 — gift-buyer",cut:"Slower 40s cut with an extra two seconds on the 1pm and 4pm baby beats — she is here for the baby, not the format. Reframe the caption toward what the day actually costs a parent: a long, warm write-up of what a stuck-inside day looks like at 8–9 months and how having something new in reserve at 4pm changes it. Keep the supervise-around-water line prominent. Close on the age-band idea framed as the gift logic — a box that changes as the baby does — with no product ask."}],test:{hyp:"Sequencing an unbox by the hours of a real day, with one item deliberately withheld until the 4pm reveal, will hold viewers well past the point where a packing-list unbox loses them — because the viewer is watching a day they recognize, not a list. Our bare unboxes die around 120 views; if the clock structure is the fix, it should show up as watch-through, not just reach.",metric:"Watch-through past 15 seconds vs. the last three straight unbox posts, and saves-per-1,000-views on Instagram. Secondary read: comment replies naming their own hardest hour — that's the signal the day-shape, not the box, is what landed."},amplify:"Hold all spend until the organic IG cut clears a 30% watch-through past 15 seconds within 48 hours — if the clock structure isn't holding people organically, paid just buys the same drop-off. If it clears, put $250 behind the 4:5 IG cut to a lookalike of the last 90 days of savers, and $150 behind the slower Facebook cut targeted to 55+ in warm-climate metros where stuck-inside-with-baby content over-indexes this time of year. Cap both at seven days — the heat framing has a short shelf life and stops earning once the season turns. If the Facebook cut outperforms on cost-per-thruplay, that's the read to carry into the Q4 gifting window, not just this post.",drove:["Second heat wave of the month set all-time records — indo…","Round two of the heat — 'stuck inside, again' is the mood"],why:"This is the week the \"what do I do with her at 4pm\" question is being asked out loud — another stretch of too-hot-to-go-outside days supplies a real reason-to-post for free — and it turns the brand's worst-performing format into its clearest demonstration of age-stage logic without ever claiming it."},

  {id:"BOJ-0720-2",pillar:"BOJ",dna:"unbox-with-payoff",plat:"TikTok",anchor:false,noBaby:true,ladder:true,panelTags:["nobaby","quick","hack","reassure","first-time","box"],concept:"The first box moment with nobody in it. A dread-building instrumental swells over a pile of brand-new toys while adult hands hunt every one of them for a single line telling you what age it's for — and find nothing. Music cuts. Then the plain, calm answer: the three things you can check on any toy in about ten seconds, and where the age band actually lives when a toy has one. Two angles, adult hands, no baby, no talent to book — which is the quiet second point of the piece: a box can perform without a performer.",hooks:["me looking for the age on a toy that doesn't say the age. anywhere.","the toy arrived. the age band did not.","ten seconds, three things — before any new toy goes in the basket"],rec:0,caption:"the toy showed up. the age it's for did not 🙃\n\nthree things you can check on basically anything, in about ten seconds:\n1. does anything come off?\n2. is there an age range on it?\n3. does it say who tested it?\n\nthat's the whole check. no app, no research spiral, no guessing at 11pm. (and ALWAYS supervise with anything new!)\n\nit's also the exact check we run on every item before it ever goes in a box — so that when it lands at your door, the stage it's for is already sorted. 💛",lead:{ch:"TikTok",who:"Gen Z mom · discovery"},shoot:{setup:"Kitchen or dining table, clean light wood or a plain cream tablecloth, late-morning window light coming from one side (no overhead kitchen bulbs — they go yellow and flat). Props: six brand-new toys with tags still on, straight out of their mailers — deliberately include 3–4 that genuinely have no age printed anywhere, plus 2 that DO have a clear age range so the payoff is real and not staged. Keep one shipping mailer and a crumple of packing paper in frame at the edge; it reads 'this just arrived' without you having to say it. Two phone positions: (A) overhead, locked — phone flat on a tripod arm or wedged between two stacked cookbooks with a third book as the counterweight, lens looking straight down at the pile; (B) a handheld tight angle at table height for the hands-turning-it-over shots. Shoot both angles of every beat so you can cut between them.",cast:"ZERO baby. One pair of adult hands — anyone on the team, no face, no voice, no booking, no nap-schedule negotiation. Short or bare nails and no distracting rings; the hands should read as anybody's. This is the first box brief in the library that can be shot in a 40-minute window by one person alone, which is the whole point of running it.",tips:"Shoot the ENDING first, while the table is still tidy and the light is best — the three-check beat and the resolve are the part that has to be clean, and they're the part you'll rush if you leave them till last. Then mess the table up and shoot the dread build; messy is free. Get way more coverage of hands-turning-a-toy-over than you think you need — a good 6–8 separate 4-second takes of flipping, thumbing past a fabric tag, tilting a box to the light — because the build is entirely made of those and you'll want to pick the three most satisfying. Grab 10s of the pile just sitting there, untouched, as a safety opener. One real trap: don't let the hands move fast during the build. Slow, patient, slightly-too-long searching is what makes the horns funny; frantic reads as stressed, and stressed is the one thing this brand doesn't do."},shots:[{sec:"0–2s",type:"Overhead wide, locked",frame:"The full pile of new toys, tags on, mailer at the edge of frame. Hook text burned in across the top third.",action:"Start with the hands ALREADY entering frame and picking up the first toy — no still frame, no logo, no cold open. Music starts low and unresolved underneath.",txt:"me looking for the age on a toy that doesn't say the age. anywhere."},{sec:"2–6s",type:"Tight handheld, table height",frame:"One toy filling the frame, turned slowly in two hands.",action:"Hands rotate the toy a full turn, thumb past the sewn fabric tag, tilt the box panel toward the window light to read it. Nothing. Set it down, a beat too gently.",txt:"nothing on the box"},{sec:"6–10s",type:"Three quick cuts, alternating overhead + tight",frame:"Three different toys, one per beat — a plush, a rattle, a wooden thing.",action:"Same search, three times, slightly faster each time as the horns climb. Last one: the hands stop, and just hold the toy still. Let it sit a full second too long.",txt:"nothing on the tag → nothing in the listing → nothing"},{sec:"10–12s",type:"Overhead, locked",frame:"The toy set down on the table. Hands flat on either side of it, still.",action:"HARD CUT to near-silence here — this is the whole hinge of the video. Room tone only. The text card changes from white-on-dark to warm cream, and nothing else moves for two full seconds.",txt:"okay. so how do I actually check this one?"},{sec:"12–15s",type:"Tight, calm, one slow move",frame:"Hands hovering over a plush's eyes, pom, and ribbon trim.",action:"A gentle tug on the eyes, the pom, the ribbon — does anything come off. One take, cut on the action, no zoom.",txt:"1. does anything come off?"},{sec:"15–18s",type:"Tight, calm, one slow move",frame:"Hands turning a second toy to its seam and base.",action:"A finger traces the seam of the tag and the base of the box, hunting for a printed range.",txt:"2. is there an age range on it?"},{sec:"18–21s",type:"Tight, calm, one slow move",frame:"Close on packaging small print.",action:"A finger lands on the small print and holds there a beat.",txt:"3. does it say who tested it?"},{sec:"21–27s",type:"Close-up → overhead resolve",frame:"Hands lift ONE of the well-labelled toys. Punch in on the printed age range. Then pull to the overhead of the whole tidy table.",action:"Land it. A clean close on the age range printed right there, held long enough to read. Then the wide, hands out of frame, final car
