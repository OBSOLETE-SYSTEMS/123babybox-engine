d. Age bands go BIG (top third, high-contrast, rounded sans) so someone can scrub and find their baby's age instantly — the age band is the navigation. Keep the descriptive line one size smaller directly underneath. Nothing in the bottom 20% of frame on the TikTok cut (UI covers it).",audio:"TikTok lead cut: original audio — the real room sound of the tin, plus a low warm trending mom-relatable instrumental sitting under it at 15–20%. No named or licensed track unless someone verifies it is genuinely current on the day of posting; original sound also gives this a shot at becoming a reusable sound for the account. IG cut: same original room sound, warm mellow instrumental bed slightly higher at 25%, with a soft duck under each age-band card.",overlays:"A small persistent safety line in the lower-left from 0:07 onward: 'bigger than baby's fist — always supervise.' Small, calm, always there, never a flashing warning graphic. Optional: a tiny progress marker (1/3, 2/3, 3/3) top-right so a viewer knows the video is a set and stays for their age.",length:"TikTok 35–40s · IG Reel 30–35s (trim the front hold to 2s and the ending to 2s) · FB 45–50s (keep the slower open and let the ending breathe).",aspect:"9:16 vertical for all three. Shoot 4K wide-ish and crop in — do not shoot separate takes per platform."},channels:[{k:"tt",who:"Gen-Z Mom ⚡ (discovery)",cut:"LEAD CUT. Hook-forward and raw. Open on 'day four of indoors' over the striped light and get to 'one muffin tin' by 0:04. Keep the real kitchen exactly as it is — a dish in the sink helps here. Big age-band text, original audio, first comment reads 'saving this for the next 100° day?' to seed replies. Post between 8–10pm local when indoor-bored parents are actually scrolling. This is the discovery cut: it has to survive a stranger with no context in three seconds."},{k:"ig",who:"Millennial Mom 💜 (core subscriber)",cut:"Built to be SAVED, not just watched. Same footage, tighter grade (lift the shadows slightly, warm it a touch), and add a clean end card at 0:33 that stacks all three age bands as a single reference frame — that frame is the screenshot. Full caption with the age breakdown written out so it survives being sent into a group chat with the sound off. Pin to a 'no-toy activities' highlight. Watch saves and shares here, not views."},{k:"fb",who:"Gifting Grandma 👵 (gift-buyer)",cut:"Slower, warmer, longer. Keep the full 3-second opening hold and add a 3-second tail of the baby still playing. Caption opens conversationally rather than with a hook — 'It's the second heat wave this month and everyone is indoors again. This is the one that always works, and it costs nothing.' Spell out the age logic in plain sentences (no emoji stack), give the supervision line its own sentence, and close with a real question: 'What did you give the babies in your family to play with on hot days?' Grandparents answer that one, and the comments are the reach."}],test:{hyp:"Opening on the honest weather mood ('day four of indoors') instead of the activity itself will hold more of the 3-second audience than the brand's usual activity-first open, because it names a feeling before it offers a solution.",metric:"3-second view-through rate vs. the account's trailing activity-post average, plus saves-per-1K-views on the IG cut (target: saves outperform, since a save is the real signal a parent intends to use it)."},amplify:"Hold all spend for 48 hours organic. If the TikTok cut clears the account's trailing median 3-second retention OR the IG cut passes 300 saves, put $200 behind it as a TikTok Spark Ad using the ORIGINAL post (keeps organic comments and social proof attached), targeting parents 24–34 in the metros with confirmed record heat this month — Salt Lake City and Billings, plus other Mountain West/Great Basin metros currently under Extreme Heat Warnings — on a 5-day flight while the weather story is still true. Mirror $75 on Meta to the FB cut against 55+ interest-in-grandchildren in the same geos. Do not extend the flight past the heat event; the hook stops being honest the moment it cools off.",drove:["Round two of the heat — 'stuck inside, again' is the mood","Second heat wave of the month set all-time records — indo…"],why:"It rides the brand's single proven format with a genuine, dated reason-to-post attached — the second record heat wave of the month makes \"stuck inside again\" a true current mood rather than a decorative summer frame, and the muffin-tin build costs nothing, needs no shopping, and shows the age-stage logic instead of claiming it."},

  {id:"PWP-0720-2",pillar:"PWP",dna:"no-baby-explainer",plat:"TikTok",anchor:false,noBaby:true,ladder:false,panelTags:["nobaby","first-time","quick","diy"],concept:"\"Things nobody warned you about\" as escalating text cards over overhead hands-and-toys B-roll, cut to the week's substitution sound. Each card gets funnier and more oddly specific — then the last one drops the joke entirely and lands on relief: and you're doing fine. Nobody on camera, no baby, no booking. Two hours from phone-on-a-stack-of-books to posted.",hooks:["nobody warned me about the crinkle-toy sound I can now identify from two rooms away","things nobody warned you about (it gets increasingly specific)","nobody tells you the weird part. so here's the weird part."],rec:0,caption:"nobody warned us about any of this 😅 add yours below — we're collecting them.\n\nthe crinkle toy. the narrating. the 2am googling. somehow it all becomes normal, and then one day you look up and you're the one who knows which toy she reaches for first.\n\nyou're doing better than you think you are 💛\n\n(anything small enough to fit in a mouth — always supervise!)",lead:{ch:"TikTok",who:"Gen-Z Mom ⚡ — discovery"},shoot:{setup:"One surface, one window, 40 minutes. Clear a light wood table or the living-room floor beside the biggest window in the house and shoot mid-morning — soft directional daylight, never the ceiling light (it goes yellow and reads cheap). Phone flat overhead on a stack of books or a $15 gooseneck clamp, lens 24–30in above the surface, 4K/60 so slow-mo is available in post. Props: 6–8 real items pulled from an actual box (wooden ring stacker, crinkle/sensory book, silicone teether, soft ball, rattle, board book) plus the real-life props that make it read like a home and not a set — half-drunk coffee, burp cloth, one lonely sock. Keep the surface 60% empty so the text cards have somewhere to sit. Second angle if you have 10 more minutes: phone propped at table-edge height for one low, side-on shot — cutting between overhead and side is the single thing that makes a B-roll list feel edited rather than assembled.",cast:"NO BABY. NO ON-CAMERA TALENT. One pair of adult hands — anyone on the team, no makeup, no face, no scheduling. Short nails or a quick clean-up, no loud rings that catch the light, and if hands are a worry, shoot with sleeves pushed to the forearm so the frame reads warm and casual rather than clinical. This is the format the brand can produce on a Tuesday without asking a single person to bring their child anywhere.",tips:"Shoot every beat twice as long as you need — a 2.5s card wants a 6s clip, because the trim point that syncs to the audio is never where you guessed. Get all the hand actions in ONE continuous 8-minute session before you think about text; matching text to footage is a 20-minute desk job, but re-shooting a hand is a whole re-setup. Grab three insurance shots you didn't script: hands stacking rings, hands putting one toy back in a basket, hands closing a book. Those solve any hole in the edit. Vary the tempo of the hands — one beat slow and deliberate, the next quick and messy — because if every clip has the same energy the escalation dies no matter what the text says. Last thing: shoot the FINAL calm beat first, while the light and your patience are both at their best. It's the shot the whole piece lives or dies on."},shots:[{sec:"0:00–0:03",type:"Overhead, static, hands enter frame",frame:"Empty-ish light wood surface, soft window light from camera-left. Two hands slide a wooden ring stacker into the middle of frame and start stacking. Coffee mug just visible top-right.",action:"Hands stack two rings, unhurried. The stack is slightly crooked — leave it crooked, that's the whole texture.",txt:"nobody warned me about the crinkle-toy sound I can now identify from two rooms away"},{sec:"0:03–0:06",type:"Overhead, quick cut, faster hands",frame:"Crinkle sensory book dropped into frame, hands scrunching one page open and closed.",action:"Hands work the crinkle page twice, fast and a little chaotic. Energy steps up from beat one.",txt:"or that I'd narrate my entire day out loud to someone who cannot talk back"},{sec:"0:06–0:09",type:"Side-on low angle, table-edge height",frame:"Silicone teether and a soft ball rolling across the surface toward camera, hands chasing.",action:"Hand nudges the ball, it rolls, hand catches it just before it exits frame. One clean beat of motion.",txt:"or that I'd have a favorite spoon. a favorite. spoon."},{sec:"0:09–0:12",type:"Overhead, fastest cut of the piece",frame:"Hands sweep four toys into a rough pile — rattle, ball, teether, board book — then push the wooden ring on top.",action:"Deliberately messy. Peak escalation, peak clutter, hands moving quickest here.",txt:"or that the $6 wooden ring would beat every single thing I researched for a week"},{sec:"0:12–0:15",type:"Overhead, hands slow down",frame:"Same pile, but hands are now placing one item back into a basket, one at a time.",action:"The visual turn. Motion downshifts. Frame starts clearing.",txt:"or that I'd google \"is this normal\" at 2am and the answer would almost always be yes"},{sec:"0:15–0:19",type:"Overhead, static, near-empty frame — hold",frame:"Surface is 80% clear. One wooden ring stacker sitting neatly in the middle, basket at the edge, hands resting flat on the table on either side. Nothing moves.",action:"Hold completely still for a full three seconds. No hand movement, no push-in. Audio drops out or thins under this card. The stillness IS the punchline.",txt:"nobody warned you about any of it.\nand you're still doing fine."}],edit:{hook:"Open on the first text card already up before the hands finish their first move — no title card, no logo, no \"POV.\" The oddly-specific line is the hook; it needs to be legible inside 0.4s. Card 1 stays up slightly longer than the rest (about 3s) so the viewer commits to reading, then the pace tightens.",pace:"Accelerating, then a hard brake. Beats 1–4 shorten as they go (3s / 3s / 3s / 2.5s) so the list physically feels like it's spiraling. Beat 5 stretches back out. Beat 6 is a dead-still 3–4 second hold. That deceleration is the whole trick — if you cut the last card at the same speed as the others, the piece reads as a complaint instead of a hug.",captions:"On-screen text cards ARE the content, not a subtitle layer — but still burn TikTok auto-captions off and set your own. Big, high-contrast, lowercase, single weight, center-lower-third so the platform UI doesn't eat them. Keep every line to one or two thumb-widths of reading. No emoji inside the cards; the emoji lives in the caption. Final card gets slightly larger type and an extra beat of air above and below it — it should look different from the joke cards.",audio:"TikTok lane. The escalating-substitution-list sound the team's editor already has saved is the native fit — cut the text cards to the escalation points, not to a metronome. Two rules: (1) only use a sound you can actually see trending in the TikTok app that day, never one pulled from a doc, and (2) whatever you pick, drop the volume or cut it entirely under the final card so the last line lands in near-silence. If nothing current fits, this works just as well on warm low-key acoustic mom-relatable audio with the same volume drop at the end — the format does not depend on the song.",overlays:"Text cards only. No stickers, no arrows, no countdown timers, no branded lower-third. One small logo bug bottom-right for the last 3 seconds ONLY — the piece has to read as a person talking, not a brand posting, right up until the final beat.",length:"18–20s. Do not go past 22 — the escalation loses its shape and the ending stops feeling like a turn.",aspect:"9:16 vertical, 1080x1920. Keep all text inside the middle 70% vertically so nothing collides with the caption block or the profile rail."},channels:[{k:"tt",who:"Gen-Z Mom ⚡ — discovery",cut:"LEAD CUT. Full 18–20s, trend-native, raw. Sound-forward, text-card-led, no logo until the last 3s. Caption trimmed to two lines plus the comment prompt — TikTok reads long captions as trying too hard. This is the cut everything else is cut down from, and it's the one to watch: comments are the real metric here, because \"nobody warned me about ___\" is a format strangers finish for you."},{k:"ig",who:"Millennial Mom 💜 — core subscriber",cut:"Reel at 15s, tightened by dropping the spoon beat. Cleaner grade, slightly more considered framing, and warm relatable audio rather than the raw trend cut. Full caption with the you're-doing-better-than-you-think line intact, because this is the audience that screenshots that sentence into a group chat. Post the same list as a 6-slide saveable carousel 48 hours later — same words, one line per slide, final slide clean — so the piece earns saves as well as views."},{k:"fb",who:"Gifting Grandma 👵 — gift-buyer",cut:"Slower, warmer, 22s with each card held about a second longer — this audience reads at a different pace and doesn't need the escalation to be frantic. Swap the $6-wooden-ring line for a gentler one (\"or that the simplest toy in the basket would be the favorite\"). Caption runs long and conversational, opening to grandparents directly — what nobody warned YOU about, thirty years ago — and asking them to add theirs. That comment thread is the actual asset on Facebook; the video is just the invitation."}],test:{hyp:"A general-audience trend format translated into baby-development language, produced with zero people on camera, can hold its own against the brand's baby-fronted content — meaning reach isn't actually dependent on casting, only on speed of translation. If the no-baby cut lands within 60% of the trailing baby-fronted median, the casting bottleneck is a habit rather than a constraint.",metric:"Views + comments at 72h vs the trailing 4-post baby-fronted median, plus a hard production count: hours from setup to posted (target: under 3). Comment volume is the tiebreaker — a fill-in-the-blank format should out-comment a demo even if it under-views it."},amplify:"Hold all spend for 48h. Gate: if organic passes ~8% saves-plus-shares against views, or the comment thread clears 40 genuine \"nobody warned me about…\" replies, put $250 behind the TikTok cut as a Spark Ad — boost the actual organic post so the comment thread travels with it, targeted to women 24–34 in the US with baby/parenting and Montessori-toy interests. Run a $150 parallel test on the Instagram Reel to a 1% lookalike of existing subscribers to see whether this format converts or only entertains. If the Facebook comment thread outperforms (likely — grandparents write essays), put $100 into boosting that post to a 45+ gift-buyer audience; it's the cheapest warm introduction to the brand this week.",drove:["'Bangladesh' is the substitution sound of the moment","Nothing broke in the parenting niche this week — and that…"],why:"The week's stickiest general-audience format needs no face, no performer and no baby — and nothing broke inside the parenting niche this week, so whoever translates a general trend into parent language first owns the lane. This is the cheapest possible trend entry for a brand whose reach has always been capped by casting."},

  {id:"PWP-0720-3",pillar:"PWP",dna:"activity-demo",plat:"IG + TikTok",anchor:true,noBaby:false,ladder:false,panelTags:["milestone","budget","first-time","quick","diy"],concept:"Episode two of the wake-window franchise. Same format that did 1.6M views — four everyday-object activities for one wake window — moved up one age band to 6–7 months, and shot as a numbered episode instead of a one-off. A title card at the top (\"Wake Window Wins · Ep. 2 · 6–7 months\") and a next-episode card at the end turn the brand's single biggest hit into something parents can expect, follow for, and come back to. It also gives the age-band logic a shape: by episode four, a parent scrolling the grid can see her baby's stage sitting on a map instead of hunting for a one-off tip.",hooks:["Your 6–7 month old wants to grab absolutely everything right now — here are four things to hand them during one wake window.","Episode two: the 6–7 month wake window. Four activities, twenty minutes, nothing you don't already own.","Stuck inside again this week? Four 6–7 month activities that need zero new toys and zero leaving the house."],rec:1,caption:"Wake Window Wins · Episode 2 · 6–7 months 💛\n\nThis is the grab-everything, bang-everything, put-it-all-in-my-mouth stage — and honestly, that's the good part. All four of these use things already in your house:\n\n🤲 Hand it over at the middle — offering a toy right at their center line gives them a reason to pass it from one hand to the other\n🥁 Two things that clunk — two blocks, two cups, whatever's safe and mouthable. The noise IS the lesson\n🎯 Just out of reach — sit them on a firm surface with a favorite toy a few inches away and let them work for it\n👋 Peekaboo with a muslin — they're just starting to figure out that you still exist when they can't see you, and it never gets old\n\nYou don't need any of this to be perfect. Twenty minutes, four little things, and then everybody naps.\n\n⚠️ ALWAYS supervise — everything at this age goes straight in the mouth, so keep it bigger than their fist and check nothing comes loose.\n\nEpisode 3 lands next week: 8–9 months 👀 Save this one for their wake window today.",lead:{ch:"Instagram",who:"Millennial Mom 💜"},shoot:{setup:"One room, one session, shot on a phone. Living-room or nursery floor with a clean play mat or a plain low-pile rug — no busy pattern, it fights the on-screen text. Shoot mid-morning next to the biggest window in the house, baby and props facing the light, curtains sheer or open; if the light is harsh (a real risk in this heat), tape a white bedsheet over the window to soften it. Phone on a small tripod or propped on a stack of books at roughly baby's seated eye level, locked overhead-45° for the activity beats. Lock exposure and focus before you roll so it doesn't hunt every time a hand moves. Props, all from a normal house: 2 wooden blocks, 2 stacking cups, a muslin swaddle, a soft rattle or small ball, a firm couch cushion or Boppy for sitting support, and a laundry basket for one B-roll shot. Nothing bought, nothing branded — that's the point of the format.",cast:"One baby in the 6–7 month band (sitting with support is enough — do NOT cast for a baby who sits unassisted, half the age band doesn't yet and the video shouldn't imply they should) plus one adult, hands and lap only, no face required. If the baby's caregiver is camera-shy, this shoots entirely from the shoulders down. Baby in a plain solid onesie — no logos, no slogan tees. Have a second baby in the same band on standby if you can; this format lives or dies on the baby being in a decent mood, and you cannot direct a 6-month-old.",tips:"Shoot around the baby's real wake window, not your schedule — start about 15 minutes after they wake, and be fully set up before they're in frame so you're not burning their good mood on tripod fiddling. Shoot the activities in order of how much sitting stamina they take: banging and transferring first, sit-and-reach in the middle, peekaboo last (it's the one that still works when they're getting tired). Get 3–4 full takes of EVERY beat and at least 20 seconds of rolling per activity — you want the unplanned moment, the surprised face when the blocks clunk, that's the frame that travels. Overshoot two things specifically: hands-only inserts of each prop (they save you when a take is unusable) and 10 seconds of the baby just existing happily, for the end card. Then film the title card and the next-episode card as real footage on the same rug, same light, so the series bookends look native instead of pasted on. Budget 45 minutes of actual rolling. If the baby is done at 20, you're done — the leftover activities become Episode 2B, and that's a feature of a series, not a failure."},shots:[{sec:"0:00–0:02",type:"Title card over live B-roll",frame:"Overhead of the play mat, adult hands sliding two wooden blocks into frame, baby's socked feet just visible at the edge",action:"Blocks land, baby's feet kick — cut on the kick. Series title animates on over the live shot, not a static graphic.",txt:"WAKE WINDOW WINS · EP. 2\\n6–7 months"},{sec:"0:02–0:07",type:"45° over-shoulder, hands + baby",frame:"Baby propped upright against a cushion, adult hand entering from the right holding a rattle at the baby's center line",action:"Hand offers the rattle dead center, holds still, waits. Baby takes it in one hand, then passes it to the other. Hold the frame through the pass — that transfer is the whole beat.",txt:"1 · Hand it over at the middle\\nOffering it right at their center gives them a reason to pass it hand to hand"},{sec:"0:07–0:13",type:"Tight two-shot, top-down",frame:"Baby's hands and two wooden blocks on the mat, adult hands demonstrating once then withdrawing fully out of frame",action:"Adult clunks the two blocks together once, sets them down, hands leave. Baby grabs both, bangs them, reacts to the sound. Let the natural audio through here.",txt:"2 · Two things that clunk\\nThe noise is the lesson — they're learning they made that happen"},{sec:"0:13–0:19",type:"Side profile, phone at baby's eye level",frame:"Baby seated on a firm surface with cushion support behind, a favorite toy on the mat a few inches beyond their reach",action:"Toy is placed just past comfortable reach. Baby leans, stretches, works for it. They get it — and the shot ends on them getting it, always. Never cut on a fail.",txt:"3 · Just out of reach\\nA few inches is plenty — the reaching is the work, and the win is theirs"},{sec:"0:19–0:25",type:"Front-on, adult hands only",frame:"Muslin swaddle filling the frame, baby seated facing camera behind it",action:"Muslin lifts to cover, holds one beat, drops. Baby reacts. Repeat once, faster. Cut on the biggest reaction you got in any take.",txt:"4 · Peekaboo with a muslin\\nThey're just working out that you still exist when they can't see you"},{sec:"0:25–0:31",type:"Wide, held, no text motion",frame:"Baby seated on the mat with all four props scattered around them, morning light, adult hand resting nearby",action:"Baby plays on their own. No cutting, no zoom — just let it breathe for the reassurance line, then the series card resolves on the last beat.",txt:"None of this has to be perfect ⚠️ Always supervise — it all goes in the mouth at this age\\n\\nEP. 3 · 8–9 MONTHS · NEXT WEEK"}],edit:{hook:"Open on the blocks landing and the feet kicking — motion in frame one, before any text lands. The age band ('6–7 months') must be legible within the first second: it's the search term, the self-identification cue, and the reason a parent stops. The episode number sits under it, smaller — it builds the franchise without asking a cold viewer to care about it yet.",pace:"Steady, not frantic. Roughly one activity every 5–6 seconds with a real hold on each payoff moment (the hand-to-hand pass, the blocks clunking, the reach landing). Resist the urge to speed-ramp — this is a reference video parents will rewatch with a baby on their lap, and choppy cuts make it unusable. The final wide is the slowest shot in the piece on purpose: the whole video lands on 'you're doing fine,' and that needs air.",captions:"Burned-in, not auto-generated. Numbered labels (1–4) top-third in the chunky rounded display face; the one-line 'why' underneath in plain sentence case, ink on a soft cream pill so it reads over a busy rug. Keep every line under nine words — if it doesn't fit on two lines, it's too long for the format. Safety aside gets its own beat with the ⚠️ so it never competes with an activity label.",audio:"IG lead cut — a warm, gentle trending mom-relatable audio bed kept low (around 20%) with the natural room sound of the blocks and the baby's reactions mixed on top; those real sounds are half the charm and most brands bury them. TikTok cut — original VO, warm and unhurried, reading the four activities conversationally with the room audio underneath, plus a light trend-native bed if one in the parenting-discovery register is genuinely current at production time. Do not chase a named sound for this one: it's an evergreen reference piece and it should still make sense in November.",overlays:"Series bug — a small 'WAKE WINDOW WINS · EP. 2' chip in the same corner for the entire runtime, brand indigo on cream. That persistent chip is what turns a one-off into a franchise and costs nothing. Numbered step counter (1/4 → 4/4) bottom-corner so a parent knows how much is left. End card: 'EP. 3 · 8–9 MONTHS · NEXT WEEK' in the block-letter display face. No countdown, no arrows, no sticker clutter.",length:"IG 30–34s · TikTok 26–30s (drop the reassurance beat, hold the safety line) · Facebook 45–55s with a slower open and a wider establishing shot.",aspect:"9:16 vertical, shot and framed so the top and bottom 15% stay clear of anything essential — the safe zone gets eaten by the UI on both platforms and the numbered labels are the first casualty."},channels:[{k:"ig",who:"Millennial Mom 💜",cut:"LEAD CUT. The full 30–34s version with all four activities, burned-in labels and the reassurance beat before the end card. Post as a Reel and pin it to the grid directly beside Episode 1 so the series reads visually the moment someone lands on the profile. Cover image is the title card with '6–7 MONTHS' huge — the grid becomes the age map. Caption runs long and warm, all four activities written out so the post is genuinely useful even with the sound off or the video unwatched, and it closes on the save prompt. This is the cut built to be saved and reopened at 6am with a baby on the hip, and saves are the number to watch on it."},{k:"tt",who:"Gen-Z Mom ⚡",cut:"Hook-forward and rawer. Open on the VO before the first frame settles — '6 to 7 months, four things, none of them cost anything' — and get to activity one by 0:02. Cut the reassurance beat and the long final wide; hold the safety line. Keep the imperfect takes, the fumbled grab, the blocks that miss; polish reads as an ad here and this audience scrolls it. Text on screen in native TikTok styling, not the brand's, with the age band in the first caption line and in the on-screen text for search. Episode framing goes in the caption rather than a big end card — 'ep 2, doing 8–9 months next' — which reads as a person keeping a series, not a brand running a campaign."},{k:"fb",who:"Gifting Grandma 👵",cut:"Slower and warmer, 45–55s, opening on a wide establishing shot of the whole scene before any text — this audience wants to see the room, not be hooked. Same four activities, but the on-screen labels get an extra beat each and the copy leans to what the baby is learning rather than what to do. Long caption, no abbreviations, written to be read start to finish: what this stage looks like, why grabbing and banging matters, why the everyday objects work as well as anything you could buy, and the supervision note spelled out in full. Close on an invitation to send it to whoever is watching the baby this week — grandparents on daycare duty are exactly who shares this, and a forwarded activity list is how this audience passes a brand along."}],test:{hyp:"Explicit serialization — a persistent episode bug plus a named next-episode end card — converts passive viewers into followers at a materially higher rate than the same activity content posted as a one-off, because a parent follows a series she can expect and merely watches a tip she happens to find.",metric:"Follows per 1,000 views and saves per 1,000 views, measured at 72 hours, against the unnumbered wake-window posts as baseline. Secondary read: how many Episode 2 viewers also view Episode 3 next week — that carryover number is the real evidence a franchise exists."},amplify:"Hold all spend for 48 hours and let organic vote. Gate: if saves clear roughly 3% of reach on Instagram (the save rate is the signal here, not views — a save means a parent intends to use it), put $300 behind it over seven days as an IG Reels ad targeting parents of 0–2s, and run $150 of that as a retargeting layer aimed only at people who watched at least 50% of Episode 1 — that's the cheapest audience available and it's the one that makes the series compound. Keep $100 back for a TikTok Spark Ad on the organic post if the TikTok cut outperforms IG on completion rate; boosting the native post rather than a fresh upload keeps the raw register that made it work. If saves come in under the gate, spend nothing and change the hook on Episode 3 instead — the format isn't the problem, the first two seconds are.",drove:["Lovevery's creator data, updated Monday: they aren't buyi…","Lovevery is now selling proof, not toys — and the proof i…","Round two of the heat — 'stuck inside, again' is the mood"],why:"Their single biggest hit was treated as a lightning strike; this is the week it gets a number on it, and it costs nothing new to produce — the format, the props and the crew are already proven."},

  {id:"PWP-0720-4",pillar:"PWP",dna:"activity-demo",plat:"Facebook + IG + TikTok",anchor:false,noBaby:false,ladder:false,panelTags:["budget","diy","quick","gift","first-time"],concept:"Three indoor games you can play at Grandma's house using what's already in her kitchen drawer — the heat-wave activity post rewritten for the person who has the baby two afternoons a week. A wooden spoon and a muffin tin, a stack of silicone cupcake liners, and a set of measuring cups: each one shown as a real 40-second game, each one tagged with the rough age it clicks and the one thing the baby is practicing. Filmed at a kitchen table with adult hands doing the setup and the baby doing the playing, so it reads as \"here's something you two can do this afternoon\" rather than a lesson.",hooks:["It's too hot to go anywhere, and she's at your house until 4. Here are three games already in your kitchen drawer.","Grandmas: you do not need to buy anything for this afternoon. Open the drawer with the muffin tin in it.","Three things in your kitchen that a baby will play with longer than most toys — and what each one is quietly teaching."],rec:0,caption:"Second heat wave this month, and a lot of you have a little one at your place this afternoon with nowhere to go. 💛\n\nThree games, all from the kitchen drawer, nothing to buy:\n\n🥄 Wooden spoon + muffin tin (around 6–12 months). Bang it, drop the spoon in, fish it out. This is cause-and-effect — \"I do a thing, a sound happens\" — and it's one of the first big discoveries babies make.\n\n🧁 A stack of silicone cupcake liners (around 9–18 months). Let them pull the stack apart and stuff the liners into a cup. That in-and-out, pull-apart play is the same pincer grip they'll use to feed themselves.\n\n🥤 Measuring cups (around 12–24 months). Nest them, hide a cup under a cup, line them up biggest to smallest. Size and order, before anybody ever calls it math.\n\nNone of it needs to be pretty. Ten good minutes counts. And if she wanders off after four, that's not a failed game — that's a baby who got what she needed from it.\n\n⚠️ ALWAYS supervise. Nothing smaller than a toilet-paper tube, nothing with sharp edges or a magnet in it, and take the metal tin away if it gets flipped into a step stool. 😉\n\nWhich drawer game does your grandbaby love? Tell us below — we'll pass the good ones along. 👇",lead:{ch:"Facebook",who:"Gifting Grandma 👵 — the gift-buyer who is currently also the one running the indoor afternoon"},shoot:{setup:"One kitchen, one afternoon, one table. Shoot at a real kitchen table or a clean patch of tile floor — a home kitchen, not a styled set. Soft window light from the side (mid-morning or late afternoon, never overhead noon sun); if the room is dim, one lamp bounced off the ceiling behind the phone, never pointed at the baby. Phone on a small tripod or propped against a stack of cookbooks, roughly 3 ft back at seated-baby eye level for the play shots, plus a second position directly overhead for the top-down beats. PROPS (all from a normal kitchen, buy nothing): a metal 6-cup muffin tin, two wooden spoons, 8–10 silicone cupcake liners in mixed colors, a nesting set of measuring cups, one wide-mouth plastic cup or small mixing bowl, a clean dish towel. Sweep the background of anything that reads as clutter or as a hazard on camera — knife block, cords, hot mug. Neutral or warm-toned clothing on the adult; avoid busy prints, they fight the overlays.",cast:"ONE baby or young toddler (roughly 8–18 months is the sweet spot — old enough for all three games to visibly work) plus ONE adult, hands and forearms only. The adult is the grandparent stand-in: no face needed, no performance needed, just warm hands setting things down and reaching in. Do NOT put the founder on camera. If the baby is not available on shoot day, this brief still runs as an adult-hands-only demo — the games read perfectly with a grown-up's hands doing the play and the age tags carrying the developmental logic. Whoever books the baby: shoot after a nap and after a snack, and get written permission on file for the child's appearance before anything is filmed.",tips:"Shoot in reverse order of fragility: get the two hardest-to-fake beats first (the muffin-tin bang and the liner pull-apart) while the baby is freshest, and save the measuring-cup nesting for last since an adult can complete it solo if attention is gone. Roll continuously — do not stop and start between games; the single best 4 seconds of this whole piece will be an accident you didn't call. Get 3× more of every beat than you think you need, especially the baby's hands going INTO the tin and the liners spilling. Grab a silent 10-second overhead of each of the three setups just sitting on the table, untouched — those are your title cards and your thumbnail. Get one wide safety shot showing the adult sitting right next to the baby, hand within reach: it does the supervision work visually so the caption doesn't have to nag. Shoot the whole thing vertical 9:16 and frame a little loose so the 1:1 Facebook crop and the 4:5 feed crop both survive. And if the baby invents a fourth game with the dish towel, keep rolling — that's the outtake that ends the video."},shots:[{sec:"0:00–0:03",type:"Close-up, handheld, eye level",frame:"A kitchen drawer sliding open. Adult hand lifts out a muffin tin and a wooden spoon, sets them on the table with a soft clack.",action:"Open on the drawer, not on a face. The clack of the tin hitting the table IS the hook sound — leave it in.",txt:"Too hot to go anywhere and she's here till 4?"},{sec:"0:03–0:06",type:"Overhead, static",frame:"Top-down on the table: muffin tin, two wooden spoons, a stack of cupcake liners, a set of measuring cups, all laid out in a row.",action:"Slow reveal of the full lineup. Adult hand slides the last item in from the edge of frame.",txt:"Three games. All from your kitchen drawer. Nothing to buy."},{sec:"0:06–0:16",type:"Medium, eye level + one overhead cut",frame:"Baby seated at the table or on the floor, muffin tin in front, spoon in hand. Adult hands rest nearby, visibly close.",action:"GAME 1. Baby bangs the spoon on the tin, then drops it into a cup and fishes it back out. Cut to overhead as the spoon goes in. Let one real laugh or one real bang land clean.",txt:"1. Spoon + muffin tin · around 6–12 months\nBang it. Drop it in. Get it out.\nThis is cause and effect — \"I did that, and it made a sound.\""},{sec:"0:16–0:26",type:"Close-up on hands, eye level",frame:"A stack of silicone cupcake liners; baby's fingers peeling them apart one at a time and posting them into a wide plastic cup.",action:"GAME 2. The pull-apart is the money shot — get the pinch clearly in frame. Then the liners go into the cup, one, two, three. Let one miss the cup.",txt:"2. Cupcake liners · around 9–18 months\nPull the stack apart, stuff them in a cup.\nThat pinch is the same grip she'll use to feed herself."},{sec:"0:26–0:36",type:"Overhead, static",frame:"Measuring cups on the table. Adult hand hides a small cup under a big one, then baby (or adult) nests them and lines them up largest to smallest.",action:"GAME 3. Do the hide-and-lift twice — the second time, let the baby lift it. Finish on the cups nested into one stack.",txt:"3. Measuring cups · around 12–24 months\nNest them, hide one under another, line them up big to small.\nSize and order — before anyone calls it math."},{sec:"0:36–0:44",type:"Wide, static — the warm close",frame:"Adult and baby together at the table, mild chaos, liners everywhere, tin flipped over. Adult hand within arm's reach the whole time.",action:"No new activity. Just the two of them in the aftermath. Baby wanders off frame or hands the spoon to the adult. Hold two beats after you'd normally cut.",txt:"Ten good minutes counts.\nIf she quits after four, that's fine too — she got what she needed.\n⚠️ ALWAYS supervise. Nothing smaller than a toilet-paper tube."}],edit:{hook:"Cold open on the drawer sliding open and the tin hitting the table — sound-first, no logo, no intro. Text card lands at 0:01 while the hand is still moving. The face-free open is deliberate: this reads as \"someone in a kitchen like mine,\" not as a brand ad, which is what earns the stop on a Facebook feed.",pace:"Unhurried by design — this is the Facebook cut and the grandma audience does not want a jump-cut assault. Roughly 8–10 seconds per game, one clean cut in and out of each, no whip transitions. Two or three cuts per game maximum. Let the natural room sound breathe; the single laugh or bang gets a half-second of silence around it. The last shot holds two beats longer than feels comfortable — that hold is the whole emotional payoff.",captions:"Burned-in, large, high-contrast — assume the sound is off and the reader is over 55. Minimum 22pt equivalent, dark text on a soft cream card or white text with a subtle drop shadow, never thin type over a busy background. Keep every line inside the safe center so nothing gets clipped by the 1:1 crop. Also add a real closed-caption file for the FB upload — accessibility, and it lifts completion.",audio:"Original audio as the base — keep the real kitchen sound (the clack, the spoon, the baby). Under it, a warm, gentle instrumental bed from the platform's licensed library at low volume; no lyrics, no drop, nothing with a beat that fights the pacing. Do NOT chase a trending sound on the Facebook or IG cut — a viral audio reads as noise to this audience and buries the instructions. Optional soft VO from an adult woman reading the three game names only, if the team has someone comfortable; a full narrated version is not required and the piece works silent.",overlays:"Three consistent title cards, one per game, in the same fixed position (lower third, left-aligned): game name on line one, the age band on line two in a lighter weight, the developmental why on line three. Same card design all three times — the repetition is what makes it scan as a reference. Age bands always phrased as \"around X–Y months,\" never as a deadline. One small safety strip at the end, warm yellow, not red — a reminder, not a warning label. No countdown timers, no progress bars, no \"WAIT FOR IT.\"",length:"40–48 seconds for the Facebook lead cut. Trim to 30–35s for IG Reels by tightening the setup and the close. TikTok cut runs 18–24s.",aspect:"Shoot 9:16. Deliver 9:16 for Reels and TikTok; deliver a 1:1 or 4:5 export for the Facebook in-feed placement with all overlays re-positioned inside the square safe area — do not just letterbox the vertical, it kills the text size on desktop feed."},channels:[{k:"fb",who:"Gifting Grandma 👵",cut:"LEAD CUT — this is the one built first and everything else is derived from it. Full 40–48s, 1:1 or 4:5 in-feed export, unhurried pacing, all three games shown complete, closed captions on. Long caption exactly as written, because this audience actually reads and this is a feed where a 200-word caption performs. Post as a native Facebook video (never a link out, never a cross-posted Reel with an Instagram watermark). Reframe in the first comment with a plain invitation to name their own drawer game — Facebook comment threads on grandparent content are where this piece will actually earn its distribution, and the team should reply to every one of them by name within the first two hours. Land it late morning or early afternoon on a weekday, which is when the afternoon-shift grandparent is looking at her phone and the problem is live. No product mention anywhere in the post."},{k:"ig",who:"Millennial Mom 💜",cut:"Re-registered as a SAVE, not a watch. Tighten to 30–35s and change the framing from \"you have her this afternoon\" to \"send this to whoever has her this afternoon\" — this audience is the sender, not the doer. Add a fourth end card that lists the three games as plain text so the final frame is screenshot-able on its own, and put the three age bands in the first line of the caption so it scans in the preview. Caption cut to about a third of the Facebook length, warmer and quicker, safety aside kept intact. Add a hands-only carousel version to the calendar as a companion for the following week — same three games, five slides, zero casting — since the saveable-checklist format is the cheapest repeatable thing on this list and this content is already written for it."},{k:"tt",who:"Gen-Z Mom ⚡",cut:"Hook-forward and raw, 18–24s. Open on the mess at the END — liners everywhere, tin flipped — then hard-cut back with a text hook along the lines of \"three games from a kitchen drawer, no toys, no AC.\" Roughly 6 seconds per game, faster cuts, keep the real audio and the accidental laugh loud. Trend-native audio lane here rather than the warm instrumental bed: an escalating-list or substitution-style sound in the parenting-relatable register works if one is genuinely live on the day of posting — the team should confirm the sound is still trending in-app before using it and default back to original audio if it isn't. Caption is one line plus the safety aside. Do not reuse the Facebook caption here; the length alone will read as a boomer repost."}],test:{hyp:"Facebook has been treated as a dumping ground for reposted IG cuts. If we re-register the same durable insight for the caregiver who is actually running the indoor afternoon — grandma-addressed language, slower pace, longer caption, native FB upload — the Facebook cut will outperform the identical-topic IG cut on shares and comments, and pull follows from gift-buyers who have never bought a box.",metric:"Facebook shares + comment count vs. the IG cut of the same piece over 7 days; secondary read on new Facebook page follows in the 48h after posting, and on how many comments name a grandchild or an age band (a proxy for whether the gift-buyer actually recognized herself in it)."},amplify:"Hold all spend for 72 hours and let the organic signal decide. Gate: if the Facebook cut clears roughly 25 shares or 30 comments organically, put $150 behind it as a Facebook-only engagement-objective boost, ages 50+, US, interest-targeted to grandparents / grandchildren / gift shopping, with a lookalike off the existing purchaser list layered in. Keep it engagement-objective, not conversion — the job here is to build a warm gift-buyer audience for Q4, not to sell anything in July, and there is no offer in this post to convert against. If the boosted version holds its comment rate through week one, re-run the same $150 in late August against the back-to-daycare cut and start treating grandma-addressed activity content as a standing Facebook line item rather than a one-off. If it does not clear the gate organically, spend nothing and read the comments instead — a flat share count on this piece is itself the finding.",drove:["Round two of the heat — 'stuck inside, again' is the mood","Second heat wave of the month set all-time records — indo…"],why:"The second record heat wave of the month makes the indoor-activity ask genuinely live this week, and this is the only brief in the slate that speaks to the person who is actually running that indoor afternoon — the grandparent who has the baby two days a week, buys the gift subscription, and has never once been addressed directly by this brand's content."},

  {id:"MAP-0720-1",pillar:"MAP",dna:"expert-take",plat:"IG + TikTok",anchor:true,noBaby:true,ladder:false,panelTags:["expert","nobaby","first-time","quick"],concept:"The second sit-down in the standing monthly Milestone Map segment — same named, credentialed pediatric OT or SLP, same chair, same lower-third as last month — answering the three heat questions parents are typing right now: sunscreen under six months, how you'd actually know a baby is overheating, and whether the stroller cover is making it worse. Three questions, three plain answers, ninety seconds. No baby on set. Episode one proved parents will sit still for this; the point of episode two is that she's already a recognizable face coming back.",hooks:["Three questions we've been getting all week about babies and heat — answered by someone who actually knows.","Is my baby too hot? Here's how you'd know — no thermometer, no guessing.","Sunscreen, stroller covers, and overheating: the three things every parent is googling this week."],rec:1,caption:"\"Is my baby too hot?\" has been in our messages all week — so we asked. ☀️\n\nThree questions, three plain answers:\n\n☀️ Sunscreen under 6 months — generally not recommended yet. Shade, light long sleeves and a brimmed hat do the work instead.\n🌡️ How you'd know they're overheating — flushed skin, faster breathing, extra fussiness. The fix is usually simple: cooler spot, fewer layers.\n🚼 Stroller covers — a blanket draped over the top can trap warm air. Open shade and a clip-on parasol keep the air moving.\n\nOver 6 months and heading outside? A mineral SPF is generally fine — patch-test a small spot the day before.\n\nNone of this is a test you can fail. It's just three things that are nice to know before you head out. 💛 And as always, your pediatrician knows your baby best — this is the plain-language version, not a replacement for them.\n\nSave this one for the next 100° afternoon. She'll be back next month with three more. 👇 What should we ask her?",lead:{ch:"Instagram",who:"Millennial Mom 💜 — the core subscriber. She met the expert for the first time last month; this episode is the proof that the face comes back and the trust compounds."},shoot:{setup:"Same indoor location, same chair as episode one — match that frame exactly, don't reinvent it. Soft window light 45° off her face (sheer curtain if the sun is harsh), her seated 3-4 ft in front of the same plain warm wall used last month — cream, oat or soft indigo. No nursery clutter, no shelf styling, no visible product. Phone on a tripod at her seated eye level, chest-up framing, 4-6 ft back, portrait 9:16, lens locked (tap-hold to lock focus + exposure so it doesn't hunt when she moves). Lav mic clipped under the collar or a phone mic no more than 3 ft away — audio quality is what makes a talking head feel credentialed. Props: literally three — a wide-brim baby sun hat, a light long-sleeve muslin layer, and a clip-on stroller parasol. They sit off-frame and come into the shot in her hands only.",cast:"NO BABY. NO PARENT TALENT. NO FOUNDER — Zarina stays off this segment entirely; it belongs to the expert. One person on camera: the same credentialed pediatric OT or SLP from episode one (a peds RN also works for this specific heat topic). The credential line is already locked from episode one — her real first + last name and her real letters (OTR/L, MS CCC-SLP, RN). Confirm it matches exactly; that two-line lockup is the segment's whole asset and it must never change between episodes. One crew person to run the phone and read the questions off-camera.",tips:"If this topic wasn't already captured in the original batch session, shoot 3-4 more episodes back to back now — that's the entire economics of the segment: one booking, one hair-and-outfit, months of authority content banked at once, and the frame stays identical because it's never struck between sessions. Bank the next few topics for episodes 3-5 (daycare germs, why babies mouth everything, the 8-month clinginess) whenever the next batch happens.\n\nHave the crew person ask each question out loud from behind the phone and let her answer conversationally — she'll sound like a person, not a script. Get each answer three times: once long, once tight, once as a single sentence. The single-sentence version is your TikTok cut.\n\nGet extra of: 20 seconds of her simply listening and nodding (your cutaway when a sentence needs trimming), a slow tilt across the three props on a table, and one clean 3-second smile at the end with nothing said — that's your recurring sign-off card for every episode.\n\nOne rule for her before you roll: no numbers, no percentages, no scare stats. Reassurance is the register. If she starts a sentence with \"if you don't,\" reset and go again."},shots:[{sec:"0:00-0:04",type:"Static medium, straight to lens",frame:"Expert chest-up, warm wall behind, natural light from camera-left. Lower-third animates on at 0:01 and holds.",action:"She opens directly to camera, relaxed, no wave and no intro — straight into the question. Zero pre-roll.",txt:"IS MY BABY TOO HOT?\n(lower-third, holds 0:01-0:06) — Ask an Expert · Ep. 02"},{sec:"0:04-0:22",type:"Same static, cut in tighter at 0:14",frame:"Same frame; at 0:14 punch in ~15% for a soft jump-cut so it feels edited, not droning.",action:"Question one. She answers sunscreen under six months: not generally recommended yet, and what covers the gap instead. At 0:16 she lifts the brimmed hat and muslin layer into frame and holds them at chest height.",txt:"1 · SUNSCREEN UNDER 6 MONTHS?\nGenerally not yet — shade, a light long sleeve, a brimmed hat"},{sec:"0:22-0:44",type:"Static medium + one insert",frame:"Her at medium; a 3-second overhead insert of the hat and muslin flat on a table cuts in around 0:34.",action:"Question two. She gives the three signs of overheating in plain words — flushed skin, faster breathing, more fussiness — then immediately gives the fix so nobody is left holding a worry. Tone drops warmer here.",txt:"2 · HOW WOULD I KNOW?\nFlushed · breathing faster · fussier than usual\n→ cooler room, one less layer. That's usually it."},{sec:"0:44-1:04",type:"Static medium, prop demo",frame:"She holds the clip-on parasol; the muslin is draped over her forearm as the \"don't\" example.",action:"Question three. She lays the muslin flat over her forearm to show the trapped-air version, then lifts it away and clips the parasol on instead. One clean visual swap — the whole answer is in her hands, no diagram needed.",txt:"3 · IS THE STROLLER COVER HELPING?\nA blanket over the top traps warm air\n→ open shade, air moving"},{sec:"1:04-1:14",type:"Static medium, softest read",frame:"Same frame, props back down, hands still.",action:"The reassurance beat — she says plainly that none of this is a test, most babies tell you exactly what they need, and their pediatrician always knows their baby best. This beat is non-negotiable; it's the whole brand in ten seconds.",txt:"None of this is a test you can fail.\nYour pediatrician knows your baby best."},{sec:"1:14-1:20",type:"Static medium → hold on end card",frame:"Her 3-second smile (the banked sign-off), then the end card over the last frame.",action:"She says she'll be back next month and asks what they want covered. End card holds 2 seconds, name and credential still legible.",txt:"SAME FACE, EVERY MONTH.\nWhat should we ask her next? 👇"}],edit:{hook:"Open cold on her already talking — question one lands before 0:03, no logo sting, no \"hi guys.\" The lower-third with her real name and credential animates on at 0:01 and is the first thing the viewer reads. That lockup was built once, at episode one, and is reused pixel-identical here — the whole point of the format is that it never changes.",pace:"Deliberately unhurried — this is a trust format, not a trend format. One soft punch-in per question so it never reads static, hard cuts on the question titles, no whip transitions and no zoom effects. Trim every \"um\" and every restart, but leave her natural breath between the three answers so it sounds like a conversation rather than a read.",captions:"Burned-in captions, always — most of this plays on mute. Clean sans, bottom third but sitting above the platform UI safe zone, max two lines at a time. Keep the numbered question cards in a distinct heavier weight so a muted scroller can follow 1 → 2 → 3 without audio. Never let a caption overlap the credential lower-third.",audio:"Her voice is the audio — original VO, no trending sound over a credentialed answer, on any platform. Underneath, a very low warm instrumental bed (roughly -22dB) purely so the room tone doesn't feel dead; drop the bed out entirely under the closing reassurance beat so that line lands dry and human. TikTok cut: same original audio, no trend sound — this is the lane where original audio outperforms for the brand anyway. Do not name or attach any specific trending song to this brief.",overlays:"Three numbered question cards (1 · 2 · 3) in the pillar teal, entering as a simple slide from the left. The credential lower-third at open and at close. One small persistent segment mark in a corner — the same mark every month, which is how a scroller recognizes this episode as belonging to the same series that started last month.",length:"IG Reel 75-85s (the full three-question set). TikTok cut 34-40s (question two only, plus the reassurance line). Facebook cut 60-70s with a slower open.",aspect:"9:16 for all three. Shoot a 4-6s vertical center-safe pull of the props separately if the team wants a 1:1 grid tile later."},channels:[{k:"ig",who:"Millennial Mom 💜 — core subscriber",cut:"LEAD CUT. Full 75-85s Reel, all three questions, most polished grade. This continues the exact beat episode one set, and every future episode gets measured against this pairing. Pin it to the profile so episode three has somewhere to point back to. Post a three-slide carousel version 48 hours later — one question per slide, same lower-third lockup, designed to be saved rather than watched — and treat saves as the primary read. Push the \"what should we ask her next?\" prompt to Stories with a question sticker; the replies become the topic list for the next shoot day, which means the audience helps you fill the next few months of content for free."},{k:"fb",who:"Gifting Grandma 👵 — the gift-buyer",cut:"60-70s cut, slower open — hold on her face a beat longer before the first question so it doesn't feel abrupt in a feed that scrolls slower. Reorder to lead with the overheating signs, because that's the question a grandparent minding the baby for the afternoon actually has. Longer, warmer caption written to be read all the way through: name her and her credential in the first line, spell the three signs out in full sentences rather than fragments, and close with an invitation to send it to whoever has the baby this week. This audience shares to family threads more than it comments — write for the forward, not the like."},{k:"tt",who:"Gen-Z Mom ⚡ — discovery",cut:"34-40s, raw and hook-forward. Open on question two with zero setup — her first spoken words are the three overheating signs, on screen as text before she finishes saying them. Cut all prop handling. Keep the credential lower-third; on TikTok the letters after a name ARE the hook, because a stranger scrolling has no reason to trust the face otherwise. End on the reassurance line, then a one-second card teasing that the sunscreen and stroller answers are on the profile. Caption short and lowercase, native register, one line."}],test:{hyp:"A returning named face beats a rotating cast on trust metrics before it beats them on reach. Specifically: episode two should already show early separation from a rotating-cast baseline — views likely still below the brand's activity-demo average, but saves, follows-from-post, and comments that name or address the expert directly should be ticking up versus episode one's actuals as recognition starts to compound, with the view gap closing fully by episode four. If that pattern holds, recurrence is worth more than casting variety and the segment gets locked to a monthly cadence.",metric:"Follows-per-1,000-views and saves on episode two, benchmarked against episode one's actuals AND the last four PLAY WITH PURPOSE posts. Secondary: count of comments that reference the expert as a person (by name, \"she,\" or a question directed at her) — that number is the real signal that an owned authority is forming. Track the same three numbers on episode three and read the trend line, not any single post."},amplify:"Hold all spend on episode two for 72 hours organic, same rule as episode one — this format is still being tested for trust, and paid traffic will muddy the follow-rate read. Gate: if organic saves clear 1.5× the trailing four-post average OR follows-from-post clear 1.2×, put $300 behind the IG Reel over seven days, targeting parents of 0-2s in the metro areas that were actually under heat warnings (Mountain West, Great Basin, Southwest) — geo-matching a live weather mood is cheap relevance. Split $200 to a saves/engagement objective on IG and $100 to a follows objective on TikTok, because the two platforms are being asked for different things here. Layer in a retarget audience of everyone who watched 75%+ of episode one — a second impression of the same face is worth more than a first impression of a new one. Whatever the result, reserve $150 of next month's budget to retarget everyone who watched 75%+ of THIS episode with episode three, and keep testing whether recognition is actually compounding.",drove:["'Is my baby too hot?' is the question of the fortnight","Panda Crate puts a real pediatrician's name on the curric…","Lovevery's creator data, updated Monday: they aren't buyi…"],why:"The category's two strongest players put a credentialed name on the work — and Lovevery's own creator data shows only 9% of 2,100 partners ever came back for a third month, which means recurrence is the one thing nobody in this lane has bought; landing episode two on a question wave parents are typing this week means the franchise is compounding on demand instead of running on a first introduction alone."},

  {id:"MAP-0720-2",pillar:"MAP",dna:"milestone-explainer",plat:"IG + TikTok",anchor:true,noBaby:true,ladder:true,panelTags:["milestone","nobaby","first-time","budget","value"],concept:"One object — a set of three nesting cups — filmed three times, side by side, as what it MEANS at 6 months, 12 months and 24 months. Adult hands only, same cup, same surface, same light, so the only thing changing on screen is the stage. The parent watches the progression happen instead of reading a number about it. Shot once as a master triptych, it cuts into a saveable 5-slide Instagram carousel and a hook-forward TikTok, and it is the week's clearest demonstration of why an age-tailored box exists: the toy doesn't change, the job does.",hooks:["Same cup. Three completely different jobs. 👀","Before you buy another toy — here's what one you already own does at 6 months, 12 months and 24 months.","This is what \"made for their stage\" actually looks like — same object, three ages, side by side."],rec:0,caption:"Same cup. Three completely different jobs. 👀\n\n6 months → it goes straight in the mouth, and honestly? That IS the work. Mouthing is how they figure out what a thing even is. Banging two cups together is their very first \"I did that.\"\n\n12 months → in, out, in, out. The container obsession is real. Dropping one cup inside another is early problem-solving in disguise.\n\n24 months → now they stack it biggest to smallest, sort it, and then decide it's a hat. Ordering + pretend, from the same three cups.\n\nAnd if your 8-month-old is still doing the 6-month version — that's still right on time. Babies arrive at these in their own order. 💛\n\nThe reason we send a different box at a different age isn't the toy count. It's this: the job changes, so the box changes with them.\n\nALWAYS supervise — cups and small parts stay a hands-on-deck activity. 🤍\n\nSave this one for the next time you're staring at a toy aisle wondering what's actually worth it. 🧺\n\n#babydevelopment #montessoribaby #playbasedlearning #babymilestones #firsttimemom #babyplayideas",lead:{ch:"Instagram",who:"Millennial Mom 💜"},shoot:{setup:"One location, one surface, one sitting — a wood or light-neutral floor or low table beside a big window, mid-morning indirect daylight (no overhead lights, no lamp mixed in, or the three panels won't match in grade). Props: ONE set of 3 nesting/stacking cups — the same physical set for all three ages, which is the entire point — plus a small basket for the reset shot. Nothing else in frame: clear the surface completely, no logos, no clutter, no other toys. Phone locked on a tripod or propped against books: straight-down top-down for the action beats, a low 30° angle for the stacking beat. Do NOT move the phone between the three ages — same height, same distance, same crop, so the three panels line up cleanly in the triptych. Tape-mark the phone's footprint and the cup's start position.",cast:"NO BABY. NO on-camera face. Adult hands only — one pair, short or bare nails, no loud watch or rings. One person can shoot this entirely alone. Zarina is not in this and is not needed. If a second person is around, use them to hold a white poster board as a bounce, not on camera.",tips:"Shoot in stage order (6 → 12 → 24) so the light doesn't shift mid-stage. Do every beat THREE times: once slow, once at natural speed, once with an intentional 'mistake' (cup misses the stack, cup tips over) — the imperfect take is almost always the one that holds attention. Grab 20–30 extra seconds of pure top-down B-roll: cups nesting down into each other, one cup lifted off another, hands sweeping all three into the basket. That B-roll is next month's brief too. Because there's no baby on screen, the whole thing lives or dies on HAND PACE — move about two-thirds of natural speed and let each action finish before you cut. Also shoot one flat hero still of the three cups clean on the empty surface: that's the Facebook image and the carousel cover. Realistic shoot time: 45 minutes."},shots:[{sec:"0:00–0:03 · slide 1",type:"Top-down static, triptych (3 vertical panels, same cup in each)",frame:"Screen splits into three equal vertical panels, identical framing in each: the same set of three cups on the same surface.",action:"Hold all three panels still for half a second so the eye registers 'same object, three times.' Then all three begin moving at once — mouth-ward lift left, drop-in centre, stack right. Shoot each panel separately, assemble in edit.",txt:"Same cup. Three completely different jobs."},{sec:"0:03–0:09 · slide 2",type:"Top-down, single panel, medium-close on hands",frame:"One cup. An adult hand picks it up with a deliberate whole-hand grab (not fingertips), brings it toward the lens, sets it down, then knocks two cups together twice.",action:"Two moves only — the whole-hand grab, then the bang. Slow the grab right down. Record the clack live; you'll want that real sound in the mix.",txt:"AROUND 6 MONTHS · it goes in the mouth — and that IS the learning\nmouthing is how they figure out what a thing even is\nbanging two together = their first \"I did that\""},{sec:"0:09–0:15 · slide 3",type:"Top-down, single panel, slight push-in",frame:"Two cups. A hand lifts the small cup, holds it above the large one for a beat, drops it in. Tips it out. Does it again.",action:"In, out, in — deliberately repeat, because the repetition IS the milestone and the loop is what makes it read. Let one drop miss the rim and clatter off; keep that take.",txt:"AROUND 12 MONTHS · in. out. in. out. 🔁\nthe container obsession is real\ndropping one inside another is early problem-solving in disguise"},{sec:"0:15–0:22 · slide 4",type:"Low 30° angle, single panel, cups building upward",frame:"All three cups. Hands stack them biggest → smallest into a small tower, pause on the finished tower, then flip the top cup over and set it down like a hat.",action:"Build slowly enough that you can see the size decision happening. Hold a full second on the finished tower — that's the satisfying frame. Then the hat flip, which is the laugh.",txt:"AROUND 24 MONTHS · now it's biggest → smallest\nsorting by size, then deciding it's a hat 🎩\nordering + pretend, same three cups"},{sec:"0:22–0:26 · slide 5",type:"Top-down static, triptych returns, then hands sweep",frame:"The three panels come back side by side, each frozen on its end-state: cup at the mouth · cup dropping in · finished tower. Then cut full-frame as hands sweep all three cups into the basket.",action:"Hold the triptych a full two seconds — this single frame is the whole argument, don't rush it. Then the basket sweep as the closing exhale.",txt:"The toy didn't change. The job did.\nThat's the whole reason the box changes with them.\n\nand if yours is still on the 6-month version at 8 months — still right on time 💛\n(always supervise 🤍)"},{sec:"B-roll · no slide",type:"Coverage pickups (top-down + 30°)",frame:"Cups nesting down into each other · one cup lifted off another · all three lined up clean on the empty surface · hands resetting the set.",action:"Shoot 20–30 extra seconds with no text plan. It's the connective tissue for this edit and raw material for the next three milestone posts.",txt:"(no on-screen text — coverage only)"}],edit:{hook:"Open on the frozen triptych with the hook text already on screen — no fade-in, no logo bumper. The 'three identical panels' image IS the hook; a viewer gets the premise before reading a word. Text card lands by 0.4s on TikTok, 0.8s on Instagram.",pace:"Deliberately unhurried. Roughly 6 seconds per age, one idea per beat, hard cuts on the action rather than on the music. Resist the fast-cut instinct — the entire persuasion is watching a stage change, and speed destroys it. The TikTok cut runs about 15% tighter, trimming pauses rather than beats.",captions:"Burned-in, bottom third, high-contrast cream card with ink text — never white-on-white over the light surface. Age label in the chunky rounded display face, ALL CAPS, brand teal; explanation underneath in sentence case at about 70% size. One text block per beat, never two competing. Auto-captions off on the main cut (no voice under it).",audio:"IG: warm, low-key trending mom-relatable instrumental — soft and unobtrusive, sitting UNDER the real cup sounds rather than over them. Keep the live clacks and the cup-tip audible; with no baby on screen those hand sounds are doing real work. TikTok: same visuals, different register — either a trend-native sound in the parenting-discovery lane with a small lift at the 12-month beat, or (preferred if authority is the goal) plain original VO, an unhurried mom-to-mom read of the three age lines over live sound. No song is named in this brief on purpose — pick from whatever is genuinely current in that lane on production day.",overlays:"A small persistent stage chip top-left that changes with each beat — '6 MO' → '12 MO' → '24 MO' — so a mid-scroll viewer instantly knows where they are. Thin brand-teal progress bar along the bottom filling left to right across the three stages, so the progression reads even on mute. Final frame carries one closing line only: no CTA button, no price, no product shot.",length:"Instagram carousel: 5 slides, slide 1 is the 6-second triptych video, slides 2–5 static with the full text (built for the save, not the scroll). Instagram Reel version: 26s. TikTok: 22–24s. Facebook: single 4:5 hero still plus the triptych as image two.",aspect:"9:16 for the Reel and TikTok. 4:5 for the carousel slides and the Facebook still — export the carousel separately rather than cropping the vertical, or the triptych panels lose their edges."},channels:[{k:"ig",who:"Millennial Mom 💜",cut:"LEAD CUT. Built as the 5-slide saveable carousel — slide 1 the triptych video, slides 2–4 the three ages as clean static frames with the full age text, slide 5 the 'the toy didn't change, the job did' close. Polished grade, consistent type, and every single slide has to screenshot well on its own, because that's how it travels into group chats at 2am. Full caption as written, closing on 'save this for the toy aisle.' Pin a comment with the one-line version of all three stages so it's readable without opening the carousel. Publish the 26s Reel from the same footage 48 hours later — the carousel earns the saves, the Reel chases the reach."},{k:"fb",who:"Gifting Grandma 👵",cut:"Single 4:5 hero still of the three cups clean on the surface, with the triptych as image two. Slower and warmer, written for someone choosing a gift rather than solving her own Tuesday. Open with: 'If you're buying for a baby and you're never quite sure what's right for their age — here's the honest answer.' Then the three stages in full sentences, no emoji stacking, one or two hashtags at most. Close on the gifting truth: a good toy isn't one they play with once, it's one that keeps changing jobs as they grow. Longest caption of the three cuts, with 'always supervise' in plain text near the end."},{k:"tt",who:"Gen-Z Mom ⚡",cut:"Raw and hook-forward — 22 seconds, hook text on screen by 0.4s, no polish pass, phone-on-the-floor energy. Lead with 'same cup, three completely different jobs' as spoken original VO over the live cup sounds. Cut the pauses Instagram keeps. Move the 12-month in/out loop earlier — it's the most instantly recognisable beat for this audience — and let the hat flip be the payoff. Text-overlay-led throughout, discovery-register sound. Answer the first three 'what age is X' comments with video replies; that's where next week's brief comes from."}],test:{hyp:"A three-age side-by-side progression will out-save a single-age post about the same object, because a parent can locate her own baby on the ladder AND see where he's headed — two reasons to keep it instead of one.",metric:"Saves per 1,000 reach on the carousel vs. the average of the last four single-age milestone posts, measured at 7 days. Secondary: profile taps from the carousel, and the share of saves happening on slides 3–5 (a deep-slide save means she read the progression, not just the cover)."},amplify:"Hold all spend for 72 hours and let saves decide. If the carousel clears roughly 2x the account's rolling save rate organically, put $250 behind it over 5 days as an Instagram traffic/engagement campaign against parents of 0–3s, using the triptych video as the creative. Split it $175 IG / $75 Facebook, and on the Facebook side target the gifting audience (grandparent age bands, baby-gift interest) against the hero-still version — that's the cut that earns its money there. If saves don't clear the bar, spend nothing and re-shoot the same structure with a different object next month. The format is the bet, not this one post.",drove:["Lovevery is now selling proof, not toys — and the proof i…","The saveable checklist is quietly the best-performing for…"],why:"It's the week's most honest answer to competitors leaning on discounts instead of expertise — a parent watching a stage change is more convincing than any statistic, and it's the one demonstration an age-tailored box can make that a one-off kit structurally cannot. No baby needed, about 45 minutes to shoot, and it's the brief where the age-stage logic finally stops being claimed and starts being visible."},

  {id:"MAP-0720-3",pillar:"MAP",dna:"no-baby-explainer",plat:"IG",anchor:false,noBaby:true,ladder:false,panelTags:["milestone","first-time","nobaby","quick"],concept:"A five-slide \"5 signs your baby is ready for in-and-out play\" checklist carousel — observable, this-week-recognizable cues a mom can check against her own baby in about ten seconds, built to be saved and screenshotted into a group chat rather than scrolled past. Zero baby on set, zero talent booked: five designed slides over flat-lay stills shot in one 20-minute block at a kitchen table. Lands on permission, not pressure — the last slide says the window is wide and nothing is wrong if you're not seeing it yet.",hooks:["5 signs your baby is ready for in-and-out play (the stage nobody warns you is coming)","if your baby has started dropping things on purpose, over and over — that's not a phase, that's a stage","your baby keeps emptying the laundry basket. here's what she's actually practicing."],rec:1,caption:"If your baby has started dropping things on purpose — off the high chair, off the couch, forty times in a row — she's not being difficult. She's running an experiment. 🧪\n\nThat deliberate drop is usually the front edge of what's sometimes called in-and-out play: the stretch where lids, cups, baskets and boxes suddenly become more interesting than whatever's inside them. Putting things IN and taking them OUT is early problem-solving, hand-eye coordination, and the beginning of understanding that things still exist when she can't see them.\n\nThe 5 signs are in the slides. If you're seeing three or more, she's probably there.\n\nWhat to hand her: a basket and five big soft blocks. Genuinely, that's it. Development doesn't have to be expensive. 💛\n\nOne safety note, because it matters with this stage: everything she's putting in and out should be too big to fit through an empty toilet paper tube — and ALWAYS supervise. Little ones test containers with their mouths first.\n\nAnd if you're not seeing any of this yet? Nothing is wrong. This one shows up anywhere from about 8 to 12 months, and \"later\" is not \"behind.\" Save this for the week it starts. 🤍\n\n#inandoutplay #babymilestones #montessoribaby #9monthsold #babydevelopment #firsttimemom #playbasedlearning #123babybox",lead:{ch:"Instagram",who:"Millennial Mom 💜 — the core subscriber, the one who saves a reference and comes back to it at 2am"},shoot:{setup:"One table, one window, one 20-minute block — no studio. Kitchen or dining table pulled to within about three feet of the largest window in the house; shoot mid-morning or mid-afternoon so the light is bright but indirect (if the sun is throwing a hard edge across the table, tape a white bedsheet or a shower curtain over the glass to soften it). Surface: a cream or off-white background — a folded flat sheet, a large sheet of matte poster board, or a pale wood tabletop. Avoid glossy white, it blows out. Props, all from the office or the sample shelf: one shallow open basket, one lidded box, 5-6 big soft blocks, 2-3 nesting cups, one wooden ring stacker, a set of measuring cups. Nothing branded-forward, nothing smaller than a toilet paper tube (it has to be true to the safety line in the caption). Phone: locked flat overhead, screen up, lens shooting straight down — stack it on three cookbooks with the lens overhanging the edge, or use a $20 desk arm. Lock exposure and focus by tap-and-hold before the first frame so the ten stills all match. Turn OFF every overhead and lamp in the room — mixing warm bulbs with window light is what makes home flat-lays look muddy.",cast:"NO BABY. NO ON-CAMERA TALENT. NO FOUNDER. This one needs one person with a phone and twenty minutes. If you want a human element, one pair of adult hands entering the frame to set a block into a basket is plenty — any adult on the team, no makeup, no wardrobe call, sleeves pushed up, no rings that catch the light. This is the whole point of the format: it ships on a schedule because nobody has to be booked, wrangled, or napped around.",tips:"Shoot every still first, design second — do not build slides while you shoot, you'll under-shoot. Work in this order: (1) the wide empty-basket-and-blocks hero, (2) two mid shots of objects mid-arrangement, (3) three tight detail shots (thumb-and-finger-sized block on the cloth, two cups stacked, a lid half-off), (4) one hands-in-frame shot placing a block in the basket, (5) two deliberately near-empty frames — just the cloth and one object off to the right — for the slides that carry the most text. Get 3x more than you think you need; the slide with the longest copy always turns out to need the emptiest photo. Two hard rules that decide whether this works: leave the top-left 40% of every frame genuinely empty (that's where the headline sits), and shoot everything from the same height so the five slides feel like one set instead of five posts. Shoot one alternate frame of each set-up with the props pushed right and one with them pushed left — you'll want the choice at layout. Export at 1080x1350. Total build including design: about two hours, and slides 2-5 become a template you reuse every week with new copy."},shots:[{sec:"Slide 1 — cover",type:"Overhead flat-lay still, wide, text-forward",frame:"Cream cloth. Bottom-right third: an open shallow basket with three big soft blocks half in, half out, one block sitting just outside it. Top-left two-thirds deliberately empty for type.",action:"Static image. Headline sits top-left in the chunky rounded display face, subline beneath in a lighter weight. Small 'save this 🔖' pill tucked bottom-left so the ask is visible from the first frame.",txt:"HEADLINE: 5 signs your baby is ready for in-and-out play\nSUBLINE: the stage that turns every basket in your house into a toy\nCORNER PILL: save this 🔖"},{sec:"Slide 2 — signs 1 + 2",type:"Overhead detail still, tight, upper half clear",frame:"Two nesting cups, one tipped over, one lid lying beside them. Objects along the bott
