d holds for a full 2s of dead air. Do not add a music sting on the end card.",txt:"this one just tells you: 6–9 months ✓ · it's the same check we run before anything ships to you — so you don't have to run it at 11pm. you're doing fine. 💛"}],edit:{hook:"The hook text is burned into frame 1 over moving hands — no intro card, no logo bumper, no beat of silence before it starts. If the first frame is static, the dread has nothing to build on and the joke never lands.",pace:"Deliberately slow for the first ten seconds, which will feel wrong in the timeline — resist trimming it. Long, patient searching is what makes the horns funny. Then a hard full stop at 0:10, then genuinely unhurried for the answer: one check per ~3s, cut on the hand movement. The whiplash between the two halves IS the format. Never let the second half inherit the first half's rhythm.",captions:"No spoken VO anywhere, so every word is a burned-in card you make yourself — don't lean on auto-captions, they'll fight the timing. One line at a time, big, centered, high contrast, kept clear of the bottom third where the platform UI sits. Split the three checks into three separate cards; putting them on screen together turns the payoff into homework.",audio:"A slow-building instrumental in the swelling-horns 'something is about to go wrong' lane that's circulating widely right now, then a hard cut to near-silence at 0:10. Deliberately not naming a specific track here: pick it off TikTok's trending-audio panel the day you post and confirm it's still climbing, because these turn over weekly and a dead sound kills the distribution. Any slow-building dread cue with a clean stop works. If nothing in the panel fits, an original slow build with a hard silence does the identical job — the silence is doing the work, not the song. For the IG cut, sit it lower in the mix; IG audiences watch more of these muted.",overlays:"Text cards only. No stickers, no arrows, no countdown timers. One design change carries the whole structure: dread cards are white type on a dark scrim, answer cards flip to brand cream with indigo type. Let the colour change say 'we're past it now' so no copy has to. Small brand mark bottom-left on the final card only.",length:"26–30s on TikTok. Cut a 15–18s version for IG Reels by dropping the third miss at 0:08 and shortening the silence to one beat.",aspect:"9:16 vertical throughout. Shoot the overhead at the highest resolution the phone offers so the IG cut can punch in on the age range without going soft."},channels:[{k:"tt",who:"Gen Z mom · discovery",cut:"★ THE LEAD CUT. Rawest version — actual kitchen table, tags still on, mailer visible, no styling pass. Hook text on frame 1, 26–30s, trending dread audio, hard silence at 0:10. Caption stays short and lowercase: the hook line, the three checks as three lines, the supervise aside, done. This is where the format is native and where a box moment gets discovered by someone who has never heard of you."},{k:"ig",who:"millennial mom · core subscriber",cut:"Same beats, tidier: cleaner table, better light, 15–18s, audio lower in the mix so it reads muted. Then the part that actually matters here — pull the three checks into a 4-slide saveable carousel and post it the next day as its own thing (cover slide does 90% of the work, one check per slide). She saves the carousel and sends the Reel. Full caption, including the line that connects it back to the box."},{k:"fb",who:"gifting grandma · gift-buyer",cut:"Slower and warmer. Cut the dread build down to about 4s — the trend reference reads as noise to her — and give the answer double the room, 30–35s. Honestly the strongest version for her may not be video at all: the three checks as one clean, big-type graphic. Caption in full warm sentences, no trend language, framed for the moment she's actually in — the ten-second check before you buy a toy for someone else's baby, so the gift is right for the stage they're at now."}],test:{hyp:"A box moment can hold attention with no baby in it — this reach ceiling is a habit, not a requirement. If a piece with zero performer beats the unboxings that needed one, the whole content calendar stops depending on wrangling a person.",metric:"3-second view-through and saves, measured against the last three unboxings. The specific number to watch is retention at 0:10, the music drop: if viewers stay through it, the plain answer is what's holding them, and the format repeats weekly with a different worry each time. If they leave at the drop, the trend carried it and the payoff needs to be sharper, not longer."},amplify:"$150 behind the IG Reel cut, gated on organic proof — only spend if the TikTok clears roughly 15% completion or the IG carousel passes ~200 saves in the first 72 hours. Millennial Mom stack (25–38, Montessori / baby milestones / first-time parents), 5-day flight, optimized for ThruPlay rather than link clicks: this is a trust buy, not a conversion buy, and pushing it to clicks will teach the algorithm to find the wrong person. Hold Facebook budget entirely until the slower FB cut proves out organically — if the gifting audience responds to the three-check graphic, that's a separate $100 test worth running on its own, and it's the cheapest read available on whether Gifting Grandma is reachable with useful content rather than product.",drove:["P2 — dread-cue setup, gentle punchline (build the worry, resolve it plainly)","T1 — the age band that isn't on the listing: show the checking, not the scaring","P8 — nothing parenting-native trending this week; the opening is being first to translate a general format"],why:"This is the first unboxing in the library with nobody in it, and it's built that way on purpose: proof that a box moment can carry itself without a baby or a specific mom to book, in the one pillar that has always needed a performer. Two angles, adult hands, one person, forty minutes, no baby to wrangle and no photogenic mom to book. If it works, the argument that box content requires casting is finished.\n\nIt also fixes the thing that kills unboxings at 120 views. Nothing here is a product dump: the box only appears as the answer to a problem the viewer just watched happen, and the developmental why is the age band itself — the single most useful, least glamorous piece of information on any toy. That's the connection to the box, made by showing rather than telling. Nobody says the word personalization; a parent just watches somebody hunt for a stage and not find one, and draws the obvious conclusion about a box that arrives already sorted.\n\nOn the audio: the slate note referenced a specific dread cue and this brief deliberately does not name it. Nothing gets named that hasn't been verified as real and currently trending on the day of posting, and trending audio turns over weekly anyway, so naming a track in a brief written days ahead is a liability twice over. The lane is described instead, with the instruction to pick from the platform's own trending panel at post time and a working fallback if nothing fits. The silence at 0:10 is what makes the piece land, not the song.\n\nTone guardrail, because this format flirts with the line: the dread is aimed at a product listing, never at the parent, and it resolves inside two seconds into something she can actually do. The last card is 'you're doing fine' for a reason. No recall is referenced, no statistic is cited, no image of anything going wrong appears. A tired parent should finish this feeling briefly amused and slightly more capable — not scared of the toys already in her house."},

  {id:"BOJ-0720-3",pillar:"BOJ",dna:"founder-origin",plat:"Facebook + IG",anchor:true,noBaby:true,ladder:true,panelTags:["expert","credible","gift","box","reassure","nobaby"],concept:"Who actually picks what goes in the box — a rare Zarina beat where she introduces the moms and specialists doing the choosing, shows the pile of things that didn't make it, and names the three questions every item has to pass. It quietly retires the \"AI-powered\" line by telling the identical truth in its human version.",hooks:["you know what's in the box. here's who chose it — and what they were checking for.","the question we get most: who actually decides what goes in a 9-month box?","this is the pile of toys that didn't make it into your baby's box. here's why."],rec:0,caption:"We get this question a lot: who actually decides what goes in a 9-month box? 💛\n\nIt's people. Moms and specialists who sit at a table with far more toys than we'll ever ship — and every single one has to get through three questions. Is this what a baby is really doing at this exact age? Will it survive a mouth, a floor, and a bad day? Would I hand it to my own baby?\n\nMost things don't make it. That's honestly the whole job.\n\n(And yes — every soft toy gets the tug test before it gets a spot. ALWAYS check seams and small parts on anything new, wherever it came from.)",lead:{ch:"Facebook",who:"gifting grandma · the gift-buyer, who is really asking 'is this the right thing to give?'"},shoot:{setup:"The real room where selection actually happens — a table, not a set. Two piles staged before you roll: a small YES pile and a deliberately big NO pile (the NO pile is the whole persuasion, make it honest and make it large). Warm window light from camera-left, neutral wall behind. Two setups: (1) phone on a tripod at seated eye level, framed medium-close for Zarina; (2) phone overhead on an arm or propped on a stack of books for the sorting hands. Keep a 9-month age card, one plush with sewn-on eyes, and one hardwood/tile patch in frame for the three test beats.",cast:"Zarina + adult hands. NO baby on camera, no talent to book. This is a ONE-OFF origin and standards beat — not the start of a recurring host slot; she goes back off-camera after this. If one of the curators is comfortable on camera, having HER deliver the three questions is the stronger long-term version and the one that starts building a face the audience recognises.",tips:"Shoot the sorting B-roll FIRST and the talking head LAST — she'll be looser and warmer after ten minutes of actually handling the toys. Grab 30+ extra seconds of things being set aside into the NO pile; it's the most convincing footage in the piece and the hardest to fake later. Before you roll, have every named person's first name + credential written down and confirmed — supers only go up for people who have agreed to be named on camera. Record her saying the names as a clean audio-only backup so a lower-third can be re-cut without a reshoot. And get one wide of the full table: it does more work than any line of copy."},shots:[{sec:"0–3s",type:"medium-close talking head",frame:"Zarina at the table, candidate toys spread wide behind and around her hands",action:"Start mid-sentence, already handling a toy. No logo, no intro card, no 'hi everyone'.",txt:"you know what's in the box. here's who chose it."},{sec:"3–9s",type:"overhead over-the-shoulder",frame:"Hands moving toys into a small YES pile and a much bigger NO pile",action:"Zarina introduces each person by first name and credential in VO; a clean lower-third super appears as each is named, 3s each. Only real, consented names go on screen.",txt:"every item is picked by a person who has to say why."},{sec:"9–13s",type:"close-up, two-object compare",frame:"The same kind of toy in two versions, next to a 9-month age card",action:"One gets pushed toward YES, one toward NO. Show the age card clearly — this beat is where the stage logic becomes visible.",txt:"1 · is this what a baby is actually doing at this exact age?"},{sec:"13–17s",type:"extreme close-up",frame:"Hands tugging a sewn eye, then a toy dropped onto hardwood",action:"Two quick physical tests, real sound left in — the tug and the clatter do the talking.",txt:"2 · can it survive a mouth, a floor, and a bad day?"},{sec:"17–22s",type:"medium-close talking head",frame:"Back to Zarina, one item held in both hands, quieter register",action:"She slows down here. Let a beat of silence sit after the line before you cut.",txt:"3 · would I hand this to my own baby?"},{sec:"22–35s",type:"wide → overhead end card",frame:"The big NO pile pushed aside; the small YES pile going into the box",action:"Lid closes. Hold on the closed box for a full second before the end card lands.",txt:"most things don't make it in. that's the whole job. ↳ what's left is the box · a box of joy for your bundle of joy 💛"}],edit:{hook:"Open on her hands already sorting with her voice already running. No branded intro, no title card — the first frame should look like you walked in on something real.",pace:"Slower than anything else this week, on purpose. This one earns trust by not rushing. Hold each of the three questions ~3s and leave the pause after 'my own baby' in.",captions:"Burned-in, brand indigo, generous size for older eyes. The three questions numbered, with the number in sunshine yellow. Name lower-thirds are first name + credential only, on screen 3s each. Assume sound-off: the captions must carry the entire story on their own.",audio:"No trending sound on this one — a trend audio would undercut it. Her voice clean and forward, with a soft, low instrumental bed under the B-roll sections only, ducked well under the VO and dropped out entirely for the third question. Leave the real tug-and-clatter sound in on the test beat.",overlays:"Numbered 1 · 2 · 3 for the standards, name lower-thirds on the introductions, and a single end card: 'a box of joy for your bundle of joy 💛'. Nothing else — no stat cards, no badges.",length:"35–45s for the Facebook cut · 25–30s for the IG Reel · 5-slide carousel companion for IG",aspect:"4:5 for the Facebook feed cut (plays wider, reads better for the FB audience) · 9:16 for the IG Reel and TikTok · 4:5 for the carousel"},channels:[{k:"fb",who:"gifting grandma · gift-buyer",cut:"LEAD CUT. The full 40s version — all three questions, all the names, the whole NO pile. Longest caption of the week, written to be read: the standard spelled out in plain sentences, because a gift-buyer's real question is 'is this the right thing to give?' and the answer is the people. Post 4:5 so it fills more of the feed, and assume it autoplays silent — the captions do all the work."},{k:"ig",who:"millennial mom · core subscriber",cut:"Tighter 25s Reel: cold open on the sorting, condense the introductions to two names, keep all three questions. Pair it with a 5-slide saveable carousel — 'the 3 questions every item has to pass' — one question per card, cover card carrying the hook. She saves the carousel and watches the Reel."},{k:"tt",who:"gen-z mom · discovery",cut:"Rawest cut, and drop the founder framing entirely — open cold on the NO pile with 'this is the pile of toys that didn't make it into your baby's box.' Handheld, 9:16, no lower-thirds, no end card, faster cuts through the three questions. The 'here's what got rejected' angle is the hook that travels here; the trust payoff lands second."}],test:{hyp:"Naming the actual humans who choose — and showing the pile that got rejected — builds more trust than any 'curated by moms and experts' claim we've made without faces attached.",metric:"72h: saves + comments that name a person or repeat one of the three questions back to us (that's the real signal), against your last BOX OF JOY post. On Facebook watch retention past 15s — if people stay for the third question, the format works."},amplify:"Hold it organic for 72h — a trust piece needs to prove it can hold attention before you pay for attention. If the Facebook cut clears your BOX OF JOY average on watch-through, put $150 behind it to grandparents 55+ with 0–3 year olds in the family and run it long (4 weeks rather than a hard burst) — this is a trust asset that compounds, not a reach spike. Retarget everyone who watched past 15s with your age-band developmental content, not an offer; they've just met the people, let the next thing they see be the expertise.",drove:["T2 · Count on Mothers Wave 1 (Jul 15): 65% of mothers report little or no trust in AI companies to act in children's interests — the lowest of eleven institutions tested","T1 · Health Canada advisory (Jul 14) on a doll set with detachable parts, plus the broader pattern of marketplace listings with no vetting signal — 'who checked this' is the live question","T9 · the open infant-formula botulism investigation — TEAM CONTEXT ONLY. It explains why the vetting question lands harder this month; it must never be referenced, implied, or built on in the post"],why:"This is the one beat of the year where the founder belongs on camera, and it exists to retire a piece of language that is actively costing trust. Fresh third-party data says mothers trust AI companies less than any other institution tested — so 'AI-powered curation' is telling a true story in the least believable available register. The human version of that identical promise (people, at a table, with a standard) is the one this audience will believe, and it costs nothing to switch to. Facebook leads because trust in the picker is precisely what converts the gift-buyer. Three deliberate guardrails: (1) it is a ONE-OFF origin and standards beat — Zarina goes back off-camera afterward, the recurring face should be a credentialed curator, not her; (2) the engine wrote NO curator names into any line of copy on purpose — real first names and credentials come from the team and only go on screen with each person's consent, so nothing here needs inventing to shoot; (3) the formula-recall context that makes this land is strictly for the team's ears — building a post on top of someone else's outbreak would be the opposite of what this brand is. The post sells nothing, claims no personalization, and shows the age-stage reasoning instead of asserting it."},

function fmt(n){return n>=1000000?(n/1000000).toFixed(1)+"M":n>=1000?Math.round(n/1000)+"K":""+n;}
function SrcChips({src}){return(<div className="srcchips">{(src||[]).map((s,i)=>(<a key={i} className="src" href={"https://"+s[0]} target="_blank" rel="noopener" title={s[1]}>{s[0]}</a>))}</div>);}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:false};}
  static getDerivedStateFromError(){return{err:true};}
  render(){if(this.state.err)return(<div style={{padding:40,fontFamily:'Nunito'}}><h2>The engine hit a snag.</h2><p>Refresh to reload the 123 Baby Box engine.</p></div>);return this.props.children;}
}

function PerfChart(){
  const bar=(rows,color)=>rows.map(([lbl,val],i)=>(
    <div className="bar-row" key={i}>
      <div className="bar-label">{lbl}</div>
      <div className="bar-track"><div className="bar-fill" style={{width:Math.max(0.4,(val/PERF_MAX)*100)+"%",background:color}}></div></div>
      <div className="bar-val" style={{color}}>{fmt(val)}</div>
    </div>
  ));
  return (
    <div className="perf-card">
      <h3>The Performance Reality</h3>
      <div className="sub">Your own numbers, side by side. This one chart is the whole strategy.</div>
      <div className="perf-legend"><span><span className="sw" style={{background:"var(--brand)"}}></span>Free developmental expertise</span><span><span className="sw" style={{background:"var(--coral)"}}></span>Product / unboxing content</span></div>
      <div style={{marginTop:14}}>
        {bar(PERF_EXPERTISE,"var(--brand)")}
        <div style={{height:8}}></div>
        {bar(PERF_PRODUCT,"var(--coral)")}
      </div>
      <div className="perf-punch"><b>Read it:</b> every product-forward unboxing barely registers on the same scale that your expertise content tops 1.6M. You don't have a content problem — you have a <b>format-mix</b> problem. The engine shifts weight to what already works, and makes the product content earn its place by carrying a developmental payoff.</div>
    </div>
  );
}

// ---- lightweight markdown → React (ported OBSOLETE renderer) ----
function stInline(t){
  const nodes=[]; let key=0, last=0, m;
  const re=/(\*\*([^*]+)\*\*)|(\*([^*]+)\*)|(`([^`]+)`)|(\[([^\]]+)\]\(([^)]+)\))/g;
  while((m=re.exec(t))){
    if(m.index>last) nodes.push(t.slice(last,m.index));
    if(m[1]) nodes.push(<strong key={key++}>{m[2]}</strong>);
    else if(m[3]) nodes.push(<em key={key++}>{m[4]}</em>);
    else if(m[5]) nodes.push(<code key={key++}>{m[6]}</code>);
    else if(m[7]) nodes.push(<a key={key++} href={m[9]} target="_blank" rel="noopener noreferrer">{m[8]}</a>);
    last=re.lastIndex;
  }
  if(last<t.length) nodes.push(t.slice(last));
  return nodes;
}
function renderMarkdown(md){
  const lines=(md||"").split("\n"), out=[]; let i=0,key=0,list=null,lt=null;
  const flush=()=>{ if(list){ out.push(lt==="ol"?<ol key={key++}>{list}</ol>:<ul key={key++}>{list}</ul>); list=null; } };
  const special=x=>/^(#{1,3}\s|>\s?|\s*[-*]\s|\s*\d+\.\s|\s*(---|\*\*\*)\s*$)/.test(x);
  while(i<lines.length){
    const ln=lines[i];
    if(/^\s*$/.test(ln)){ flush(); i++; continue; }
    if(/^###\s+/.test(ln)){ flush(); out.push(<h4 key={key++}>{stInline(ln.replace(/^###\s+/,''))}</h4>); i++; continue; }
    if(/^#{1,2}\s+/.test(ln)){ flush(); out.push(<h3 key={key++}>{stInline(ln.replace(/^#{1,2}\s+/,''))}</h3>); i++; continue; }
    if(/^\s*(---|\*\*\*)\s*$/.test(ln)){ flush(); out.push(<hr key={key++}/>); i++; continue; }
    if(/^\s*>\s?/.test(ln)){ flush(); out.push(<blockquote key={key++}>{stInline(ln.replace(/^\s*>\s?/,''))}</blockquote>); i++; continue; }
    const om=ln.match(/^\s*\d+\.\s+(.*)/);
    if(om){ if(lt!=="ol"){flush();lt="ol";} if(!list)list=[]; list.push(<li key={key++}>{stInline(om[1])}</li>); i++; continue; }
    const um=ln.match(/^\s*[-*]\s+(.*)/);
    if(um){ if(lt!=="ul"){flush();lt="ul";} if(!list)list=[]; list.push(<li key={key++}>{stInline(um[1])}</li>); i++; continue; }
    flush(); const para=[ln]; i++;
    while(i<lines.length && !/^\s*$/.test(lines[i]) && !special(lines[i])){ para.push(lines[i]); i++; }
    out.push(<p key={key++}>{stInline(para.join(" "))}</p>);
  }
  flush();
  return out;
}

function Studio({seed,onClearSeed}){

  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const scroll=useRef(null);
  useEffect(()=>{ if(scroll.current) scroll.current.scrollTop=scroll.current.scrollHeight; },[msgs,err]);
  const ctxLabel = seed ? (seed.type==="brief" ? seed.brief.concept : seed.text) : null;
  const sugg = seed ? (seed.type==="brief"?SUGG_BRIEF:SUGG_SIGNAL) : SUGG_DEFAULT;
  async function send(text){
    const q=(text!=null?text:input).trim(); if(!q||busy) return;
    setInput(""); setErr("");
    const base=[...msgs,{role:"user",content:q}];
    setMsgs([...base,{role:"assistant",content:""}]); setBusy(true);
    try{
      const res=await fetch("/api/studio",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:base,seed})});
      if(!res.ok||!res.body) throw new Error("api");
      const rd=res.body.getReader(),dec=new TextDecoder(); let acc="";
      for(;;){ const {done,value}=await rd.read(); if(done) break; acc+=dec.decode(value,{stream:true}); setMsgs(m=>{const c=m.slice();c[c.length-1]={role:"assistant",content:acc};return c;}); }
      if(!acc.trim()) throw new Error("empty");
    }catch(e){
      setMsgs(m=>m.slice(0,-1));
      setErr("The Strategist runs on the live site (123babybox.obsoleteai.co) with your GEMINI_API_KEY set in Vercel. If you're opening the local file there's no server to answer — but the flow, the context, and the whole engine brain are wired and ready.");
    }finally{ setBusy(false); }
  }
  function onKey(e){ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(); } }
  return (
    <div className="wrap"><div className="studio">
      {seed&&<div className="st-ctx"><span className="stx-lbl">{seed.type==="brief"?"✦ Sharpening brief":"✦ Riding signal"}</span><b>{ctxLabel}</b><button className="stx-x" onClick={onClearSeed} title="clear context">×</button></div>}
      <div className="st-scroll" ref={scroll}>
        {msgs.length===0 && (
          <div className="st-empty">
            <div style={{fontSize:34}}>🧠</div>
            <h2>The Strategist</h2>
            <p>Loaded with the full 123 Baby Box engine — the voice, the four pillars, the baby-free casting goal, the Milestone Map, and your three-customer focus group. Ask for hooks, full production maps, series, or a gut-check.{seed?" It already has this "+(seed.type==="brief"?"brief":"signal")+" in context — just ask.":""}</p>
            <div className="st-sugg">{sugg.map((s,i)=>(<button className="st-sg" key={i} onClick={()=>send(s.q)}><span className="sgl">{s.l}</span>{s.q}</button>))}</div>
          </div>
        )}
        {msgs.map((m,i)=>(
          <div className={"msg "+(m.role==="user"?"user":"bot")} key={i}>
            <div className="msg-av">{m.role==="user"?"🍼":"🧠"}</div>
            <div className="msg-bub">{m.role==="user"?m.content:(m.content?<>{renderMarkdown(m.content)}{busy&&i===msgs.length-1&&<span className="blink"></span>}</>:<span className="blink"></span>)}</div>
          </div>
        ))}
        {err&&<div className="st-err">{err}</div>}
      </div>
      <div className="st-inputbar">
        <textarea className="st-input" rows={1} value={input} placeholder="Ask the Strategist anything…" onChange={e=>setInput(e.target.value)} onKeyDown={onKey} disabled={busy}/>
        <button className="st-send" onClick={()=>send()} disabled={busy||!input.trim()}>↑</button>
      </div>
    </div></div>
  );
}

function HowItWorks(){
  const [step,setStep]=useState(0);const s=ENGINE_STEPS[step];
  useEffect(()=>{ const t=setTimeout(()=>setStep(x=>(x+1)%ENGINE_STEPS.length),2600); return ()=>clearTimeout(t); },[step]);
  return (
    <div className="wrap">
      <div className="section-eyebrow" style={{marginTop:0}}>What the engine does, every week</div>
      <div className="step-band">
        {[["01","Listen","We read your feed + the category every week."],["02","Calibrate","We check each idea against your brand's voice and your goals."],["03","Brief","You get production-ready briefs, not research."],["04","Produce","Your team shoots + distributes. The engine never posts for you."]].map((st,i)=>(<div className={"step-cell"+(i===3?" you":"")} key={i}><div className="step-num">{st[0]}</div><h4>{st[1]}</h4><p>{st[2]}</p></div>))}
      </div>

      <div className="section-eyebrow">The engine thinking — one signal → one brief</div>
      <div className="flow-rail">{ENGINE_STEPS.map((n,i)=>(<React.Fragment key={i}>{i>0&&<div className={"flow-line"+(i<=step?" fill":"")}></div>}<button className={"flow-node"+(i<step?" done":"")+(i===step?" active":"")} onClick={()=>setStep(i)}>{i<step?"✓":n.icon}</button></React.Fragment>))}</div>
      <div className="flow-card">
        <div className="fc-agent"><div className="g">{s.icon}</div><div><div style={{fontWeight:800,fontSize:15}}>{s.agent}</div><div style={{fontSize:11.5,color:'var(--ink-soft)'}}>{s.focus}</div></div><div style={{marginLeft:'auto',fontFamily:'JetBrains Mono',fontSize:11,color:'var(--ink-soft)'}}>step {step+1}/{ENGINE_STEPS.length}</div></div>
        {s.incoming&&<div className="incoming">← incoming from {s.incoming}</div>}
        <div style={{fontWeight:800,fontSize:15,fontFamily:'Fraunces',marginBottom:6}}>{s.title}</div>
        <div style={{fontSize:13,lineHeight:1.5,color:'var(--ink-soft)'}}>{s.what}</div>
        <div className="watch-chips">{s.watches.map((w,i)=>(<span className="watch-chip" key={i}>👁 {w}</span>))}</div>
        <div style={{fontSize:12.5,marginTop:6}}><b>Filters:</b><ul style={{margin:'5px 0 0',paddingLeft:18,color:'var(--ink-soft)',lineHeight:1.5}}>{s.filters.map((f,i)=>(<li key={i}>{f}</li>))}</ul></div>
        <div className="verdict">✓ {s.verdict}</div>
      </div>

      <div className="section-eyebrow">Calls the engine made this week</div>
      {DECISIONS.map((d,i)=>(<div className="decision-row" key={i}><span className={"dverb "+d.cls}>{d.verb}</span><div><div style={{fontWeight:800,fontSize:13,marginBottom:2}}>{d.t}</div><div style={{fontSize:12.5,color:'var(--ink-soft)',lineHeight:1.45}}>{d.d}</div></div></div>))}

      <div className="section-eyebrow">The brand fence — what the engine refuses to do</div>
      <details className="acc" open><summary>🚧 {ANTI_PATTERNS.length} guardrails <span className="chev">▾</span></summary><div className="acc-body"><ul style={{margin:0,paddingLeft:18,lineHeight:1.6}}>{ANTI_PATTERNS.map((a,i)=>(<li key={i} style={{marginBottom:6}}>{a}</li>))}</ul></div></details>
    </div>
  );
}

function DiagnosticInbox({onClose}){
  const QS=[
    {id:"expert",rail:"var(--teal)",icon:"🩺",q:"Is there a credentialed voice we can build a series around?",d:"Your content wins on expertise — but you rent it. Is there an SLP / OT / Montessori guide on your team or in reach who could become the recurring face of the Milestone Map?",opts:["Yes — someone in-house","Yes — someone we could bring on","Not yet — we'd need to source one"]},
    {id:"priority",rail:"var(--coral)",icon:"📈",q:"Right now, is the bigger job winning new subscribers or keeping the ones you have?",d:"It changes the whole content mix. Acquisition leans reach + expertise; retention leans milestone + ongoing-value content.",opts:["Winning new subscribers","Keeping the ones we have","Honestly, both equally"]},
    {id:"casting",rail:"var(--pink)",icon:"🎬",q:"The moms + babies in your videos — who are they?",d:"This tells us how fast we can shift toward baby-independent formats and away from the casting bottleneck.",opts:["Real customers / UGC","Hired talent","Our own team / founder network"]},
  ];
  const [ans,setAns]=useState({});const [free,setFree]=useState("");const [freeLocked,setFreeLocked]=useState(false);
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>
        <div className="modal-hero"><button className="x" onClick={onClose}>×</button><h1 style={{fontSize:23,margin:'2px 0',fontWeight:900}}>Diagnostic Inbox <span className="nav-wip" style={{fontSize:9,verticalAlign:'middle',marginLeft:6}}>WIP</span></h1><div style={{fontFamily:'Fraunces',fontStyle:'italic',fontSize:13.5,opacity:.92}}>3 questions only you can answer — they turn our read into your plan</div></div>
        <div className="modal-body">
          {QS.map(Q=>(<div className="card" key={Q.id} style={{marginBottom:12,padding:16}}><div className="rail" style={{background:Q.rail}}></div>
            <h4 style={{fontSize:14,margin:'0 0 4px',color:'var(--brand)'}}>{Q.icon} {Q.q}</h4><p style={{fontSize:12.5,color:'var(--ink-soft)',margin:'0 0 12px',lineHeight:1.45}}>{Q.d}</p>
            {ans[Q.id]?.locked?(<div style={{background:'#F1FAF0',border:'1px solid var(--green)',borderRadius:10,padding:'10px 12px',fontSize:12.5}}><b style={{color:'var(--green)',fontFamily:'JetBrains Mono',fontSize:9}}>✓ LOCKED IN</b> — {ans[Q.id].value} <button style={{background:'none',border:'none',color:'var(--ink-soft)',fontSize:11,cursor:'pointer',marginLeft:6}} onClick={()=>setAns({...ans,[Q.id]:{...ans[Q.id],locked:false}})}>↺ change</button></div>):(<>
              {Q.opts.map((o,i)=>(<button key={i} onClick={()=>setAns({...ans,[Q.id]:{value:o,locked:false}})} style={{display:'block',width:'100%',textAlign:'left',background:ans[Q.id]?.value===o?'var(--accent-pale)':'var(--cream)',border:'1.5px solid '+(ans[Q.id]?.value===o?'var(--brand)':'var(--border)'),borderRadius:10,padding:'10px 12px',marginBottom:7,fontSize:12.5,cursor:'pointer',fontWeight:ans[Q.id]?.value===o?800:600,fontFamily:'Nunito'}}>{o}</button>))}
              {ans[Q.id]?.value&&<Btn style={{width:'100%',padding:9,fontSize:12,marginTop:2}} onClick={()=>setAns({...ans,[Q.id]:{...ans[Q.id],locked:true}})}>Lock it in →</Btn>}
            </>)}
          </div>))}
          <div className="card" style={{padding:16}}><div className="rail" style={{background:'var(--brand)'}}></div><h4 style={{fontSize:14,margin:'0 0 4px',color:'var(--brand)'}}>💭 Anything else?</h4><p style={{fontSize:12.5,color:'var(--ink-soft)',margin:'0 0 10px'}}>What are we missing, or reading wrong?</p>
            {freeLocked?(<div style={{background:'#F1FAF0',border:'1px solid var(--green)',borderRadius:10,padding:'10px 12px',fontSize:12.5}}><b style={{color:'var(--green)',fontFamily:'JetBrains Mono',fontSize:9}}>✓ NOTED</b> — {free} <button style={{background:'none',border:'none',color:'var(--ink-soft)',fontSize:11,cursor:'pointer',marginLeft:6}} onClick={()=>setFreeLocked(false)}>↺ edit</button></div>):(<>
              <textarea value={free} onChange={e=>setFree(e.target.value)} placeholder="Tell us where we're off…" style={{width:'100%',minHeight:70,border:'1.5px solid var(--border)',borderRadius:10,padding:10,fontFamily:'Nunito',fontSize:12.5,resize:'vertical'}}></textarea>
              {free.trim()&&<Btn style={{width:'100%',padding:9,fontSize:12,marginTop:6}} onClick={()=>setFreeLocked(true)}>Save note →</Btn>}
            </>)}
          </div>
        </div>
      </div>
    </div>
  );
}

function WIPTab({kind}){
  return (
    <div className="wrap">
      <div className="wip-banner"><span className="tag">🚧 UNDER CONSTRUCTION</span><p>A preview of what's coming once OPERATE goes live. {kind==="cal"?"A rolling content calendar with format-mix balance + amplification markers.":"Performance tracking — reach, saves, subscriber attribution — wired to your actual accounts."} Below is placeholder content so you can see the shape.</p></div>
      {kind==="cal"?(<div className="grid" style={{gridTemplateColumns:'repeat(7,1fr)',gap:8}}>{["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map((d,i)=>(<div className="card" key={i} style={{padding:12,minHeight:130}}><div style={{fontFamily:'JetBrains Mono',fontSize:10,color:'var(--ink-soft)',marginBottom:8}}>{d}</div>{i<5&&<div style={{background:'var(--cream)',borderRadius:8,padding:'6px 8px',fontSize:10,marginBottom:5}}>{["🧩 activity","🗺️ milestone","🩺 expert","🛟 hack","📦 unbox"][i]}</div>}</div>))}</div>):(<div className="kpi-grid">{["Reach","Saves","Profile visits","New subscribers"].map((k,i)=>(<div className="kpi" key={i}><div className="soon">SOON</div><div className="kv">—</div><div className="kl">{k}</div></div>))}</div>)}
    </div>
  );
}

function App(){
  const [nav,setNav]=useState("intel");const [memo,setMemo]=useState(true);const [brief,setBrief]=useState(null);const [diag,setDiag]=useState(false);const [studioSeed,setStudioSeed]=useState(null);const [intelFocus,setIntelFocus]=useState(null);
  const NAV=[["intel","Intelligence Brief","📡"],["briefs","Content Briefs","📝"],["studio","Studio","🧠"],["map","Milestone Map","🗺️","wip"],["cal","Calendar","📅","wip"],["perf","Performance","📊","wip"]];
  const NAV_DESC={intel:"The trends we're watching + how to ride them",briefs:"Ready-to-shoot content ideas for your team",map:"The age-by-age logic behind every box",studio:"Your always-on content strategist — ask it anything",how:"How the engine turns a trend into a brief",cal:"A rolling content calendar (coming soon)",perf:"Reach + subscriber results (coming soon)"};
  return (
    <>
      {memo&&<MondayMemo onClose={()=>setMemo(false)} onGo={()=>{setMemo(false);setNav("intel");}}/>}
      {brief&&<BriefModal b={brief} onClose={()=>setBrief(null)} onStudio={(bb)=>{setStudioSeed({type:'brief',brief:bb});setBrief(null);setNav("studio");}} onIntel={(t)=>{setBrief(null);setNav("intel");setIntelFocus(t);}}/>}
      {diag&&<DiagnosticInbox onClose={()=>setDiag(false)}/>}
      <div className="app">
        <div className="side">
          <div className="logo"><div className="logo-blocks"><div className="blk" style={{background:'var(--accent)'}}>1</div><div className="blk" style={{background:'var(--coral)',color:'#fff'}}>2</div><div className="blk" style={{background:'var(--teal)',color:'#fff'}}>3</div></div><div className="logo-name">BABY BOX</div><div className="logo-sub">a box of joy for your bundle of joy</div></div>
          {NAV.map(n=>(<button key={n[0]} title={NAV_DESC[n[0]]} className={"nav-item"+(nav===n[0]?" on":"")} onClick={()=>setNav(n[0])}><span className="ico">{n[2]}</span>{n[1]}{n[3]==="new"&&<span className="nav-new">NEW</span>}{n[3]==="wip"&&<span className="nav-wip">WIP</span>}</button>))}
          <div className="side-spacer"></div>
          <button className="howlink" onClick={()=>setNav("how")}>⚙ how it works</button>
          <Btn onClick={()=>setDiag(true)}>📮 Diagnostic Inbox <span className="nav-wip" style={{marginLeft:6}}>WIP</span></Btn>
        </div>
        <div className="main">
          <div className="page-head">
            <div><h1>{ {intel:"Intelligence Brief",briefs:"Content Briefs",map:"Milestone Map",studio:"Studio",how:"How It Works",cal:"Calendar",perf:"Performance"}[nav] }</h1>
              <p className="dek">{ {intel:"The trends we're watching this week — and exactly how 123 Baby Box could ride each one.",briefs:"Ready-to-shoot content ideas, built from the trends on the left. Click any card to open the full brief.",map:"The age-by-age logic behind every box — and the surface that finally makes your personalization visible.",studio:"Your always-on content strategist, loaded with the full engine context.",how:"One trend, start to finish — how a moment we spot becomes next week's content.",cal:"A rolling content calendar (coming once we're working together).",perf:"Reach, saves, and subscriber results (coming once we're working together)."}[nav] }</p>
            </div>
            <div className="pill"><span className="live-dot"></span>Live · {WEEK}</div>
          </div>
          {!memo&&nav==="intel"&&(<div className="ticker"><div className="ticker-track">{[...TICKER,...TICKER].map((t,i)=>(<span key={i}><span className="tdot" style={{background:{signal:'var(--brand-mid)',pulse:'var(--coral)',decision:'var(--accent)',win:'var(--green)',warn:'var(--warn)'}[t[0]]}}></span>{t[1]}</span>))}</div></div>)}
          {nav==="intel"&&<IntelBrief focus={intelFocus} onFocusDone={()=>setIntelFocus(null)} onDrop={(txt)=>{setStudioSeed(txt?{type:'signal',text:txt}:null);setNav("studio");}} onOpen={setBrief}/>}
          {nav==="briefs"&&<ContentBriefs onOpen={setBrief}/>}
          {nav==="map"&&<MilestoneMap/>}
          {nav==="studio"&&<Studio seed={studioSeed} onClearSeed={()=>setStudioSeed(null)}/>}
          {nav==="how"&&<HowItWorks/>}
          {nav==="cal"&&<WIPTab kind="cal"/>}
          {nav==="perf"&&<WIPTab kind="perf"/>}
          <div className="foot"><b>123 Baby Box Engine</b> · OBSOLETE V0.4 · {WEEK} · public-signal read · built to be argued with</div>
        </div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
