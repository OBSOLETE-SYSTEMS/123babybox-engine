<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>123 Baby Box — Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@600;700;800;900&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400;1,9..144,600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<style>
  :root{
    --brand:#4A1E9E; --brand-deep:#35146E; --brand-light:#EDE7FA; --brand-mid:#6A3FC0;
    --accent:#F6D93B; --accent-soft:#F8E68A; --accent-deep:#E0BE13; --accent-pale:#FCF3C4;
    --cream:#FDF8E9; --cream-deep:#F6EED6; --paper:#FFFFFF;
    --ink:#2A2140; --ink-soft:#6E6485; --border:#ECE4D6;
    --coral:#EF5B4C; --teal:#1AA0BE; --pink:#E24E96; --green:#5BA83C;
    --hi:#3AA76D; --warn:#E0872B;
    --shadow:0 2px 10px rgba(42,33,64,.07); --shadow-lg:0 16px 46px rgba(42,33,64,.18);
    --hard:4px 4px 0 var(--brand); --r:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Nunito',system-ui,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  h1,h2,h3,h4{font-family:'Grandstander','Nunito',sans-serif}
  a{color:inherit}
  ::selection{background:var(--accent);color:var(--brand-deep)}

  .app{display:grid;grid-template-columns:214px 1fr;min-height:100vh}

  /* Sidebar */
  .side{background:var(--brand-deep);color:#fff;padding:20px 14px;display:flex;flex-direction:column;gap:5px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .logo{margin-bottom:16px}
  .logo-blocks{display:flex;gap:3px;margin-bottom:7px}
  .blk{width:27px;height:27px;border-radius:6px;display:grid;place-items:center;font-family:'Grandstander';font-weight:900;font-size:15px;color:var(--brand-deep);box-shadow:0 2px 0 rgba(0,0,0,.15)}
  .logo-name{font-family:'Grandstander';font-weight:900;font-size:18px;letter-spacing:.01em;line-height:1;color:#fff}
  .logo-sub{font-size:10px;color:var(--accent);font-style:italic;font-family:'Fraunces';margin-top:3px}
  .nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:11px;cursor:pointer;font-size:13.5px;font-weight:700;color:#C9BEE8;transition:.15s;border:none;background:none;text-align:left;width:100%;font-family:'Nunito'}
  .nav-item:hover{background:rgba(255,255,255,.09);color:#fff}
  .nav-item.on{background:var(--brand);color:#fff}
  .nav-item .ico{font-size:15px}
  .nav-new{font-size:8px;background:var(--accent);color:var(--brand-deep);padding:1px 6px;border-radius:20px;margin-left:auto;letter-spacing:.04em;font-weight:800}
  .nav-wip{font-size:8px;background:rgba(255,255,255,.15);padding:1px 6px;border-radius:20px;margin-left:auto;letter-spacing:.05em}
  .side-spacer{flex:1;min-height:14px}
  .btn-chunky{background:var(--accent-soft);color:var(--brand-deep);border:2px solid var(--brand-deep);padding:11px;border-radius:14px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Grandstander';display:flex;align-items:center;gap:7px;justify-content:center;box-shadow:3px 3px 0 var(--brand-deep);transition:.12s}
  .btn-chunky:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--brand-deep)}
  .btn-chunky:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--brand-deep)}
  .howlink{background:none;border:none;color:#9385C4;font-size:11px;cursor:pointer;padding:8px;text-align:center;font-weight:700}
  .howlink:hover{color:#fff}

  /* Main */
  .main{padding:0 0 60px;min-width:0}
  .page-head{padding:26px 34px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .page-head h1{font-size:32px;font-weight:900;margin:0 0 4px;letter-spacing:-.01em;color:var(--brand)}
  .page-head .dek{font-family:'Fraunces';font-style:italic;font-size:15px;color:var(--ink-soft);margin:0;max-width:660px;line-height:1.4}
  .pill{display:inline-flex;align-items:center;gap:6px;background:var(--accent-pale);border:1.5px solid var(--brand);padding:6px 13px;border-radius:30px;font-size:11.5px;font-weight:800;white-space:nowrap;color:var(--brand)}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--hi);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(58,167,109,.5)}70%{box-shadow:0 0 0 7px rgba(58,167,109,0)}100%{box-shadow:0 0 0 0 rgba(58,167,109,0)}}

  .ticker{background:var(--brand-deep);color:#fff;overflow:hidden;white-space:nowrap;padding:9px 0;margin:0 0 18px}
  .ticker-track{display:inline-block;animation:scroll 44s linear infinite}
  .ticker-track span{margin:0 15px;font-size:11.5px;font-family:'JetBrains Mono'}
  .tdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}
  @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

  .wrap{padding:0 34px}
  .section-eyebrow{font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.14em;color:var(--brand);text-transform:uppercase;margin:26px 0 12px;font-weight:700}

  .subtabs{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 20px}
  .subtab{background:var(--paper);border:1.5px solid var(--border);padding:8px 14px;border-radius:30px;font-size:12.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;color:var(--ink-soft);transition:.15s;font-family:'Nunito'}
  .subtab:hover{border-color:var(--brand)}
  .subtab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .subtab .badge{background:rgba(0,0,0,.12);border-radius:20px;padding:0 6px;font-size:10px;font-weight:800}
  .subtab.on .badge{background:rgba(255,255,255,.25)}

  .grid{display:grid;gap:14px}
  .grid-2{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:repeat(3,1fr)}

  .card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:16px 16px 14px;position:relative;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
  .card .rail{position:absolute;left:0;top:0;bottom:0;width:5px}
  .card-head{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .glyph{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:17px;flex-shrink:0}
  .eyebrow{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .vbadge{margin-left:auto;font-size:9.5px;font-weight:800;padding:3px 8px;border-radius:20px;font-family:'JetBrains Mono';letter-spacing:.03em}
  .vhigh{background:#FDECEA;color:#C0392B}.vmed{background:#FDF3DA;color:#B9791B}.vlow{background:#EFEDE7;color:#8A8175}
  .card h3{font-family:'Fraunces';font-size:16px;font-weight:600;margin:0 0 7px;line-height:1.28}
  .card p.detail{font-size:13px;color:var(--ink-soft);line-height:1.5;margin:0 0 10px}
  .playbox{background:var(--brand-light);border-radius:12px;padding:10px 12px;margin:0 0 10px;font-size:12.5px;line-height:1.45}
  .playbox .plabel{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--brand);font-weight:700;display:block;margin-bottom:3px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:auto}
  .chip{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--cream-deep);color:var(--ink-soft)}
  .chip.brand{background:var(--brand-light);color:var(--brand)}
  .chip.plat{background:var(--accent-pale);color:var(--accent-deep)}
  .srcchips{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
  .src{font-family:'JetBrains Mono';font-size:9.5px;color:var(--ink-soft);background:var(--cream);border:1px solid var(--border);padding:2px 7px;border-radius:6px;text-decoration:none}
  .src:hover{border-color:var(--brand);color:var(--brand)}
  .dropbtn{margin-left:auto;background:var(--accent-soft);color:var(--brand-deep);border:1.5px solid var(--brand-deep);font-size:10.5px;font-weight:800;padding:4px 11px;border-radius:20px;cursor:pointer;font-family:'Grandstander';box-shadow:2px 2px 0 var(--brand-deep)}
  .dropbtn:hover{transform:translate(-1px,-1px)}
  .brief-link{display:flex;align-items:center;gap:6px;background:var(--accent-pale);border:1px solid var(--accent-deep);color:var(--brand-deep);border-radius:10px;padding:8px 11px;font-size:11px;font-weight:800;cursor:pointer;margin-top:10px;font-family:'Nunito';text-align:left;line-height:1.35;width:100%}
  .brief-link:hover{background:var(--accent-soft)}
  .brief-link .bl-arrow{font-family:'JetBrains Mono';flex-shrink:0}
  .pips{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
  .pip{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.01em;display:inline-flex;align-items:center;gap:3px}
  .read-hint{background:var(--brand-light);border:1px solid #DBCEF4;border-radius:13px;padding:11px 15px;font-size:12px;line-height:1.55;color:var(--ink-soft);margin-bottom:16px;display:flex;gap:9px;align-items:flex-start}
  .read-hint b{color:var(--brand);font-weight:800}
  .read-hint .rh-ico{font-size:15px;flex-shrink:0;line-height:1.3}
  .rh-list{margin:6px 0 0;padding-left:17px}
  .rh-list li{margin:3px 0;line-height:1.45}
  .drove-wrap{margin-top:11px;padding-top:11px;border-top:1px dashed var(--border)}
  .drove-lbl{display:block;font-family:'JetBrains Mono';font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:800;margin-bottom:7px}
  .drove-chips{display:flex;flex-direction:column;gap:6px}
  .drove-chip{text-align:left;background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:8px 11px;font-size:12px;line-height:1.35;color:var(--ink);font-family:'Inter';cursor:pointer;transition:.12s;font-weight:600}
  .drove-chip:hover{border-color:var(--brand);background:var(--brand-light);color:var(--brand)}
  .drove-chip.static{cursor:default;color:var(--ink-soft);font-weight:600}
  .drove-chip.static:hover{border-color:var(--border);background:var(--paper);color:var(--ink-soft)}
  .card.flash{animation:cardflash 1.7s ease-out}
  @keyframes cardflash{0%{box-shadow:0 0 0 3px var(--accent)}18%{box-shadow:0 0 0 3px var(--accent)}100%{box-shadow:var(--shadow)}}
  .lnow{color:var(--green);font-weight:800;white-space:nowrap}
  .ltail{color:var(--accent-deep);font-weight:800;white-space:nowrap}
  .cardfoot{display:flex;align-items:flex-end;gap:8px;margin-top:11px}
  .cardfoot .srcchips{flex:1;margin-top:0}
  .ch-right{margin-left:auto;display:flex;align-items:center;gap:6px}
  .ch-right .vbadge{margin-left:0}
  .fresh-chip{font-size:8.5px;font-weight:800;padding:2px 8px;border-radius:20px;font-family:'JetBrains Mono';letter-spacing:.02em;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  .fc-fresh{background:#E7F5EC;color:#2E8B57}
  .fc-comp{background:var(--accent-pale);color:var(--accent-deep)}
  .dir-badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;font-family:'JetBrains Mono'}
  .dir-hot{background:#FDECEA;color:#C0392B}.dir-cool{background:#E7F5EC;color:#2E8B57}.dir-flat{background:#EFEDE7;color:#8A8175}

  .mom-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  .mom-col{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
  .mom-col h4{font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:7px;color:var(--brand)}
  .mom-item{display:flex;gap:9px;padding:9px 0;border-bottom:1px dashed var(--border);font-size:12.5px;line-height:1.4}
  .mom-item:last-child{border-bottom:none}
  .mchip{font-size:8.5px;font-weight:800;padding:2px 7px;border-radius:20px;height:fit-content;white-space:nowrap;font-family:'JetBrains Mono'}
  .mup{background:#E7F5EC;color:#2E8B57}.mdown{background:#FDF3DA;color:#B9791B}

  /* Hero band */
  .ride-hero{background:linear-gradient(120deg,var(--brand-deep),var(--brand) 62%,var(--brand-mid));color:#fff;border-radius:20px;padding:22px 24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;position:relative;overflow:hidden}
  .ride-count{background:var(--accent);color:var(--brand-deep);font-family:'Grandstander';font-weight:900;font-size:15px;padding:8px 15px;border-radius:30px;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .ride-hero h2{font-size:20px;margin:0 0 3px;font-weight:900}
  .ride-hero p{margin:0;font-size:12.5px;color:#E4DBF7}
  .ride-meta{margin-left:auto;text-align:right;font-size:11px;color:#CFC2EE;font-family:'JetBrains Mono'}

  .pillar-head{display:flex;align-items:center;gap:9px;margin:22px 0 12px}
  .pillar-sw{width:16px;height:16px;border-radius:6px}
  .pillar-head h3{font-size:18px;font-weight:800;margin:0;color:var(--brand)}
  .pillar-head .ct{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono';margin-left:auto}

  .brief{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:14px 14px 12px;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:.15s;display:flex;flex-direction:column}
  .brief:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
  .brief .rail{position:absolute;left:0;top:0;bottom:0;width:5px}
  .brief-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .conv{font-size:9.5px;font-weight:800;padding:3px 8px;border-radius:20px;font-family:'JetBrains Mono';cursor:help;position:relative}
  .cHIGH{background:#E7F5EC;color:#2E8B57}.cMEDIUM{background:#FDF3DA;color:#B9791B}.cWATCH{background:#EFEDE7;color:#8A8175}
  .brief h4{font-family:'Fraunces';font-size:14px;font-weight:600;line-height:1.32;margin:0 0 11px;flex:1}
  .brief-bottom{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .nobaby{font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;background:#E5F6FA;color:var(--teal);font-family:'JetBrains Mono'}
  .anchor-tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;background:var(--accent-pale);color:var(--accent-deep);font-family:'JetBrains Mono'}
  .tip{position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 12px;border-radius:10px;font-size:11px;font-weight:600;width:214px;z-index:40;box-shadow:var(--shadow-lg);font-family:'Nunito';line-height:1.5;display:none}
  .conv:hover .tip{display:block}
  .tip b{color:var(--accent)}

  /* Casting meter */
  .meter-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:18px;box-shadow:var(--shadow)}
  .meter-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .meter-top h3{font-size:16px;margin:0;color:var(--brand)}
  .meter-bar{height:26px;border-radius:14px;background:var(--cream-deep);overflow:hidden;display:flex;margin:12px 0 8px;border:1px solid var(--border)}
  .meter-fill{background:linear-gradient(90deg,var(--teal),#3bbcd8);display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-size:11px;font-weight:800;color:#fff;font-family:'JetBrains Mono'}
  .meter-rest{flex:1;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:700;color:var(--ink-soft);font-family:'JetBrains Mono'}
  .meter-legend{display:flex;gap:18px;font-size:11.5px;color:var(--ink-soft);flex-wrap:wrap}
  .meter-legend b{color:var(--ink)}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(28,20,48,.55);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
  .modal{background:var(--cream);border-radius:22px;max-width:680px;width:100%;box-shadow:var(--shadow-lg);position:relative;margin-bottom:40px;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .modal-hero{background:linear-gradient(120deg,var(--brand-deep),var(--brand));color:#fff;padding:24px 28px;border-radius:22px 22px 0 0;position:relative}
  .x{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.16);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:17px;cursor:pointer;line-height:1}
  .x:hover{background:rgba(255,255,255,.3)}
  .modal-body{padding:22px 28px 28px}
  .m-sec{margin-bottom:20px}
  .m-sec-label{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--brand);font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .hookrow{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:8px;font-size:13.5px;line-height:1.4;position:relative}
  .hookrow.rec{border-color:var(--green);background:#F3FAF0}
  .rec-tag{font-size:8.5px;font-weight:800;color:var(--green);font-family:'JetBrains Mono';letter-spacing:.08em;position:absolute;top:8px;right:11px}
  .intel-row{display:flex;gap:9px;align-items:flex-start;background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;font-size:12.5px;line-height:1.4}
  .capvar{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:9px}
  .capvar .cvlabel{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.08em;color:var(--ink-soft);font-weight:700;text-transform:uppercase;margin-bottom:5px;display:flex;justify-content:space-between}
  .capvar p{margin:0;font-size:13px;line-height:1.5}
  .copybtn{background:var(--cream-deep);border:none;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;cursor:pointer;font-family:'JetBrains Mono';color:var(--ink-soft)}
  /* ===== Production Map ===== */
  .prod-lead{font-size:12px;color:var(--ink-soft);margin-bottom:12px}
  .prod-lead b{color:var(--brand)}
  .prod-block{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:14px 15px;margin-bottom:11px}
  .prod-h{font-family:'Nunito';font-weight:900;font-size:14px;color:var(--brand);display:flex;align-items:center;gap:7px;margin-bottom:11px}
  .prod-h .ph-tags{margin-left:auto;display:flex;gap:6px}
  .prod-meta{font-size:12.5px;line-height:1.5;margin-bottom:8px}
  .prod-meta:last-child{margin-bottom:0}
  .pm-k{display:inline-block;font-family:'JetBrains Mono';font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:800;background:var(--cream-deep);padding:2px 7px;border-radius:20px;margin-right:8px;vertical-align:middle}
  .prod-tip{background:var(--brand-light);border-radius:10px;padding:9px 12px;font-size:12px;line-height:1.45;color:var(--ink);margin-top:11px}
  .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px}
  .edit-grid .eg{font-size:12px;line-height:1.4}
  .edit-grid .eg .pm-k{margin-bottom:3px}
  .chan-row{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px dashed var(--border)}
  .chan-row:last-child{border-bottom:none;padding-bottom:0}
  .chan-badge{font-size:19px;flex-shrink:0;width:34px;height:34px;border-radius:10px;display:grid;place-items:center}
  .chan-fb{background:#E7F0FA}.chan-ig{background:var(--brand-light)}.chan-tt{background:var(--cream-deep)}
  .chan-who{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.04em;font-weight:800;color:var(--brand);text-transform:uppercase;margin-bottom:2px}
  .chan-cut{font-size:12px;line-height:1.45;color:var(--ink)}
  .exp-tag{font-family:'JetBrains Mono';font-size:8px;font-weight:800;letter-spacing:.06em;color:var(--accent-deep);background:var(--accent-pale);border:1px solid var(--accent);padding:2px 8px;border-radius:20px}
  .proven-tag{font-family:'JetBrains Mono';font-size:8px;font-weight:800;letter-spacing:.06em;color:#2E8B57;background:#E7F5EC;border:1px solid var(--green);padding:2px 8px;border-radius:20px}
  .exp-box{background:var(--accent-pale);border:1px solid var(--accent);border-radius:10px;padding:10px 12px;margin-bottom:9px}
  .exp-box .prod-meta:last-child{margin-bottom:0}
  /* phone storyboard */
  .phone-row{display:flex;gap:11px;overflow-x:auto;padding-bottom:6px;margin-bottom:2px}
  .phone{min-width:166px;width:166px;height:290px;background:var(--ink);border-radius:20px;padding:6px;flex-shrink:0;position:relative}
  .phone-screen{background:linear-gradient(165deg,var(--brand-light),#fff);border-radius:15px;height:100%;padding:11px;display:flex;flex-direction:column}
  .phone-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .phone-scene{font-family:'JetBrains Mono';font-size:8.5px;color:var(--brand);font-weight:800;letter-spacing:.05em}
  .phone-sec{font-family:'JetBrains Mono';font-size:8px;color:var(--ink-soft);font-weight:700;background:var(--cream-deep);padding:1px 6px;border-radius:20px}
  .phone-type{font-family:'JetBrains Mono';font-size:8px;font-weight:700;color:var(--accent-deep);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
  .phone-do{font-size:11px;line-height:1.4;color:var(--ink);font-weight:600}
  .phone-osd{margin-top:9px;background:rgba(41,36,32,.86);color:#fff;font-size:10px;line-height:1.35;font-weight:700;padding:6px 8px;border-radius:8px;align-self:flex-start;max-width:100%}
  .phone-osd .osl{display:block;font-family:'JetBrains Mono';font-size:7px;letter-spacing:.1em;opacity:.7;margin-bottom:2px;font-weight:800}
  /* words + panel-live */
  .words-sub{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;margin-bottom:7px}
  .panel-head{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap}
  .panel-note{font-size:11.5px;color:var(--ink-soft);font-style:italic;font-family:'Fraunces';line-height:1.4;flex:1;min-width:170px}
  .panel-run{background:var(--brand);color:#fff;border:none;font-family:'JetBrains Mono';font-size:10px;font-weight:800;letter-spacing:.04em;padding:7px 12px;border-radius:20px;cursor:pointer;white-space:nowrap}
  .panel-run:disabled{opacity:.55;cursor:default}
  .panel-live-badge{font-family:'JetBrains Mono';font-size:8px;font-weight:800;letter-spacing:.08em;color:#2E8B57;background:#E7F5EC;border:1px solid var(--green);padding:3px 8px;border-radius:20px}
  .panel-share{margin-left:auto;font-family:'JetBrains Mono';font-size:8px;color:var(--ink-soft);font-weight:700}
  .panel-chan{font-family:'JetBrains Mono';font-size:8px;font-weight:800;letter-spacing:.04em;color:var(--brand);background:var(--brand-light);padding:2px 7px;border-radius:20px}
  /* ===== Studio chat ===== */
  .studio{display:flex;flex-direction:column;height:calc(100vh - 176px);min-height:440px;background:var(--paper);border:1px solid var(--border);border-radius:18px;overflow:hidden}
  .st-ctx{background:linear-gradient(120deg,var(--brand-deep),var(--brand));color:#fff;padding:10px 16px;display:flex;align-items:center;gap:11px;font-size:12.5px}
  .st-ctx .stx-lbl{font-family:'JetBrains Mono';font-size:8.5px;letter-spacing:.1em;opacity:.85;text-transform:uppercase;white-space:nowrap}
  .st-ctx b{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .st-ctx .stx-x{margin-left:auto;background:rgba(255,255,255,.2);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;flex-shrink:0}
  .st-scroll{flex:1;overflow-y:auto;padding:22px}
  .st-empty{max-width:580px;margin:5vh auto 0;text-align:center}
  .st-empty h2{font-size:24px;font-weight:900;margin:10px 0 6px}
  .st-empty p{font-size:13px;color:var(--ink-soft);line-height:1.55;margin:0 auto 20px;max-width:470px}
  .st-sugg{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:580px;margin:0 auto}
  .st-sg{background:var(--cream);border:1px solid var(--border);border-radius:12px;padding:12px 13px;text-align:left;cursor:pointer;font-size:12.5px;line-height:1.4;color:var(--ink);transition:.12s}
  .st-sg:hover{border-color:var(--brand);background:var(--brand-light)}
  .st-sg .sgl{display:block;font-family:'JetBrains Mono';font-size:8px;letter-spacing:.08em;color:var(--brand);margin-bottom:4px;font-weight:800}
  .msg{display:flex;gap:10px;margin-bottom:16px;max-width:780px}
  .msg.user{margin-left:auto;flex-direction:row-reverse}
  .msg-av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;flex-shrink:0}
  .msg.user .msg-av{background:var(--accent);color:var(--brand-deep)}
  .msg.bot .msg-av{background:var(--brand);color:#fff}
  .msg-bub{border-radius:14px;padding:11px 15px;font-size:13.5px;line-height:1.6}
  .msg.user .msg-bub{background:var(--brand);color:#fff}
  .msg.bot .msg-bub{background:var(--cream);border:1px solid var(--border);color:var(--ink)}
  .msg-bub p{margin:0 0 9px} .msg-bub p:last-child{margin-bottom:0}
  .msg-bub h3{font-size:14.5px;font-weight:800;margin:12px 0 6px} .msg-bub h3:first-child{margin-top:0}
  .msg-bub h4{font-size:13px;font-weight:800;margin:10px 0 5px}
  .msg-bub ul,.msg-bub ol{margin:4px 0 9px;padding-left:20px} .msg-bub li{margin-bottom:4px}
  .msg-bub code{background:var(--cream-deep);padding:1px 5px;border-radius:5px;font-size:12px;font-family:'JetBrains Mono'}
  .msg-bub blockquote{border-left:3px solid var(--brand);margin:6px 0;padding:2px 0 2px 12px;color:var(--ink-soft);font-style:italic}
  .msg-bub hr{border:none;border-top:1px solid var(--border);margin:10px 0}
  .msg-bub a{color:var(--brand);font-weight:700}
  .blink::after{content:'▍';animation:bl 1s steps(1) infinite;color:var(--brand);margin-left:1px}
  @keyframes bl{50%{opacity:0}}
  .st-err{max-width:780px;margin:0 0 16px;background:var(--accent-pale);border:1px solid var(--accent);border-radius:12px;padding:11px 14px;font-size:12.5px;color:var(--ink-soft);line-height:1.5}
  .st-inputbar{border-top:1px solid var(--border);padding:12px 14px;display:flex;gap:10px;align-items:flex-end;background:var(--paper)}
  .st-input{flex:1;border:1px solid var(--border);border-radius:14px;padding:11px 14px;font-size:13.5px;font-family:'Nunito';resize:none;max-height:120px;line-height:1.4;outline:none}
  .st-input:focus{border-color:var(--brand)}
  .st-send{background:var(--brand);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:17px;cursor:pointer;flex-shrink:0}
  .st-send:disabled{opacity:.5;cursor:default}
  /* ===== weekly dashboard modules ===== */
  .chan-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:20px}
  .chan-pb{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:14px 15px}
  .chan-pb .cc-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .cc-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
  .cc-plat{font-family:'Grandstander';font-weight:800;font-size:15px;color:var(--brand);line-height:1}
  .cc-who{font-family:'JetBrains Mono';font-size:8.5px;font-weight:700;letter-spacing:.04em;color:var(--ink-soft);text-transform:uppercase;margin-top:3px}
  .cc-job{font-size:12px;line-height:1.45;color:var(--ink);margin-bottom:9px}
  .cc-lead{font-family:'JetBrains Mono';font-size:9px;font-weight:800;letter-spacing:.03em;color:var(--accent-deep);background:var(--accent-pale);padding:4px 9px;border-radius:20px;display:inline-block}
  .wk-mod{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:15px 16px}
  .wk-h{font-family:'Grandstander';font-weight:800;font-size:15px;color:var(--brand);display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .wk-ct{font-family:'JetBrains Mono';font-size:10px;font-weight:800;color:var(--accent-deep);background:var(--accent-pale);padding:1px 8px;border-radius:20px}
  .wk-sub{font-size:11.5px;color:var(--ink-soft);line-height:1.45;margin-bottom:12px;font-style:italic;font-family:'Fraunces'}
  .exp-item,.paid-item{border:1px solid var(--border);border-radius:11px;padding:11px 12px;margin-bottom:9px;cursor:pointer;transition:.12s}
  .exp-item:hover,.paid-item:hover{border-color:var(--brand);background:var(--brand-light)}
  .exp-item:last-child,.paid-item:last-child{margin-bottom:0}
  .exp-item-t{font-weight:800;font-size:12.5px;line-height:1.35;margin-bottom:7px}
  .exp-item .prod-meta{font-size:11.5px;margin-bottom:5px}
  .paid-item{display:flex;gap:10px;align-items:flex-start}
  .paid-ic{font-size:17px;flex-shrink:0;margin-top:1px}
  .paid-t{font-weight:800;font-size:12.5px;line-height:1.35;margin-bottom:3px}
  .paid-note{font-size:11.5px;color:var(--ink-soft);line-height:1.45}
  /* ===== turnkey 'auto-produce' teaser ===== */
  .produce-teaser{display:flex;gap:12px;align-items:flex-start;background:linear-gradient(120deg,var(--brand-light),var(--accent-pale));border:1px dashed var(--brand-mid);border-radius:12px;padding:13px 15px;margin-top:12px}
  .produce-teaser .pt-ic{font-size:22px;line-height:1;flex-shrink:0}
  .produce-teaser b{font-size:13px}
  .soon-pill{font-family:'JetBrains Mono';font-size:8px;font-weight:800;letter-spacing:.08em;color:var(--brand);background:#fff;border:1px solid var(--brand-mid);padding:2px 7px;border-radius:20px;margin-left:8px;vertical-align:middle}
  .produce-teaser .pt-sub{font-size:11.5px;color:var(--ink-soft);line-height:1.45;margin-top:4px}
  /* panel */
  .panel-react{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:8px;display:flex;gap:11px;align-items:flex-start}
  .panel-av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:17px;flex-shrink:0;background:var(--brand-light)}
  .panel-name{font-weight:800;font-size:12.5px}
  .panel-score{margin-left:auto;font-family:'JetBrains Mono';font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px}
  .panel-line{font-size:12px;color:var(--ink-soft);font-style:italic;font-family:'Fraunces';line-height:1.4;margin-top:2px}
  details.acc{background:var(--paper);border:1px solid var(--border);border-radius:12px;margin-bottom:9px;overflow:hidden}
  details.acc summary{list-style:none;cursor:pointer;padding:12px 14px;font-weight:800;font-size:13px;display:flex;align-items:center;gap:8px;font-family:'Nunito'}
  details.acc summary::-webkit-details-marker{display:none}
  details.acc[open] summary{border-bottom:1px solid var(--border)}
  .acc-body{padding:12px 14px;font-size:12.5px;line-height:1.55;color:var(--ink-soft)}
  .chev{margin-left:auto;transition:.2s}
  details.acc[open] .chev{transform:rotate(180deg)}

  /* Performance chart */
  .perf-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;box-shadow:var(--shadow);margin-bottom:16px}
  .perf-card h3{font-size:19px;margin:0 0 3px;color:var(--brand)}
  .perf-card .sub{font-family:'Fraunces';font-style:italic;color:var(--ink-soft);font-size:13.5px;margin-bottom:18px}
  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:9px}
  .bar-label{width:190px;font-size:11.5px;font-weight:700;text-align:right;flex-shrink:0;line-height:1.25}
  .bar-track{flex:1;height:22px;background:var(--cream);border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;border-radius:0 6px 6px 0;min-width:4px}
  .bar-val{width:52px;flex-shrink:0;font-family:'JetBrains Mono';font-size:11.5px;font-weight:800;white-space:nowrap;text-align:left}
  .perf-legend{display:flex;gap:20px;margin:16px 0 4px;font-size:12px;font-weight:700}
  .perf-legend span{display:flex;align-items:center;gap:6px}
  .sw{width:13px;height:13px;border-radius:4px}
  .perf-punch{background:var(--brand-light);border-left:4px solid var(--brand);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.5;margin-top:16px}
  .funnel{display:flex;align-items:center;gap:10px;margin:18px 0 4px;flex-wrap:wrap}
  .fstep{flex:1;min-width:130px;background:var(--cream);border:1px solid var(--border);border-radius:14px;padding:16px 12px;text-align:center}
  .fstep .fnum{font-family:'Grandstander';font-weight:900;font-size:27px;line-height:1}
  .fstep .flbl{font-size:11.5px;color:var(--ink-soft);margin-top:5px;line-height:1.3}
  .farrow{font-family:'JetBrains Mono';font-size:15px;color:var(--ink-soft);flex-shrink:0}
  @media(max-width:600px){.funnel{flex-direction:column}.farrow{transform:rotate(90deg)}}

  /* Milestone Map */
  .mm-bands{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .mm-band{flex:1;min-width:130px;background:var(--paper);border:2px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;transition:.15s;text-align:center}
  .mm-band:hover{border-color:var(--brand-mid)}
  .mm-band.on{border-color:var(--brand);background:var(--brand-light)}
  .mm-band .age{font-family:'Grandstander';font-weight:900;font-size:17px;color:var(--brand)}
  .mm-band .lbl{font-size:10.5px;color:var(--ink-soft);font-weight:700;margin-top:2px}
  .mm-detail{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .mm-flow{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
  .mm-step{background:var(--paper);padding:16px}
  .mm-step:last-child{background:var(--brand-light)}
  .mm-step .mstage{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.1em;color:var(--ink-soft);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .mm-step h4{font-size:14px;margin:0 0 6px;color:var(--brand)}
  .mm-step p{font-size:12px;color:var(--ink-soft);line-height:1.5;margin:0}
  .mm-cta{padding:14px 18px;background:var(--brand-deep);color:#fff;font-size:12.5px;display:flex;align-items:center;gap:10px}

  /* how it works */
  .flow-rail{display:flex;align-items:center;gap:0;margin:20px 0;overflow-x:auto;padding-bottom:6px}
  .flow-node{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:16px;flex-shrink:0;cursor:pointer;border:2px solid var(--border);background:var(--paper);transition:.25s}
  .flow-node.done{background:var(--brand);border-color:var(--brand);color:#fff}
  .flow-node.active{background:var(--accent);border-color:var(--accent-deep);transform:scale(1.18);box-shadow:0 0 0 5px rgba(246,217,59,.3)}
  .flow-line{height:3px;width:26px;background:var(--border);flex-shrink:0}
  .flow-line.fill{background:var(--brand)}
  .flow-card{background:var(--paper);border:1px solid var(--border);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow)}
  .fc-agent{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .fc-agent .g{width:40px;height:40px;border-radius:12px;background:var(--brand-light);display:grid;place-items:center;font-size:18px}
  .watch-chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
  .watch-chip{font-size:10px;background:var(--cream);border:1px solid var(--border);padding:3px 9px;border-radius:20px;font-family:'JetBrains Mono';color:var(--ink-soft)}
  .verdict{background:#F1FAF0;border:1px solid #BFE3CD;border-radius:11px;padding:11px 13px;font-size:12.5px;margin-top:12px;line-height:1.5}
  .incoming{font-size:10px;font-family:'JetBrains Mono';color:var(--ink-soft);background:var(--cream);padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:8px}
  .step-band{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin:18px 0}
  .step-cell{background:var(--paper);padding:16px}
  .step-cell.you{background:var(--brand-deep);color:#fff}
  .step-num{font-family:'JetBrains Mono';font-size:11px;color:var(--ink-soft);border-bottom:1px dashed var(--border);padding-bottom:5px;margin-bottom:8px}
  .step-cell.you .step-num{color:#C9BEE8;border-color:rgba(255,255,255,.2)}
  .step-cell h4{font-size:15px;margin:0 0 5px;color:var(--brand)}
  .step-cell.you h4{color:#fff}
  .step-cell p{font-size:11.5px;color:var(--ink-soft);margin:0;line-height:1.45}
  .step-cell.you p{color:#E4DBF7}

  .wip-banner{background:repeating-linear-gradient(45deg,var(--accent-pale),var(--accent-pale) 10px,#FBF0C4 10px,#FBF0C4 20px);border:1.5px dashed var(--accent-deep);border-radius:14px;padding:16px 18px;margin-bottom:16px}
  .wip-banner .tag{font-family:'JetBrains Mono';font-size:9.5px;font-weight:800;letter-spacing:.1em;color:var(--brand);background:#fff;padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:8px}
  .wip-banner p{margin:0;font-size:12.5px;line-height:1.5;color:var(--ink-soft)}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}
  .kpi{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden;text-align:center}
  .kpi .soon{position:absolute;inset:0;display:grid;place-items:center;font-family:'Grandstander';font-size:34px;font-weight:900;color:rgba(74,30,158,.06)}
  .kpi .kv{font-family:'Grandstander';font-size:26px;font-weight:900;color:var(--ink-soft);position:relative}
  .kpi .kl{font-size:10.5px;color:var(--ink-soft);position:relative;margin-top:3px}
  .foot{text-align:center;padding:30px;font-family:'JetBrains Mono';font-size:10px;color:var(--ink-soft);margin-top:20px}
  .decision-row{display:flex;gap:12px;align-items:flex-start;background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
  .dverb{font-size:9.5px;font-weight:800;padding:3px 9px;border-radius:20px;font-family:'JetBrains Mono';white-space:nowrap;height:fit-content}
  .d-prom{background:#E7F5EC;color:#2E8B57}.d-kill{background:#FDECEA;color:#C0392B}.d-queue{background:var(--brand-light);color:var(--brand)}.d-esc{background:#FDF3DA;color:#B9791B}

  .amb-card{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:var(--shadow);display:flex;flex-direction:column;position:relative;overflow:hidden}
  .amb-card .rail{position:absolute;left:0;top:0;bottom:0;width:5px}
  .amb-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .amb-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--teal));display:grid;place-items:center;color:#fff;font-family:'Grandstander';font-weight:900;font-size:15px}
  .amb-handle{font-weight:800;font-size:13px}
  .amb-name{font-size:11px;color:var(--ink-soft)}
  .status-pill{font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;font-family:'JetBrains Mono';margin-left:auto}
  .st-watch{background:var(--accent-pale);color:var(--accent-deep)}

  .studio-teaser{background:linear-gradient(135deg,var(--brand-deep),var(--brand));border-radius:20px;padding:34px;color:#fff;text-align:center}
  .studio-teaser h2{font-size:26px;margin:12px 0 8px;font-weight:900}
  .studio-teaser p{font-size:13.5px;color:#E4DBF7;max-width:520px;margin:0 auto 18px;line-height:1.55}
  .st-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:560px;margin:0 auto}
  .st-c{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:12px 14px;text-align:left;font-size:12.5px}
  .st-c .stq{font-family:'Fraunces';font-style:italic}

  @media(max-width:860px){
    .app{grid-template-columns:1fr}
    .side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center}
    .side-spacer{display:none;flex:0}
    .grid-2,.grid-3,.mom-cols,.st-cards,.mm-flow,.step-band,.kpi-grid{grid-template-columns:1fr}

  {key:"gail",name:"Gifting Grandma Gail",emoji:"🎁",channel:"Facebook",bio:"Buys for the grandkids on Facebook. Wants the 'right,' expert-backed thing — and to look thoughtful giving it. Trusts credentials + a clear reason it matters. Your Facebook audience.",loves:["expert","credible","gift","milestone","box","reassure"], pos:"An expert says so? That's exactly what I want to give — I'm sharing this with all my friends.", neu:"Lovely, but I'd want to know WHY it matters before I gift it."},

const WELCOME_HIGHLIGHTS = [
  {t:"A doll set got pulled this week — and the listing never said a word",d:"Health Canada issued a consumer advisory Tuesday for a doll-and-stroller set sold on Amazon.ca: a magnetic toy pacifier and detachable plush-bear eyes, both choking risks, on roughly 24 units sold. It sits on top of Consumer Reports' February investigation, which found banned crib bumpers still listed on major marketplaces and pacifier listings routinely missing warnings. The real problem isn't recalls — it's that a parent scrolling a marketplace has no reliable way to know what's been checked. That's quietly the strongest thing about your box, and you've never said it out loud."},
  {t:"New national data: mothers trust AI companies less than anything else tested",d:"Count on Mothers released the first wave of its national benchmark on July 15 — 2,818 mothers, nationally representative, fielded in May. 65% report little or no trust in AI companies to act in children's interests, the lowest of eleven institutions they measured. This is fresh outside evidence for something you already do by instinct: parents want to hear who chose the toy and why. The curation is the good part. It just reads warmer when it sounds human, because that's what it is."},
  {t:"Your closest competitor's real moat is a name, not a toy",d:"Panda Crate's \"Best Montessori Toy Subscription of 2026\" write-up credits a pediatrician by name as the person behind the curriculum. Lovevery is running the same logic from the other end — it launched a math program in May advertising a 93% improvement claim (real and published, though the study ran on 28 families). Both are selling proof, and the proof has a person attached. You borrow this exact credibility when you say \"activities from a speech therapist\" — you just don't keep the name, so the trust leaves when the video ends."},

  {t:"Stop describing the stage change — let her watch it happen",d:"You've turned the wake-window hit into a series. The next thing it can do is prove the point of the box on its own. Take one object — three nesting cups — and film it three times: what it means at 6 months, at 12, at 24. Same cups, same table, adult hands only. A parent seeing the progression is more convincing than any percentage a competitor can advertise, and it's the one thing an age-tailored box can show that a single kit never can."},
  {t:"Give her a slot on the calendar, not a spot in a video",d:"Finding a face was the last step; keeping her is this one. Lovevery has run 3.8K sponsored posts across 2,100 creators, and only 9% of them ever posted in three or more separate months. Volume is cheap in this category — recurrence is what nobody has bought. It might be worth picking two or three people you already work with and offering a standing monthly segment instead of one-off posts. Same budget, and by month three parents start following the person, which means the next post arrives with trust already on it."},
  {t:"Make the no-baby post the reliable one, not the experiment",d:"Trying one worked. The move now is treating it as the piece that always goes out — because it's the only format that never waits on a baby's nap or a mom's schedule. Checklist carousels are Instagram's strongest save-driver right now, and a five-slide \"signs your baby is ready for…\" is a two-hour build with nobody on set. Three of this week's briefs need no baby at all. That's the number worth watching climb."},

  {t:"A specialist whose name parents learn",size:"medium",horizon:"this quarter",territory:"Owned authority — the trust that stays after the video ends",move:"Panda Crate's award write-up credits a pediatrician by name; that name is doing the work. The cheapest version for you isn't a big signing — it's one pediatric OT or speech therapist, a modest following is fine, booked for the same short segment every month with her credential on screen every time. What compounds is the same face coming back, not the follower count. It might be worth drafting the offer this week: one recurring slot, four sessions, one topic each."},
  {t:"A no-booking post that goes out every single week",size:"small",horizon:"test now",territory:"Volume that doesn't depend on anyone showing up",move:"Instagram carousel engagement climbed to 0.72% this year, up about 31%, and checklists are what's driving it. A five-slide \"signs your baby is ready for…\" is a two-hour build — flat-lay stills at a kitchen table, designed text, done. Imagine that as a fixed slot on the calendar: same day every week, nobody to wrangle, and by month three you have a small library parents keep coming back to."},
  {t:"The Facebook post written for the gift-buyer, not the mom",size:"medium",horizon:"next 6 weeks",territory:"Grandparents and dads — a buyer you've never written a line for",move:"Two of this week's pieces already fit her without changing a frame: the ten-second toy check, and the calm hot-car habit that NHTSA reissued after a hard start to July. A grandparent doing pickup and drop-off is exactly who those reach. Worth trying one Facebook post a week aimed squarely at the person who BUYS the box rather than the person who opens it — that's the muscle you'll want warm before the holiday gifting window."},

const TRENDS = [
  {glyph:"🔎",type:"SAFETY",v:"high",date:"Jul 14",fresh:true,live:true,h:"A doll set got pulled this week for parts a baby could pull off — and the listing never said so",d:"Health Canada issued a consumer advisory Tuesday July 14 for the BABESIDE Doll and Stroller Set (model HYBKSPJ633-CP1, sold on Amazon.ca): a magnetic toy pacifier plus detachable plush-bear eyes, both choking risks, on roughly 24 units sold between July 2025 and January 2026. That lands on top of Consumer Reports' February investigation, which found federally banned padded crib bumpers still listed on Amazon and Temu, water beads still marketed for kids, and pacifier listings routinely missing strangulation warnings — with Target the only one of four marketplaces where researchers found no banned or restricted items. The pattern isn't recalls, it's listings: a parent scrolling a marketplace has no reliable way to know what's been vetted. That is quietly the strongest argument 123 Baby Box has never made out loud.",play:"There's a soft, no-shame post in here: the three things you can check on any toy in ten seconds — does anything come off, is there an age band, does the listing say who tested it. Show the checking, not the scaring. It ladders straight into why someone else already did that work for every item in the box.",pillars:["BOJ","MAP"],src:[["cp24.com","Health Canada choking-hazard advisory, BABESIDE doll + stroller set (Jul 14, 2026)"],["consumerreports.org","CR investigation: banned baby products still listed by third-party marketplace sellers"]],drove:"MAP-0720-4"},
  {glyph:"🤍",type:"RESEARCH",v:"high",date:"Jul 15",fresh:true,live:true,h:"New national data: mothers trust AI companies less than any other institution tested",d:"Count on Mothers released Wave 1 of its National Benchmark on July 15 — a nationally representative sample of 2,818 mothers with a child under 21, fielded in May 2026 and weighted for region, race, education, income and age, with a methodology board tied to University College London. The headline: 65% of mothers report little or no trust in AI companies to act in children's interests, the lowest-trust institution of eleven tested. Among mothers whose kids use AI beyond entertainment, 62% worry it hampers problem-solving and independent thinking. This is fresh, dated, third-party evidence for something the brand already does by instinct — parents want to hear who chose the toy and why, not what system chose it.",play:"Worth a look at how the box is described anywhere the word \"AI\" appears. The same promise lands warmer as a human one — moms and specialists picking what fits this exact stage. Same truth, and it's the version this data says mothers will actually believe.",pillars:["MAP","YGT"],src:[["prweb.com","Count on Mothers National Benchmark Wave 1 release (Jul 15, 2026)"],["countonmothers.org","Count on Mothers — benchmark methodology + findings"]],drove:"MAP-0720-4"},
  {glyph:"📈",type:"COMPETITOR",v:"high",date:"",fresh:false,live:false,h:"Lovevery is now selling proof, not toys — and the proof is thinner than the headline",d:"Lovevery launched The Math Skill Set on May 12 with general availability May 14 — its second academic program after The Reading Skill Set — marketed with the claim that 93% of 4- and 5-year-olds significantly improved their math scores, a 42% increase in six weeks. The number is real and published, but the underlying study ran on 28 families over six weeks, which is a very small base for a percentage that big. The strategic read matters more than the stat: the category leader has decided that measurable developmental outcome is the thing worth advertising, and it is walking that claim up from babies into elementary school. 123 Baby Box's own proof runs the other direction — a free wake-window video that 1.6 million people chose to watch.",play:"There's a stronger, more honest version of proof available here: show the same skill at three ages side by side and let a parent see the progression themselves. Watching a stage change is more convincing than a percentage, and it's the one thing an age-tailored box can demonstrate that a one-off kit can't.",pillars:["MAP","PWP"],src:[["morningstar.com","Lovevery introduces The Math Skill Set (Business Wire, May 12, 2026)"],["thetoyinsider.com","Toy Insider — Lovevery Skill Set program coverage"]],drove:"PWP-0720-3"},
  {glyph:"🩺",type:"COMPETITOR",v:"high",date:"",fresh:false,live:false,h:"Panda Crate puts a real pediatrician's name on the curriculum. That name is the whole moat.",d:"Expert Consumers named Panda Crate \"Best Montessori Toy Subscription of 2026\" in a March 4 release, judged on curriculum design, safety standards, expert involvement and developmental adaptability — and the release credits pediatrician Dimitri Christakis, MD, MPH by name as the researcher informing the curriculum across its 18 stage-specific crates from birth through age three. Fisher-Price has run the same play since it partnered with Big Little Feelings on expert-backed toddler play kits, announced July 21, 2025. In both cases the credential isn't a footnote, it's the reason a stranger trusts the box. 123 Baby Box borrows this exact credibility — \"activities from a speech therapist\" — but never keeps the name, so the trust evaporates the moment the video ends.",play:"The cheapest version of this is one specialist, one recurring segment, name and credential on screen every time. Even a small pediatric OT or SLP with a modest following works — what compounds is the same face returning, not the follower count. One month of that and parents start recognizing her before they recognize the box.",pillars:["MAP"],src:[["prnewswire.com","Panda Crate named Best Montessori Toy Subscription of 2026 (Mar 4, 2026)"],["businesswire.com","Fisher-Price partners with Big Little Feelings on expert-backed play kits"]],drove:"MAP-0720-1"},
  {glyph:"🔁",type:"CATEGORY",v:"high",date:"Jul 13",fresh:true,live:true,h:"Lovevery's creator data, updated Monday: they aren't buying reach, they're buying repetition",d:"Modash's Lovevery breakdown, updated July 13, shows 3.8K sponsored posts across 2,100 unique influencers, with 35.1% of those partnerships going to creators whose posts average just 1,000–5,000 views, and Instagram carrying 54% of the sponsored content. The buried number is the interesting one: only 9% of partners — 195 of 2,100 — posted in three or more separate months, and the standout, @early_years_steph, ran 20 posts across 11 months. Meanwhile the biggest names in this lane are single, consistent hosts, not rosters: Susie Allison, M.Ed, has built @busytoddler to roughly 2.4M followers as one recognizable person showing up over and over. Volume is cheap in this category. Recurrence is what nobody has bought.",play:"Rather than adding new creators, it may be worth picking two or three you already work with and offering them a standing monthly slot instead of one-off posts. Same budget, and by month three parents start following the person — which means the next post arrives with trust already attached.",pillars:["MAP","BOJ"],src:[["modash.io","Lovevery influencer strategy breakdown (updated Jul 13, 2026)"],["hypeauditor.com","@busytoddler — Susie Allison, M.Ed audience profile"]],drove:"PWP-0720-3"},
  {glyph:"💾",type:"DEMAND",v:"medium",date:"",fresh:false,live:false,h:"The saveable checklist is quietly the best-performing format on Instagram right now",d:"Instagram carousel engagement hit 0.72% in 2026, up 30.9% from 0.55% the year before, per a Social Insider benchmark — and checklist-style carousels are called out specifically as the strongest driver of saves, because a parent bookmarks a resource she intends to come back to. This is a format signal, not a topic signal: it says the thing that travels isn't a clever video, it's a reference a mom keeps. It also happens to be the one format 123 Baby Box can produce on a schedule with nobody on camera — no baby to wrangle, no photogenic mom to book, just clear text and the developmental logic the brand already knows cold.",play:"A five-slide \"signs your baby is ready for X\" carousel is a two-hour build and it can go out every week without booking anyone. Saves are the metric to watch here, not views — a save is a parent quietly saying she'll need this again, which is the same parent who eventually wants the box that matches her baby's stage.",pillars:["MAP","PWP"],src:[["creatorflow.so","Instagram 2026 benchmarks — carousel engagement up 30.9% YoY (Social Insider data)"],["carouselli.com","Instagram carousel engagement benchmark analysis"]],drove:"MAP-0720-2"},
  {glyph:"🌡️",type:"SEASONAL",v:"high",date:"Jul 12–16",fresh:true,live:true,h:"Second heat wave of the month set all-time records — indoors is where families actually are",d:"Billings, Montana hit 111°F and Salt Lake City hit 109°F on Sunday July 12, both all-time records, with Extreme Heat Warnings holding into the following days and the event peaking mid-week. Salt Lake's record stands against 152 years of observations. This is the second heat wave July has delivered, which changes the emotional register from \"nice summer\" to \"we are stuck inside again\" — a real, current mood rather than a generic seasonal assumption. For a brand whose entire product is what to do with a baby in a room, that's the most useful weather story of the year.",play:"\"Week two of hiding from the heat\" is a more honest opener than \"summer fun\" right now, and it's a natural home for the low-effort indoor activities the team already has. Filmed on a kitchen floor with parent hands only, this is one that can go out fast while the mood is still true.",pillars:["PWP","YGT"],src:[["watchers.news","Billings and Salt Lake City set all-time heat records (Jul 13, 2026)"],["ksl.com","Salt Lake City 109°F — all-time record heat coverage"]],drove:"PWP-0720-1"},
  {glyph:"🚗",type:"SAFETY",v:"medium",date:"Jul 14",fresh:true,live:true,h:"NHTSA reissued its hot-car warning this week after three children died in ten days",d:"The agency confirmed three children died in hot cars in the first ten days of July 2026 and reissued its prevention guidance — check the back seat every single trip, and don't rely on cracked windows. The habit it recommends is deliberately small: leave something you'll need at your destination in the back seat so you have to turn around. Pairing that with the same week's record temperatures, this is the safety message circulating in parent feeds right now. The handling matters more than the hook — this is a topic where the reflex is to frighten, and frightening a tired parent is the fastest way to lose her.",play:"If this one gets touched at all, it works best as a calm habit shared between adults — one sentence, no statistics, no imagery of anything going wrong. It's a natural fit for the Facebook audience, where grandparents doing pickup and drop-off are exactly who this reaches, and where a gentle reminder from a baby brand reads as care rather than alarm.",pillars:["YGT"],src:[["counton2.com","NHTSA warns of hot-car deaths after 3 children die in 10 days"],["kota.com","NHTSA hot-car prevention guidance — regional pickup"]]},
  {glyph:"🍼",type:"CATEGORY",v:"medium",date:"",fresh:false,live:false,h:"The infant-formula botulism investigation is still open — and it's shaping what parents are anxious about",d:"Nara Organics Whole Milk Organic Powdered Infant Formula was recalled June 13 after being linked to infant botulism cases across California, Pennsylvania and Washington — three lab-confirmed plus an additional reported case, all hospitalized boys aged two to five months, all treated with BabyBIG antitoxin, no deaths, with C. botulinum confirmed in an opened can. CDC and FDA both still list the investigation as active. 123 Baby Box has no standing to comment on formula and shouldn't — but this is useful as context, not content. It explains why \"who checked this\" is the question underneath every baby-product decision a parent is making right now, including toys.",play:"This one is for the team's ears, not the feed. It's the reason a quiet line about how items get vetted lands harder this month than it would have in April — worth working into existing captions as a calm aside rather than building a post about safety on top of someone else's outbreak.",pillars:["BOJ"],src:[["fda.gov","FDA outbreak investigation: infant botulism, powdered infant formula"],["cdc.gov","CDC — infant botulism outbreak investigation, June 2026 formula"]],drove:"MAP-0720-4"},
  {glyph:"💜",type:"CALENDAR",v:"high",date:"Jul 19–25",fresh:true,live:true,h:"Black Maternal Mental Health Week starts the day this content week begins",d:"The 2026 observance runs July 19–25, with this year's theme from Shades of Blue Project: \"Building an Accountable Village: Providing Sustainability and Generational Impact Through Inspiration, Nourishment, and Mindful Awareness.\" Roughly 40% of Black mothers experience a maternal mental health condition — about double the rate among mothers overall — and up to half never receive treatment. A counselor quoted in this week's coverage put the barrier plainly: so many Black mothers are taught to push through and be strong for everyone else, even while they're silently struggling. The word \"village\" in that theme is the same word this brand has been using since it started — nobody is there to hold your hand, but we sure will.",play:"This deserves either real participation or none — a graphic that says nothing would be worse than silence. If it's a yes, the honest version is one post that names the week, points to a real support resource, and offers no product at all. Zero baby needed, zero cost, and it says more about what the brand is than a month of activity posts.",pillars:["YGT"],src:[["click2houston.com","Black Maternal Mental Health Week coverage + prevalence data (Jul 14, 2026)"],["shadesofblueproject.org","Shades of Blue Project — Black MMH Week 2026 dates + theme"]],drove:"YGT-0720-3"},
  {glyph:"🗓️",type:"SEASONAL SEED",v:"medium",date:"",fresh:false,live:false,h:"August's calendar is three weeks out — the content that lands then gets made now",d:"World Breastfeeding Week runs August 1–7, with National Breastfeeding Month covering all of August in the US, and Black Breastfeeding Week landing August 25–31 inside it. Right behind that sits the back-to-daycare window: separation anxiety is developmentally normal from around eight months through age three and peaks near eighteen months, most children settle into a new routine within two to four weeks, and daycare search interest reliably climbs through August. Nothing here is news — these are fixed dates that reward being early. Every year the brands that own these moments are the ones who filmed in July.",play:"The daycare-goodbye piece is the one worth starting this week, because it needs to be live before the first drop-off, not after. Reassurance framing does the work here — normal, temporary, here's the goodbye routine that helps — and it's another one that films with adult hands and text alone. Nothing about the breastfeeding weeks needs a product tie; showing up warmly is the whole play.",pillars:["YGT","MAP"],src:[["awarenessdays.com","World Breastfeeding Week 2026 — Aug 1–7 dates confirmed"],["click2houston.com","Maternal-health observance calendar + Black maternal health coverage"]],drove:"YGT-0720-2"},
];
const PULSE = [
  {glyph:"🎵",type:"NAMED FORMAT",v:"high",date:"this week",fresh:true,live:true,h:"'Bangladesh' is the substitution sound of the moment",d:"A 49-second song by singer-songwriter Ian McConnell has become the summer's stickiest audio. It opens like a real relationship complaint — 'you never take me to Bangladesh' — and then the demands spiral into absurd, oddly specific items. Creators are using it as a substitution template: swap the list for whatever your world is secretly full of. It needs no face, no performer, no baby — just text cards timed to the escalation over hands-and-product B-roll. The one thing to get right is tone: the joke only works if it lands soft, so the list should finish on relief, not on a complaint about the baby.",play:"Run 'the things nobody warned you about' as text cards over hands-and-toys B-roll — escalate for laughs, then land the last line on 'and you're doing fine.'",terr:"MENTAL-LOAD-RELIEF",pillars:["YGT"],src:[["thedailystar.net","Why the 49-second 'Bangladesh' song went viral"],["yahoo.com","Is 'Bangladesh' the 2026 song of summer?"]],drove:"PWP-0720-2"},
  {glyph:"🎷",type:"NAMED FORMAT",v:"high",date:"durable, still running",fresh:false,live:false,h:"'The saxophones are getting louder' — dread setup, gentle punchline",d:"The saxophone cue from Boyz n the Hood has become shorthand for 'something is about to go wrong,' now durable enough that Dictionary.com wrote it up as a slang entry. Parents run it over completely ordinary domestic moments and let the swelling horns do all the comedic work. For a brand whose whole promise is reassurance, the interesting move is the subversion: build the dread, then resolve it into a plain, calm answer. It's a two-shot, adult-hands format — no baby, no talent booking — and it turns a worry parents genuinely have into a laugh plus a real takeaway.",play:"Let the saxophones build over a normal worry — the toy that arrived with no age label, the nap that ended at 22 minutes — then answer it plainly. Dread in, relief out.",terr:"FIRST-TIME-PARENT-REASSURANCE",pillars:["YGT","MAP"],src:[["dictionary.com","'The saxophones are getting louder' slang entry"]]},
  {glyph:"🙌",type:"NAMED FORMAT",v:"medium",date:"durable, still running",fresh:false,live:false,h:"The 'Everything Hallelujah' gratitude list is still in rotation",d:"Since Justin Bieber's April Coachella set, the '…hallelujah' gratitude list has stayed in circulation across platforms — a montage of small, unglamorous wins, each capped with the same word. It travelled far beyond music (Kylie Jenner, Lewis Capaldi, even a White House post), which is usually the sign a format has stopped being a moment and become a general-purpose container. For a baby brand the fit is unusually good: early parenthood is almost entirely small wins that nobody claps for. B-roll only — hands, a cleared counter, a toy back in its basket, a checkmark.",play:"Make a 'small wins nobody claps for' reel — 22-minute nap, hallelujah. Pure B-roll, zero casting, and it says 'we see you' without having to say it.",terr:"DEVELOPMENTAL-WIN",pillars:["PWP","YGT"],src:[["hercampus.com","Justin Bieber's 'Hallelujah' TikTok trend"]],drove:"YGT-0720-1"},
  {glyph:"🥵",type:"SEASONAL MOOD",v:"high",date:"this week",fresh:true,live:true,h:"Round two of the heat — 'stuck inside, again' is the mood",d:"The second major heat wave of the month peaked mid-week: Billings hit 111°F and Salt Lake City 109°F, both all-time records, with warnings stretching from the Great Basin toward New England. What matters for content isn't the weather story, it's the mood underneath it. This is the second stretch of families indoors this month, which is exactly when 'what do I even do with them today' starts getting asked out loud. Indoor, low-prep, one-object activity content has a real audience right now — and it happens to be the brand's proven lane.",play:"Post a 'one thing you already own' indoor activity this week. The ask is genuinely live, and it's your 1.6M format with a reason-to-post attached.",terr:"PLAY-AS-LEARNING",pillars:["PWP","BOJ"],src:[["watchers.news","Billings and Salt Lake City set all-time heat records"],["ksl.com","Record heat coverage"]],drove:"PWP-0720-1"},
  {glyph:"💜",type:"OBSERVANCE",v:"medium",date:"starts this week",fresh:true,live:true,h:"Black Maternal Mental Health Week starts the day this week does",d:"The observance runs July 19-25, with this year's theme 'Building an Accountable Village: Providing Sustainability and Generational Impact Through Inspiration, Nourishment, and Mindful Awareness.' Coverage this week has centred on the disparity: roughly 40% of Black mothers experience a maternal mental health condition — about double the rate among mothers overall — and up to half never receive treatment. This is not a product moment and shouldn't be handled as one. It does sit squarely in the 'nobody is there to hold your hand' territory the brand already lives in, and the honest move is amplification rather than participation.",play:"Amplify, don't market — share the week and the organizations behind it with no product mention. Presence is the whole point; a CTA would undo it.",terr:"VILLAGE-SOLIDARITY",pillars:["YGT"],src:[["click2houston.com","Black Maternal Mental Health Week coverage"],["shadesofblueproject.org","Black MMH Week 2026 official page"]],drove:"YGT-0720-3"},
  {glyph:"🎒",type:"CONTENT WAVE",v:"high",date:"seed now → lands mid-Aug",fresh:false,live:false,h:"Back-to-daycare content crests in about three weeks",d:"Daycare search interest climbs through August every year and peaks around the second week, which means the separation-anxiety conversation that travels with it is three to four weeks out — not now. Posting into it later is posting into a crowded feed; building the pieces this week means being there first. The reassuring facts are durable and worth leading with: separation anxiety is developmental, common from around eight months and peaking near eighteen; most children settle into a new routine within two to four weeks; and the practices experts repeat are simple — short goodbyes, never sneaking out, one consistent handoff ritual.",play:"Draft the daycare-transition set now so it's live by mid-August. Lead with 'this is normal and it passes' — the reassurance is what gets saved and forwarded.",terr:"FIRST-TIME-PARENT-REASSURANCE",pillars:["MAP","YGT"],src:[["clevelandclinic.org","Separation anxiety in babies"],["healthychildren.org","AAP: making child-care drop-off easier"]],drove:"YGT-0720-2"},
  {glyph:"🔖",type:"PLATFORM BEHAVIOR",v:"medium",date:"durable, building",fresh:false,live:false,h:"The save is now the metric worth chasing",d:"Instagram carousel engagement climbed to 0.72% this year, up nearly 31% year over year, and the thing driving it is the plain saveable resource — checklists, one-pagers, 'signs your baby is ready for…' — because parents bookmark far more readily than they like. That's a different content job than reach. A saved post gets reopened at 2am and screenshotted into group chats, which is exactly how a developmental brand becomes the reference parents keep. It's also the cheapest thing on the calendar to make.",play:"Build one genuinely useful reference post — a by-age checklist parents will screenshot. Design it to be saved, not to be scrolled past.",terr:"BUDGET-SMART-PARENTING",pillars:["MAP"],src:[["creatorflow.so","Instagram carousel engagement benchmark 2026"]],drove:"MAP-0720-3"},
  {glyph:"🕳️",type:"WHITE SPACE",v:"medium",date:"this week",fresh:true,live:true,h:"Nothing broke in the parenting niche this week — and that's the opening",d:"A full sweep of this week's trending formats turns up nothing parenting-native. Everything hot is general-audience — a viral novelty song, a movie-soundtrack meme — and the parenting versions that exist are individual creators adapting them, not a wave the niche started. Worth naming plainly, because it means there's no crowded moment to fight into. The accounts that win weeks like this are the ones that translate a general trend into a milestone insight fastest, and that translation is a repeatable job rather than a lucky strike.",play:"Pick one general-audience format each week and be the account that makes the baby-development version of it. Fast translation beats waiting for a parenting trend that may never arrive.",terr:"EXPERT-DEMYSTIFIED",pillars:["PWP","MAP"],src:[["thedailystar.net","'Bangladesh' viral explainer"],["dictionary.com","'The saxophones are getting louder' slang entry"]],drove:"PWP-0720-2"},
  {glyph:"☀️",type:"QUESTION WAVE",v:"low",date:"active now",fresh:false,live:false,h:"'Is my baby too hot?' is the question of the fortnight",d:"Alongside the heat, the same handful of questions resurface everywhere: can I use sunscreen, how would I know if they're overheating, is the stroller cover making it worse. The guidance is durable and easy to say plainly — sunscreen generally isn't recommended under six months, so shade, light long layers and a brimmed hat do the work, and older babies get a mineral SPF with a patch test first. Overheating in infants tends to show as flushed skin, faster breathing and fussiness, and the response is simply a cooler spot and fewer layers. Plain answers, calmly delivered, are the entire opportunity here.",play:"Answer the three questions parents are actually typing, in plain words, with a credentialed voice. No alarm, no hedging — just the answer.",terr:"EXPERT-DEMYSTIFIED",pillars:["YGT","MAP"],src:[["fda.gov","Should you put sunscreen on infants? Not usually"],["healthychildren.org","AAP sun and heat guidance for young children"]],drove:"MAP-0720-1"},
  {glyph:"🧳",type:"COMMUNITY",v:"medium",date:"active now",fresh:false,live:false,h:"Post-trip sleep wreckage is the late-July group-chat topic",d:"Peak summer travel means a steady stream of 'we got home and bedtime is destroyed' posts. The reassuring read is that travel doesn't cause a regression — it moves the timing and changes the room — and the consistent advice across sleep sources is two to three low-key days to rebuild the routine rather than a hard reset. This is a mental-load moment more than a sleep-science one. What parents mostly want to hear is that it's temporary, and that there's one small specific thing to do tonight.",play:"Do a 'first 3 days home' routine reset — calm, specific, nothing to fix. It's a parent-only shoot and it's what the group chat is already asking about.",terr:"MENTAL-LOAD-RELIEF",pillars:["YGT"],src:[["huckleberrycare.com","Adjusting baby sleep while traveling"],["cradlewise.com","Traveling with a baby"]]},
];

const BRIEFS = [
  {id:"PWP-0720-1",pillar:"PWP",dna:"activity-demo",plat:"TikTok + IG",anchor:false,noBaby:false,ladder:false,panelTags:["budget","diy","quick","first-time"],concept:"\"Day four of indoors\" — one muffin tin from the cabinet, played three different ways depending on how old your baby is, filmed on the kitchen floor with the day's real mood as the opener. No shopping, no setup, no new toy. The age-by-age structure does the quiet work: a parent watching sees that the same object is a different activity at 7 months than at 18 months, which is the whole logic the brand lives on.",hooks:["Second heat wave this month. Here's what we're doing on the kitchen floor today.","It's 109° somewhere in this country and we are not going out there. One muffin tin, three ways — find your baby's age.","If you're on day four of indoors: you don't need a new toy. You need a muffin tin."],rec:2,caption:"Day four of indoors ☀️ and we are officially out of ideas — so here's the one we keep coming back to.\n\nA muffin tin. That's it. That's the activity.\n\n🍼 6–9 months: flip it upside down and let them bang the bumps. That's cause and effect, and it is deeply satisfying at this age.\n🧺 9–14 months: put a few rolled socks or balls beside it and let them drop things in and take them out. In, out, in again. This is the age where \"where did it go\" becomes a whole game.\n🎨 15–24 months: pair up socks or sort by color into the cups. Early matching, and it buys you a genuinely quiet ten minutes.\n\nSame object, three completely different activities — because what your baby needs at 7 months and what they need at 18 months are not the same thing.\n\nUse anything bigger than your baby's fist, skip anything small enough to fit all the way in their mouth, and ALWAYS supervise! 💛\n\nSave this for the next 100° afternoon. You're doing great.",lead:{ch:"TikTok",who:"Gen-Z Mom ⚡ — discovery audience, first-time parent, indoors and scrolling for something to do in the next ten minutes"},shoot:{setup:"Kitchen or dining-room floor, hard surface (tile/wood) so the muffin tin actually makes its satisfying clank — carpet kills the audio payoff. Shoot mid-morning between 9–11am next to the largest window with the blinds HALF closed: you want soft directional daylight plus visible slats, because the half-shut blind is what sells 'we are hiding inside' in one frame. Turn off overhead lights (they go orange and fight the daylight). Props are deliberately unglamorous and should already exist in the house: one standard 6- or 12-cup metal muffin tin, 4–6 rolled-up socks, 2–3 balls the size of an orange or bigger, one pair of colored socks for the matching beat. No styling, no wooden-toy set dressing, no cleared-and-staged background — a normal kitchen reads more honest and this is a budget-honest post. Phone on a stack of books or a low tripod, roughly 18 inches off the floor, at the baby's eye level, LOCKED OFF (no handheld drift). Shoot 4K if available so you can punch in for the IG crop without losing quality. Wipe the lens — kitchen phones are always smudged and it flattens the whole video.",cast:"One baby plus one adult, and the adult is HANDS AND LAP ONLY — no face, no talking head, no one who needs to be photogenic or booked. Ideal is a baby in the 9–14 month band who can do the middle segment for real; the 6–9 month and 15–24 month beats can be filmed with the same child on a different day or with a sibling/second family already on the shoot, and if only one age is available, shoot that segment live and deliver the other two as parent-hands demonstrations with the age band on screen — the format still works. Founder is NOT on camera. If no baby is available at all, this becomes a hands-only build: adult hands doing all three variations with the age cards, which loses some warmth but keeps the whole piece shootable on schedule.",tips:"Shoot the three age segments in ONE sitting even if you only need thirty seconds — a baby gives you about eight good minutes and then it is over, so get coverage before you get precious. Shoot order: get the middle segment (in-and-out) FIRST because it is the one that carries the video and the one a baby is most likely to actually perform; do the flip-and-bang second; do the matching beat last or on a separate day. Roll long and silent — no coaching, no 'good job!', no clapping off-camera, because you will want the clean sound of the tin and a parent voice over the top forces you into a music-only edit. Get at least three times more B-roll of hands and the tin than you think you need; that footage covers every gap and gets reused for months. Bank two extra things while the setup is up: a 5-second clean overhead of just the tin and socks for a future carousel cover, and one wide of the striped window light with nobody in it — that empty frame is the opener and you only get it while the sun is in that position. Do not re-shoot for a 'better' take of the baby succeeding; the miss before the match is the most relatable second in the video."},shots:[{sec:"0:00–0:03",type:"Static wide, phone at floor level",frame:"The half-closed kitchen blind with hard summer light striping the floor. Muffin tin sitting alone in the light. No people yet.",action:"Two-second hold on the empty, over-lit room. A hand enters at the end of the beat and slides the tin toward camera.",txt:"day four of indoors"},{sec:"0:03–0:07",type:"Overhead close-up, parent hands only",frame:"The muffin tin flat on the floor, adult hands resting on either side. Baby's feet just visible at the top edge of frame.",action:"Hands flip the tin upside down with a small clank, then pull back out of frame.",txt:"one muffin tin. that's the whole activity."},{sec:"0:07–0:15",type:"Low side angle, baby seated",frame:"Baby sitting (propped if needed) in front of the upturned tin, parent's hand steadying at the hip and out of the way of the tin.",action:"Parent taps two cups — tap, tap — then stops. Baby reaches and bangs. Let one real, unedited bang land with sound on.",txt:"6–9 months: flip it over. banging it is cause & effect — and it's the best part of their day"},{sec:"0:15–0:23",type:"Overhead, adult hands + baby hands",frame:"Tin right-side up, rolled socks and a ball in a small pile beside it.",action:"Parent drops one sock into a cup, then waits. Baby picks it out, drops it back in, does it again. Do NOT cut on the first success — the repeat is the whole point.",txt:"9–14 months: in, out, in again. this is the age 'where did it go' becomes a game"},{sec:"0:23–0:31",type:"Slight high angle, toddler-height",frame:"Tin with two colored socks already sitting in separate cups, their matching pair beside it.",action:"Toddler picks up a sock, hovers, drops it into the cup with its match. One miss before the match is better than a clean take — keep the miss.",txt:"15–24 months: match the pairs. early sorting, and it buys you ten quiet minutes"},{sec:"0:31–0:38",type:"Wide, pull back to the room",frame:"Baby still playing with the tin in the striped window light, parent sitting back on the floor with a coffee, not intervening.",action:"No action. Hold. Let it breathe for a full three seconds — this is the reassurance beat and cutting it short kills the landing.",txt:"you already owned it. and you're doing fine. 💛"}],edit:{hook:"Open cold on the striped light and the empty floor with 'day four of indoors' — the mood before the activity. The object reveal is beat two, not beat one. Do not open on a smiling baby; the tension of the heat is what earns the scroll-stop, and the baby is the payoff.",pace:"Fast on the front (0:00–0:07 is three quick cuts), then deliberately slow down for each age segment — roughly 8 seconds each, one clean cut between them, no whip transitions. The slowdown IS the format: a parent needs to actually see the activity to copy it. Keep every real sound (the clank, the sock landing, one baby noise) — clean audio of the tin is worth more than a tight edit.",captions:"Burned-in, not auto-generate
